<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,interactive-widget=resizes-content">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GAZEBO Investment Club</title>
<!-- NOTE: This app now uses Firebase Firestore for multi-user shared storage.
Replace YOUR_API_KEY, etc. with your Firebase project config.
Data is stored in Firestore 'data' collection with documents keyed by K.xxx.
Fallback to localStorage if Firebase fails. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1B2A;--navy2:#162436;--navy3:#1E3350;--gold:#C9A84C;--gold2:#B8963C;--green:#057A55;--red:#C0392B;--blue:#1A56DB;--bg:#F5F0E8;--white:#FFFFFF;--gray1:#F5F5F5;--gray2:#E8E2D8;--gray3:#CCC;--text:#1A1A1A;--text2:#555;--text3:#888;--sidebar-w:230px;--bottom-nav-h:60px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100%;height:100dvh}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#C9A84C44;border-radius:10px}
.fd{font-family:'Playfair Display',serif!important}
input,select,textarea,button{font-family:'DM Sans',sans-serif;-webkit-appearance:none;appearance:none}
.inp{width:100%;padding:10px 12px;border:1.5px solid var(--gray3);border-radius:8px;font-size:14px;outline:none;transition:border .2s;background:white;color:var(--text)}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px #C9A84C22}
.inp:disabled{background:var(--gray1);color:var(--text3)}
textarea.inp{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap;touch-action:manipulation}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--gold);color:var(--navy)}.btn-p:hover:not(:disabled){background:var(--gold2)}
.btn-s{background:var(--navy);color:var(--gold)}
.btn-g{background:transparent;color:var(--text2);border:1.5px solid var(--gray3)}.btn-g:hover:not(:disabled){background:var(--gray1)}
.btn-d{background:var(--red);color:white}.btn-d:hover:not(:disabled){background:#A93226}
.btn-grn{background:var(--green);color:white}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-full{width:100%;padding:12px}
.card{background:white;border-radius:12px;padding:18px;box-shadow:0 2px 8px #00000012}
/* DESKTOP LAYOUT */
#app{display:flex;height:100%;height:100dvh}
.sidebar{width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;height:100vh;flex-shrink:0;overflow-y:auto}
.page-content{flex:1;overflow-y:auto;padding:22px 24px;background:var(--bg)}
.bottom-nav{display:none}
.member-bottom-nav { display: flex !important; position: static !important; height: var(--bottom-nav-h); background: var(--navy); border-top: 1px solid var(--navy3); overflow-x: auto; -webkit-overflow-scrolling: touch; flex-shrink: 0; }
/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--bg);padding:8px 12px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--gray2);vertical-align:middle;font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#FDFAF6;cursor:pointer}
.tbl-sm th,.tbl-sm td{padding:6px 10px;font-size:12px}
/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bdg-success{background:#DEF7EC;color:#057A55}.bdg-danger{background:#FDE8E8;color:#C81E1E}
.bdg-warning{background:#FEF3C7;color:#92400E}.bdg-info{background:#EBF4FF;color:#1A56DB}
.bdg-gray{background:#F3F4F6;color:#374151}.bdg-amber{background:#FEF9EC;color:#B45309}
.bdg-gold{background:#FEF3C7;color:#7C6A00}
/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:12px;backdrop-filter:blur(2px)}
.modal{background:white;border-radius:16px;width:100%;max-width:680px;max-height:94vh;overflow-y:auto;box-shadow:0 20px 60px #00000030}
.modal-lg{max-width:880px}.modal-xl{max-width:1060px}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--gray2);position:sticky;top:0;background:white;z-index:10;border-radius:16px 16px 0 0}
.mbody{padding:20px}
.mfoot{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--gray2);position:sticky;bottom:0;background:white;z-index:10;flex-wrap:wrap}
/* FORMS */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg label,.fg3 label,.form-label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.full{grid-column:1/-1}
.fl{display:flex;gap:8px;align-items:center}.flw{flex-wrap:wrap}
.sec-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);border-bottom:2px solid var(--gold);padding-bottom:5px;margin-bottom:14px;margin-top:18px}
/* ALERTS */
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-warn{background:#FEF3C7;border:1px solid #F59E0B;color:#92400E}
.alert-err{background:#FDE8E8;border:1px solid var(--red);color:var(--red)}
.alert-ok{background:#DEF7EC;border:1px solid #10B981;color:#065F46}
.alert-info{background:#EBF4FF;border:1px solid #60A5FA;color:#1E40AF}
/* MISC */
.progress-bar{height:7px;background:var(--gray2);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;transition:width .3s}
.tab-bar{display:flex;border-bottom:2px solid var(--gray2);margin-bottom:16px;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;background:none;border:none;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:600}
.stat-card{background:white;border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px #00000012}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.kv-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--gray2);font-size:13px}
.kv-row:last-child{border-bottom:none}
.kv-label{color:var(--text3)}.kv-value{font-weight:600;color:var(--navy);text-align:right;max-width:60%}
.info-box{background:var(--bg);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text2)}
.mono{font-family:monospace}
.gold-text{color:var(--gold)}.green-text{color:var(--green)}.red-text{color:var(--red)}.navy-text{color:var(--navy)}
hr.divider{border:none;border-top:1px solid var(--gray2);margin:14px 0}
.no-data{text-align:center;color:var(--text3);padding:32px 20px;font-size:13px}
.page-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.page-title{font-size:24px;color:var(--navy);margin-bottom:2px}
.page-sub{color:var(--text3);font-size:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:#7F8C9A;font-size:13px;font-weight:500;transition:all .2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--navy2);color:white}.nav-item.active{background:#C9A84C1A;color:var(--gold);font-weight:600}
.nav-grp{font-size:10px;color:#4A5568;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:8px 12px 4px}
.pin-box{display:flex;gap:10px;justify-content:center;margin:16px 0}
.pin-digit{width:52px;height:58px;text-align:center;font-size:24px;font-weight:700;border:2px solid var(--gray3);border-radius:10px;outline:none;background:white;color:var(--navy);-webkit-user-select:text;user-select:text;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.pin-digit:focus{border-color:var(--gold);box-shadow:0 0 0 3px #C9A84C22}
table.savings-cal{border-collapse:collapse;font-size:12px}
table.savings-cal th{background:var(--navy);color:var(--gold);padding:6px 8px;white-space:nowrap;font-size:11px}
table.savings-cal td{padding:5px 8px;border:1px solid var(--gray2);text-align:center}
.photo-box{width:90px;height:110px;border:2px dashed var(--gray3);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--text3);text-align:center;gap:4px;position:relative;overflow:hidden;flex-shrink:0}
.photo-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.doc-box{border:2px dashed var(--gray3);border-radius:8px;padding:10px;cursor:pointer;font-size:12px;color:var(--text3);text-align:center;min-height:52px;display:flex;align-items:center;justify-content:center}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadein .2s ease}
.spin{animation:spin 1s linear infinite}
/* MEMBER PORTAL SPECIFIC */
.member-bottom-nav .bn-item{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#7F8C9A;font-size:10px;font-weight:500;padding:6px 4px;transition:color .2s;text-decoration:none;border:none;background:none;touch-action:manipulation}
.member-bottom-nav .bn-item.active{color:var(--gold)}.member-bottom-nav .bn-item .bn-ic{font-size:20px;line-height:1}
.member-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%);border-radius:14px;padding:20px;color:white;margin-bottom:16px;position:relative;overflow:hidden}
.member-hero::before{content:"🦅";position:absolute;right:-10px;top:-10px;font-size:80px;opacity:.08}
.savings-badge{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:10px;padding:14px;text-align:center}
.member-savings-page .member-section{margin-bottom:12px}
.member-nav-inline{display:flex!important;height:auto;border-top:none;border-radius:12px;overflow-x:auto;background:var(--navy);-webkit-overflow-scrolling:touch}
.member-nav-inline .bn-item{flex:1;min-width:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#7F8C9A;font-size:10px;font-weight:500;padding:10px 6px;transition:color .2s;text-decoration:none;border:none;background:none;touch-action:manipulation}
.member-nav-inline .bn-item.active{color:var(--gold)}
.member-nav-inline .bn-item .bn-ic{font-size:20px;line-height:1}
.eligibility-bar{height:12px;background:var(--gray2);border-radius:10px;overflow:hidden;margin:8px 0}
/* EXPENSE CARD */
.exp-card{border-left:4px solid var(--red);background:white;border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px #00000010}
.exp-card.approved{border-left-color:var(--green)}
.exp-card.pending{border-left-color:var(--gold)}
.minutes-wrap{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.minute-card{background:white;border:1px solid var(--gray2);border-radius:12px;padding:14px;box-shadow:0 1px 5px #00000012;display:flex;flex-direction:column;gap:10px}
.minute-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap}
.minute-title{font-size:15px;font-weight:700;color:var(--navy);line-height:1.3}
.minute-meta{font-size:11px;color:var(--text3)}
.minute-summary{font-size:13px;color:var(--text2);line-height:1.55;white-space:pre-wrap}
.minute-files{display:flex;flex-wrap:wrap;gap:6px}
.minute-file-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 8px;border:1px solid var(--gray2);border-radius:20px;background:var(--gray1);font-size:11px;color:var(--text2);max-width:100%}
.minute-actions{display:flex;gap:6px;flex-wrap:wrap}

/* ─── MOBILE (≤ 768px) ─── */
@media (max-width:768px){
  body.logged-in{overflow:hidden}
  #app{flex-direction:column}
  .sidebar{display:none}
  .page-content{padding:14px 14px 80px;flex:1;overflow-y:auto}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:var(--bottom-nav-h);background:var(--navy);z-index:500;border-top:1px solid var(--navy3);overflow-x:auto;-webkit-overflow-scrolling:touch}
  .bn-item{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#7F8C9A;font-size:9px;font-weight:500;padding:6px 4px;transition:color .2s;text-decoration:none;border:none;background:none;touch-action:manipulation}
  .bn-item.active{color:var(--gold)}.bn-item .bn-ic{font-size:20px;line-height:1}
  .bn-badge{background:var(--red);color:white;border-radius:20px;padding:1px 5px;font-size:9px;font-weight:700;position:absolute;top:6px;right:calc(50% - 20px)}
  .bn-item{position:relative}
  .member-bottom-nav { position: static !important; }
  .grid2,.grid3,.grid4{grid-template-columns:1fr!important}
  .member-savings-page .grid2,.member-savings-page .grid3{gap:10px}
  .member-savings-page .member-hero{padding:14px;margin-bottom:10px}
  .member-savings-page .savings-badge{padding:10px}
  .member-savings-page .card{padding:12px}
  .member-savings-page .tbl th,.member-savings-page .tbl td{padding:6px 8px}
  .member-nav-inline .bn-item{padding:8px 4px;font-size:9px}
  .minutes-wrap{grid-template-columns:1fr}
  .minute-card{padding:12px}
  .fg{grid-template-columns:1fr!important}.fg3{grid-template-columns:1fr 1fr!important}
  .full{grid-column:1/-1}
  .modal{border-radius:16px 16px 0 0;max-height:92vh;margin:0;position:fixed;bottom:0;left:0;right:0;max-width:100%!important}
  .overlay{align-items:flex-end;padding:0}
  .tbl{font-size:12px}.tbl th,.tbl td{padding:7px 9px}
  .page-hdr{gap:8px}.page-title{font-size:20px}
  .stat-card{padding:12px}
  .tab-btn{padding:7px 10px;font-size:12px}
  .mhdr{padding:14px 16px}.mbody{padding:16px}.mfoot{padding:12px 16px}
  .btn{padding:10px 14px;font-size:13px}
  .inp{font-size:16px;padding:11px 12px} /* prevent iOS zoom */
  select.inp{font-size:16px}
  .page-hdr .fl{flex-wrap:wrap;gap:6px}
  .card{padding:14px}
  /* Mobile table → stacked cards for complex tables */
  .mobile-stack .tbl thead{display:none}
  .mobile-stack .tbl tr{display:block;border:1px solid var(--gray2);border-radius:8px;margin-bottom:8px;padding:10px}
  .mobile-stack .tbl td{display:flex;justify-content:space-between;border:none;padding:4px 0;font-size:12px}
  .mobile-stack .tbl td::before{content:attr(data-label);color:var(--text3);font-size:11px;font-weight:600;text-transform:uppercase;flex-shrink:0;margin-right:8px}
}

@media (max-width:380px){
  .fg3{grid-template-columns:1fr!important}
  .pin-digit{width:46px;height:54px;font-size:20px}
}
/* ── MOBILE KEYBOARD STABILITY ───────────────────────
   Prevent the page from scrolling/bouncing when the
   virtual keyboard opens — this is the #1 cause of
   the keyboard dismissing itself on iOS/Android.        */
/* ── KEYBOARD STABILITY (iOS + Android) ─────────────
   ROOT CAUSE of Android keyboard flash:
   position:fixed ancestors trigger a repaint when the
   virtual keyboard opens/closes, which momentarily
   removes focus from the input — causing the flash.
   FIX: login uses NORMAL document flow (no fixed).
   The app shell uses overflow:hidden only when logged in. */

/* Base — no overflow:hidden here; JS controls it per state */
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100%;margin:0;padding:0;overscroll-behavior:none;background:var(--navy)}

/* Login container — normal block flow, no fixed positioning */
.login-scroll{
  display: block;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  min-height:100%;
  min-height:100dvh;          /* dynamic viewport — shrinks when keyboard opens */
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  background:var(--navy);
}

/* App shell (only active when logged in via JS) */
.app-shell{
  display:flex;
  height:100%;
  height:100dvh;
  overflow:hidden;
}

/* Universal tap/focus behaviour */
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
input,button,select,textarea{
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
input:focus,select:focus,textarea:focus{outline:none}
</style>
</head>
<body>

var _b32chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
function genTOTPSecret(){var s="";for(var i=0;i<16;i++)s+=_b32chars[Math.floor(Math.random()*32)];return s;}
function b32decode(s){
  s=s.toUpperCase().replace(/=+$/,"");
  var bits="";for(var i=0;i<s.length;i++){var v=_b32chars.indexOf(s[i]);if(v<0)continue;bits+=v.toString(2).padStart(5,"0");}
  var bytes=[];for(var i=0;i+8<=bits.length;i+=8)bytes.push(parseInt(bits.slice(i,i+8),2));
  return bytes;
}
function intToBytes(n){var b=new Array(8).fill(0);for(var i=7;i>=0;i--){b[i]=n&0xff;n=Math.floor(n/256);}return b;}
async function calcTOTP(secret,window){
  var kBytes=b32decode(secret);
  var dBytes=intToBytes(window==null?Math.floor(Date.now()/1000/30):window);
  var key=await crypto.subtle.importKey("raw",new Uint8Array(kBytes),{name:"HMAC",hash:"SHA-1"},false,["sign"]);
  var sig=new Uint8Array(await crypto.subtle.sign("HMAC",key,new Uint8Array(dBytes)));
  var off=sig[19]&0xf;
  var code=((sig[off]&0x7f)<<24)|((sig[off+1]&0xff)<<16)|((sig[off+2]&0xff)<<8)|(sig[off+3]&0xff);
  return String(code%1000000).padStart(6,"0");
}
async function verifyTOTP(secret,token){
  token=String(token||"").trim();
  if(!secret||token.length!==6)return false;
  var w=Math.floor(Date.now()/1000/30);
  for(var i=-2;i<=2;i++){if(await calcTOTP(secret,w+i)===token)return true;}
  return false;
}
function totpQRUrl(secret,username){
  var issuer=encodeURIComponent("GAZEBO GIC");
  var acct=encodeURIComponent("GAZEBO GIC:"+username);
  var uri="otpauth://totp/"+acct+"?secret="+secret+"&issuer="+issuer+"&algorithm=SHA1&digits=6&period=30";
  return"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(uri);
}

var PENALTY_NOTICE_DATE=new Date("2026-06-30T23:59:59");
var PENALTY_START_DATE=new Date("2026-07-31T23:59:59");
var DAILY_PENALTY_RATE=0.01; // 1% of MC per day

function getMemberMonthStatus(mid,yr,mo){
  // Use advance-allocation model: a member who has paid ahead has their pool
  // automatically applied at MC per month in chronological order.
  var allocated=getMemberMonthAllocated(mid,yr,mo);
  var amt=allocated; // effective amount for this month from the pool
  var today=now();
  var monthEnd=new Date(yr,mo+1,0,23,59,59); // last day of month
  var currentYear=today.getFullYear(), currentMonth=today.getMonth();
  var backlog=hasMemberBacklogBefore(null,mid,yr,mo);
  if((yr>currentYear||(yr===currentYear&&mo>=currentMonth)) && backlog){
    // If there is older arrears unresolved, current/future months cannot be treated as paid yet.
    var remaining=MC-amt;
    return{paid:false,amt:amt,penalty:0,penaltyDays:0,totalOwed:remaining};
  }
  if(amt>=MC)return{paid:true,amt:amt,penalty:0,penaltyDays:0,totalOwed:0};
  var remaining=MC-amt;
  var isPenaltyActive=today>PENALTY_START_DATE&&monthEnd<today;
  if(!isPenaltyActive)return{paid:false,amt:amt,penalty:0,penaltyDays:0,totalOwed:remaining};
  // Days since month end (or penalty start date, whichever is later)
  var from=new Date(Math.max(PENALTY_START_DATE.getTime(),monthEnd.getTime()));
  var days=Math.max(0,Math.floor((today-from)/(1000*60*60*24)));
  var penalty=Math.round(days*MC*DAILY_PENALTY_RATE);
  return{paid:false,amt:amt,penalty:penalty,penaltyDays:days,totalOwed:remaining+penalty};
}

function getMemberTotalArrears(mid){
  var m=S.members.filter(function(x){return x.id===mid;})[0];
  if(!m||m.status!=="Active")return{totalOwed:0,months:[]};
  var joined=new Date(m.joined+"T12:00:00");
  var today=now();
  var clubStart=new Date("2025-08-01T00:00:00");
  var months=[];var totalOwed=0;
  MGRID.forEach(function(mg){
    var mDate=new Date(mg.yr,mg.mo,1);
    var mEnd=new Date(mg.yr,mg.mo+1,0);
    if(mDate<clubStart||mEnd>today)return;
    // For all members, require back-period from club start until current month
    var st=getMemberMonthStatus(mid,mg.yr,mg.mo);
    if(!st.paid&&st.totalOwed>0){
      months.push(Object.assign({},st,{label:mg.l,yr:mg.yr,mo:mg.mo}));
      totalOwed+=st.totalOwed;
    }
  });
  return{totalOwed:totalOwed,months:months};
}

function memberCaughtUpByJune(mid){
  // Check if member has paid all months up to June 2026
  var m=S.members.filter(function(x){return x.id===mid;})[0];
  if(!m)return true;
  var joined=new Date(m.joined+"T12:00:00");
  var june30=new Date("2026-06-30T23:59:59");
  var monthsOwed=0;
  MGRID.forEach(function(mg){
    if(mg.yr===2026&&mg.mo>5)return; // only up to June
    var mDate=new Date(mg.yr,mg.mo,1);
    if(mDate<joined)return;
    var paid=S.savings.filter(function(s){return s.memberId===mid&&!s.voided&&s.yr===mg.yr&&s.mo===mg.mo;});
    if(paid.reduce(function(t,s){return t+s.amount;},0)<MC)monthsOwed++;
  });
  return monthsOwed===0;
}

function sha256hex(str){
  return crypto.subtle.digest("SHA-256",new TextEncoder().encode(str))
    .then(function(buf){
      return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
    });
}

async function sendTelegramMessage(token,chatId,text){
  try{
    var res=await fetch("https://api.telegram.org/bot"+token+"/sendMessage",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id:chatId,text:text,disable_web_page_preview:true})
    });
    var data=null;
    try{data=await res.json();}catch(_e){data=null;}
    if(!res.ok||!data||data.ok===false){
      var desc=(data&&data.description)||("HTTP "+res.status);
      throw new Error(desc);
    }
    return{ok:true};
  }catch(err){
    return{ok:false,error:(err&&err.message)||String(err)};
  }
}

function logEvent(type,actor,detail){
  var entry={id:Math.random().toString(36).slice(2,9),type:type,actor:actor,detail:detail,ts:new Date().toISOString(),ua:navigator.userAgent.slice(0,80)};
  // Store in Firebase for shared audit trail
  (async function(){
    try {
      var logs=await DB.get("gic:auditlog")||[];
      logs.unshift(entry);
      logs=logs.slice(0,1000);
      await DB.set("gic:auditlog",logs);
    } catch(e){
      // Fallback to localStorage
      var logs=_store.get("gic:auditlog")||[];
      logs.unshift(entry);
      _store.set("gic:auditlog",logs.slice(0,1000));

}

function getLockout(u){
  if(S.lockouts&&S.lockouts[u])return S.lockouts[u];
  return _store.get("gic:lock:"+u)||{count:0,until:0};
}
function setLockout(u,d){
  S.lockouts=S.lockouts||{};
  S.lockouts[u]=d;
  _store.set("gic:lock:"+u,d);
  DB.set(K.lockouts,S.lockouts);
}
function isLocked(u){return getLockout(u).until>Date.now();}
function lockMins(u){return Math.ceil((getLockout(u).until-Date.now())/60000);}
function recordFail(u){var l=getLockout(u);l.count=(l.count||0)+1;if(l.count>=LOCKOUT_MAX){l.until=Date.now()+LOCKOUT_MS;l.count=0;}setLockout(u,l);logEvent("FAILED_LOGIN",u||"?","Failed attempt "+l.count);}
function clearLockout(u){setLockout(u,{count:0,until:0});}

function getUserLockMinutes(user){
  if(!user)return 0;
  var userM=isLocked(user.username)?lockMins(user.username):0;
  var pinKey="pin:"+user.username;
  var pinM=isLocked(pinKey)?lockMins(pinKey):0;
  return Math.max(userM,pinM);
}
function isUserLocked(user){return getUserLockMinutes(user)>0;}
function renderUserAttentionAlerts(user){
  if(!user||!userWantsAlerts(user))return "";
  var alerts=[];
  if(CAN(user,"approve_loan")){
    S.loans.filter(function(loan){return canUserApproveLoan(loan,user);}).forEach(function(loan){

      alerts.push({type:"info",msg:"🔔 Loan "+loan.no+" for "+esc(loan.borrower)+" is at "+getLoanApprovalLabel(loan)+"."});
    });
  }
  if(user.access==="member"&&user.memberId){
    S.loans.filter(function(loan){return loan.memberId===user.memberId&&loan.status==="Pending";}).forEach(function(loan){
      alerts.push({type:"info",msg:"⏳ Your loan "+loan.no+" is under review ("+getLoanApprovalLabel(loan)+")."});

function clearSessionTimers(){
  clearTimeout(_sessionTimer);
  clearTimeout(_sessionWarningTimer);
  clearTimeout(_sessionAbsoluteTimer);
  clearTimeout(_sessionAbsoluteWarningTimer);
}

function attachSessionActivityListeners(){
  if(_sessionListenersBound)return;
  ["click","keydown","touchstart","scroll","mousemove","focus","blur","input","change"].forEach(function(e){
    document.addEventListener(e,resetSessionTimer,{passive:true});
  });
  _sessionListenersBound=true;
}

function expireCurrentSession(reason,toastMsg){
  var activeUser=S.user;
  clearSessionTimers();
  _sess.clear();
  S.user=null;S.loginStep=1;S.loginUser=null;S.page="dashboard";_navHistory=[];
  if(activeUser)logEvent("LOGOUT",activeUser.name,reason);
  if(toastMsg)showToast(toastMsg,"warn");
  render();
}

function scheduleAbsoluteSessionExpiry(){
  var sess=_sess.load();
  if(!S.user||!sess)return;
  var expiresAt=sess.expiresAt||((sess.issuedAt||sess.ts||0)+SESSION_MAX_AGE_MS);
  var remaining=expiresAt-Date.now();
  clearTimeout(_sessionAbsoluteTimer);
  clearTimeout(_sessionAbsoluteWarningTimer);
  if(remaining<=0){
    expireCurrentSession("Session expired — 24 hours elapsed","Session expired — please sign in again");
    return;
  }
  if(remaining>60000){
    _sessionAbsoluteWarningTimer=setTimeout(function(){
      if(S.user)showToast("Session will expire in 1 minute due to 24-hour sign-in limit","warn");
    },remaining-60000);
  }
  _sessionAbsoluteTimer=setTimeout(function(){
    if(S.user)expireCurrentSession("Session expired — 24 hours elapsed","Session expired — please sign in again");
  },remaining);
}

function resetSessionTimer(){
  if(!S.user)return;
  var sess=_sess.load();
  if(_sess.isExpired(sess)){
    expireCurrentSession("Session expired — 24 hours elapsed","Session expired — please sign in again");
    return;
  }
  clearTimeout(_sessionTimer);
  clearTimeout(_sessionWarningTimer);
  // Show warning 1 minute before expiration
  _sessionWarningTimer=setTimeout(function(){
    if(S.user)showToast("Session will expire in 1 minute due to inactivity","warn");
  },SESSION_MS - 60000);
  _sessionTimer=setTimeout(function(){
    if(S.user)expireCurrentSession("Session expired — 5 min idle","Session expired — please sign in again");
  },SESSION_MS);
}

function sanitizeForDb(value){
  if(value===undefined)return null;
  if(value===null)return null;
  if(Array.isArray(value))return value.map(function(item){return sanitizeForDb(item);});
  if(value&&typeof value==="object"){
    var out={};
    Object.keys(value).forEach(function(key){
      var clean=sanitizeForDb(value[key]);
      if(clean!==undefined)out[key]=clean;
    });
    return out;
  }
  return value;
}
var DB={
  _fbOk:true,
  get: async function(k) {
    try {
      const docRef = db.collection('data').doc(k);
      const docSnap = await docRef.get();
      DB._fbOk=true;
      return docSnap.exists ? docSnap.data().value : null;
    } catch (e) {
      console.error('DB get error:', e);
      if(DB._fbOk){DB._fbOk=false;console.warn("Firebase unavailable, using local storage fallback");}
      if(e.code==="permission-denied"){
        console.warn("Firestore permission denied — update Firestore rules for /data/**/*. ");
        if(typeof showToast==="function")showToast("Firebase permission denied. Update Firestore rules.","err");
      }
      return _store.get(k); // fallback
    }
  },
  set: async function(k, v) {
    var clean=sanitizeForDb(v);
    if(k===K.members&&Array.isArray(clean)&&clean.length){
      _store.set(K.membersBackupLatest,clean);
    }
    try {
      await db.collection('data').doc(k).set({ value: clean });
      DB._fbOk=true;
      return true;
    } catch (e) {
      console.error('DB set error:', e);
      if(DB._fbOk){
        DB._fbOk=false;
        var errMsg=e.code==="permission-denied"
          ?"Firebase permission denied — update Firestore rules."
          :"⚠️ Cloud save failed — check your internet connection. Changes saved locally only.";
        if(typeof showToast==="function")showToast(errMsg,"err");
      }
      _store.set(k, clean); // fallback to local only
      return false;
    }
  }
};

function fmt(n){return"UGX "+Number(n||0).toLocaleString();}
function fmtCompact(n){
  var value=Number(n||0);
  var abs=Math.abs(value);
  if(abs>=1000000){
    var millions=(value/1000000);
    return (Math.round(millions*10)/10).toString().replace(/\.0$/,'')+"M";
  }
  if(abs>=1000){
    var thousands=(value/1000);
    return (Math.round(thousands*10)/10).toString().replace(/\.0$/,'')+"K";
  }
  return String(Math.round(value));
}

function parseLocalDateOnly(d){
  if(!d)return null;
  var parts=String(d).split("-");
  if(parts.length!==3)return null;
  var yr=Number(parts[0]),mo=Number(parts[1]),day=Number(parts[2]);
  if(!yr||!mo||!day)return null;
  return new Date(yr,mo-1,day,12,0,0,0);
}
function dateDiffInDays(fromDate,toDate){
  if(!(fromDate instanceof Date)||isNaN(fromDate.getTime())||!(toDate instanceof Date)||isNaN(toDate.getTime()))return 0;
  var fromNoon=new Date(fromDate.getFullYear(),fromDate.getMonth(),fromDate.getDate(),12,0,0,0);
  var toNoon=new Date(toDate.getFullYear(),toDate.getMonth(),toDate.getDate(),12,0,0,0);
  return Math.floor((toNoon.getTime()-fromNoon.getTime())/(24*60*60*1000));
}

function guessMimeFromName(name){

  if(n.endsWith(".jpg")||n.endsWith(".jpeg"))return"image/jpeg";

  return"application/octet-stream";
}

function cloudinaryUploadEndpoint(mimeOrName){
  var s=String(mimeOrName||"").toLowerCase();
  var isPdf=s==="application/pdf"||/\.pdf$/.test(s);
  var resourceType=isPdf?"raw":"auto";
  return"https://api.cloudinary.com/v1_1/"+encodeURIComponent(CLOUDINARY_CLOUD_NAME)+"/"+resourceType+"/upload";
}
function normalizeCloudinaryAssetUrl(url,mimeOrName){
  var u=String(url||"");
  if(!u||u.indexOf("res.cloudinary.com/")===-1)return u;
  var probe=String(mimeOrName||"").toLowerCase();
  var isPdf=probe==="application/pdf"||/\.pdf($|\?)/.test(probe)||/\.pdf($|\?)/.test(u);
  u=u.replace("/attachments/loans/forms/attachments/loans/forms/","/attachments/loans/forms/");
  u=u.replace("/attachments/members/photo/attachments/members/photo/","/attachments/members/photo/");
  u=u.replace("/attachments/members/nid/attachments/members/nid/","/attachments/members/nid/");
  if(isPdf){
    u=u.replace("/image/upload/","/raw/upload/");
    u=u.replace(/\.pdf\.pdf(?=$|\?)/i,".pdf");
  }
  return u;
}
function isCloudinaryConfigured(){

}
function canUseStorageUploads(){
  return isCloudinaryConfigured() && typeof location!=="undefined" && location.protocol!=="file:";

async function uploadAttachmentToStorage(file,folder){
  if(!isCloudinaryConfigured())throw new Error("Cloudinary is not configured. Set CLOUDINARY_CLOUD_NAME and CLOUDINARY_UPLOAD_PRESET in the app config.");
  if(!canUseStorageUploads())throw new Error("Cloudinary uploads are blocked when the app is opened via file://. Use the local HTTP server instead.");
  var authUid=(firebase.auth&&firebase.auth().currentUser&&firebase.auth().currentUser.uid)||"anon";
  var endpoint=cloudinaryUploadEndpoint(file.type||file.name);
  var publicId=Date.now()+"_"+authUid+"_"+safeFileName(stripFileExtension(file.name));
  var fd=new FormData();
  fd.append("file",file);
  fd.append("upload_preset",CLOUDINARY_UPLOAD_PRESET);
  fd.append("public_id",publicId);
  fd.append("folder","attachments/"+folder);
  var res=await fetch(endpoint,{method:"POST",body:fd});
  var payload=await res.json();
  if(!res.ok||!payload||payload.error){
    throw new Error((payload&&payload.error&&payload.error.message)||("Cloudinary upload failed (HTTP "+res.status+")"));
  }
  var detectedType=file.type||payload.resource_type||guessMimeFromName(file.name);
  var url=normalizeCloudinaryAssetUrl(payload.secure_url||payload.url,detectedType||file.name);
  return{url:url,path:payload.public_id||("attachments/"+folder+"/"+publicId),name:file.name,type:detectedType,size:file.size};
}
function isInlineDataUrl(v){

async function uploadDataUrlToStorage(dataUrl,folder,fileName,mimeType){
  if(!isCloudinaryConfigured())throw new Error("Cloudinary is not configured. Set CLOUDINARY_CLOUD_NAME and CLOUDINARY_UPLOAD_PRESET in the app config.");
  if(!canUseStorageUploads())throw new Error("Cloudinary uploads are blocked when the app is opened via file://. Use the local HTTP server instead.");
  var authUid=(firebase.auth&&firebase.auth().currentUser&&firebase.auth().currentUser.uid)||"anon";
  var type=mimeType||((String(dataUrl).match(/^data:([^;]+)/)||[])[1])||guessMimeFromName(fileName);
  var endpoint=cloudinaryUploadEndpoint(type||fileName);
  var publicId=Date.now()+"_"+authUid+"_"+safeFileName(stripFileExtension(fileName));
  var fd=new FormData();
  fd.append("file",dataUrl);
  fd.append("upload_preset",CLOUDINARY_UPLOAD_PRESET);
  fd.append("public_id",publicId);
  fd.append("folder","attachments/"+folder);
  var res=await fetch(endpoint,{method:"POST",body:fd});
  var payload=await res.json();
  if(!res.ok||!payload||payload.error){
    throw new Error((payload&&payload.error&&payload.error.message)||("Cloudinary upload failed (HTTP "+res.status+")"));
  }
  var url=normalizeCloudinaryAssetUrl(payload.secure_url||payload.url,type||fileName);
  return{url:url,path:payload.public_id||("attachments/"+folder+"/"+publicId),name:fileName,type:type};
}
async function externalizeMemberAttachments(member){

  if(isInlineDataUrl(next.passportPhoto)){

    var photoExt=photoType==="image/png"?"png":photoType==="image/webp"?"webp":photoType==="image/gif"?"gif":"jpg";
    var uploadedPhoto=await uploadDataUrlToStorage(next.passportPhoto,"members/photo",(next.no||next.id||"member")+"_photo."+photoExt,photoType);
    next.passportPhoto=uploadedPhoto.url;
    changed=true;
  }
  if(isInlineDataUrl(next.nidCopy)){
    var nidType=next.nidCopyType||((String(next.nidCopy).match(/^data:([^;]+)/)||[])[1])||guessMimeFromName(next.nidCopyName||"nid-upload");

function openAttachmentViewer(url,name,type){
  var normalizedUrl=normalizeCloudinaryAssetUrl(url,type||name||url||"");
  if(!normalizedUrl){showToast("No attachment found","warn");return;}
  var resolvedType=type||guessMimeFromName(name||normalizedUrl);
  ensureAttachmentUrlAccessible(normalizedUrl,resolvedType).then(function(okUrl){
    S.modal={id:"view-attachment",size:"modal-xl",data:{url:okUrl,name:name||"Attachment",type:resolvedType}};
    render();
  }).catch(function(err){
    showToast(storageErrorHint(err),"err");
  });
}
async function ensureAttachmentUrlAccessible(url,type){
  var normalizedUrl=normalizeCloudinaryAssetUrl(url,type||"");
  if(!normalizedUrl)return normalizedUrl;
  if(normalizedUrl.indexOf("res.cloudinary.com/")===-1)return normalizedUrl;
  var t=String(type||"").toLowerCase();
  var shouldProbe=t==="application/pdf"||/\.pdf($|\?)/i.test(normalizedUrl);
  if(!shouldProbe)return normalizedUrl;
  try{
    var res=await fetch(normalizedUrl,{method:"HEAD",mode:"cors"});
    if(res.ok)return normalizedUrl;
    var cldErr=(res.headers&&res.headers.get&&res.headers.get("x-cld-error"))||"";
    if(res.status===401&&/acl|deny/i.test(String(cldErr))){
      throw new Error("Cloudinary denied this file (ACL). In Cloudinary: Settings -> Security, allow PDF delivery; and in Upload Presets ensure access mode is Public.");
    }
    throw new Error("Attachment is not accessible (HTTP "+res.status+").");
  }catch(err){
    if(err&&err.message)return Promise.reject(err);
    return Promise.reject(new Error("Could not verify attachment access. Check network and Cloudinary security settings."));
  }
}

function storageErrorHint(err){
  var m=((err&&err.message)||"")+" "+((err&&err.code)||"");
  var t=m.toLowerCase();
  if(typeof location!=="undefined"&&location.protocol==="file:"){
    return"This app is running from file://, so browser CORS blocks cloud uploads. Open the app through the local server, for example http://127.0.0.1:8080/final/GAZEBO_GIC_v1_cloudinary.html.";
  }
  if(t.indexOf("cloudinary is not configured")>=0){
    return"Cloudinary is not configured. Set CLOUDINARY_CLOUD_NAME and CLOUDINARY_UPLOAD_PRESET in GAZEBO_GIC_v1_cloudinary.html.";
  }
  if(t.indexOf("cors")>=0||t.indexOf("xmlhttprequest")>=0||t.indexOf("failed")>=0||t.indexOf("network")>=0){
    return"Upload blocked by CORS/network. Verify Cloudinary upload preset is unsigned and allows your app origin.";
  }
  if(t.indexOf("acl")>=0||t.indexOf("deny")>=0){
    return"Cloudinary blocked file delivery by ACL. In Cloudinary Settings -> Security enable PDF delivery, and in Upload Presets set access mode to Public.";
  }
  if(t.indexOf("unauthorized")>=0||t.indexOf("permission")>=0){
    return"Upload denied by Cloudinary preset policy. Check preset permissions and allowed formats.";
  }
  if(t.indexOf("object-not-found")>=0||t.indexOf("bucket-not-found")>=0||t.indexOf("404")>=0){
    return"Upload endpoint not found. Confirm CLOUDINARY_CLOUD_NAME and upload preset are correct.";
  }
  return"Upload failed. Check Cloudinary configuration and network.";
}

// ─── ADVANCE SAVINGS ALLOCATION ─────────────────────
// When a member deposits a lump sum, intelligently allocate:
// 1. First, identify backlog months (months where allocated < MC)
// 2. Fill backlog months with 100,000 each
// 3. Then spread remaining to future months
// 4. Create individual savings entries for each month
function allocateAdvancePayment(mid, totalAmount, depositDate, memberNo, memberName, depositedBy) {
  var depositD = new Date(depositDate + "T12:00:00");
  var depositYr = depositD.getFullYear();
  var depositMo = depositD.getMonth();
  
  // Get current allocations
  var currentAllocs = getMemberAllocations(mid);
  var allocMap = {}; // {yr-mo: allocated_amount}
  currentAllocs.allocs.forEach(function(a) {
    allocMap[a.yr + "-" + a.mo] = a.allocated;
  });
  
  // Find backlog months (allocated < MC) and future available months
  var backlogMonths = [];
  var futureMonths = [];
  var currentDate = now();
  
  MGRID.forEach(function(mg) {
    var key = mg.yr + "-" + mg.mo;
    var allocated = allocMap[key] || 0;
    var mDate = new Date(mg.yr, mg.mo, 1);
    var isFuture = mg.yr > currentDate.getFullYear() || (mg.yr === currentDate.getFullYear() && mg.mo > currentDate.getMonth());
    
    // ANY month with less than MC allocated is backlog (past, present, or future)
    if (allocated < MC) {
      backlogMonths.push({yr: mg.yr, mo: mg.mo, allocated: allocated, index: backlogMonths.length});
    }
    // Separately track future months that are fully covered, for overflow
    if (isFuture && allocated >= MC) {
      futureMonths.push({yr: mg.yr, mo: mg.mo});
    }
  });
  
  // Allocate: backlog first (all underfunded months), then future months
  var remaining = totalAmount;
  var allocation = [];
  var savingsToCreate = [];
  var groupId = gid(); // Same group for all entries from this deposit
  
  // Fill ALL backlog months (past + present + future underfunded)
  backlogMonths.forEach(function(bl) {
    if (remaining <= 0) return;
    var give = Math.min(MC, remaining);
    allocation.push({yr: bl.yr, mo: bl.mo, amount: give});
    var ref = "SAV-" + bl.yr + String(bl.mo + 1).padStart(2, "0") + "-" + memberNo;
    savingsToCreate.push({
      id: gid(),
      memberId: mid,
      memberNo: memberNo,
      memberName: memberName,
      amount: give,
      date: depositDate,
      yr: bl.yr,
      mo: bl.mo,
      ref: ref,
      notes: "Monthly contribution for " + MS[bl.mo] + " " + bl.yr + " (advance)",
      by: depositedBy,
      voided: false,
      isAdvance: true,
      advanceGroupId: groupId
    });
    remaining -= give;
  });
  
  // Fill future months not yet in backlog (has no allocation yet)
  MGRID.forEach(function(mg) {
    if (remaining <= 0) return;
    var currentDate = now();
    var isFuture = mg.yr > currentDate.getFullYear() || (mg.yr === currentDate.getFullYear() && mg.mo > currentDate.getMonth());
    if (!isFuture) return; // Skip non-future
    
    // Check if this month already has an entry in allocation/backlog
    var alreadyAllocated = allocation.some(function(a) { return a.yr === mg.yr && a.mo === mg.mo; });
    if (alreadyAllocated) return;
    
    var give = Math.min(MC, remaining);
    allocation.push({yr: mg.yr, mo: mg.mo, amount: give});
    var ref = "SAV-" + mg.yr + String(mg.mo + 1).padStart(2, "0") + "-" + memberNo;
    savingsToCreate.push({
      id: gid(),
      memberId: mid,
      memberNo: memberNo,
      memberName: memberName,
      amount: give,
      date: depositDate,
      yr: mg.yr,
      mo: mg.mo,
      ref: ref,
      notes: "Monthly contribution for " + MS[mg.mo] + " " + mg.yr + " (advance)",
      by: depositedBy,
      voided: false,
      isAdvance: true,
      advanceGroupId: groupId
    });
    remaining -= give;
  });
  
  return {
    allocation: allocation,
    savingsToCreate: savingsToCreate,
    unallocated: Math.max(0, remaining),
    monthsCovered: allocation.length,
    totalAllocated: totalAmount - Math.max(0, remaining)
  };
}

// Returns an array of {yr, mo, allocated} covering every MGRID month.
function getMemberAllocations(mid){
  var allSav=S.savings.filter(function(s){return s.memberId===mid&&!s.voided;})
    .slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  // Build a pool of unallocated cash
  var pool=allSav.reduce(function(t,s){return t+s.amount;},0);
  // Allocate 100k per month across MGRID in chronological order
  var allocs=[];
  var remaining=pool;
  MGRID.forEach(function(mg){
    if(remaining<=0){allocs.push({yr:mg.yr,mo:mg.mo,allocated:0});return;}
    var give=Math.min(MC,remaining);
    allocs.push({yr:mg.yr,mo:mg.mo,allocated:give});
    remaining-=give;
  });
  return{allocs:allocs,unallocated:Math.max(0,remaining)};
}

function loanStat(loan,asOfDate){
  var c=calcLoan(loan.principal,loan.rate,loan.months);

  var configuredInterest=loan&&loan.manualRealizedInterest!=null?Math.max(0,Number(loan.manualRealizedInterest)||0):scheduledInterest;
  var penaltyMonths=getLoanPenaltyMonths(loan,asOfDate);

  var totalInterestDue=configuredInterest+penaltyInterest;
  var totalDue=loan.principal+totalInterestDue;
  var paidByRepayments=S.repayments.filter(function(r){return r.loanId===loan.id;}).reduce(function(t,r){return t+r.amount;},0);
  var manualPaidTotal=loan&&loan.manualPaidTotal!=null?Math.max(0,Number(loan.manualPaidTotal)||0):0;
  var paid=Math.max(paidByRepayments,manualPaidTotal);

  var outstandingInterest=Math.max(0,totalInterestDue-paidInterest);

  var outstanding=Math.max(0,totalDue-applied);
  var normalizedMonthly=loan.months>0?Math.round(totalDue/loan.months):0;
  var installmentsPaid=normalizedMonthly>0?Math.min(loan.months,Math.floor(applied/normalizedMonthly)):0;
  var partialInstallmentAmount=normalizedMonthly>0?applied-(installmentsPaid*normalizedMonthly):0;
  if(loan&&loan.status==="Cleared"){
    // Cleared loans should never show pending balances even when recovered from partial audit data.
    paid=Math.max(paid,totalDue);
    applied=totalDue;
    paidInterest=totalInterestDue;
    paidPrincipal=loan.principal;
    outstandingInterest=0;
    outstandingPrincipal=0;
    outstanding=0;
    installmentsPaid=loan.months||0;
    partialInstallmentAmount=0;
  }
  return{
    total:totalDue,
    paid:paid,
    applied:applied,
    outstanding:outstanding,
    configuredInterest:configuredInterest,
    penaltyInterest:penaltyInterest,
    penaltyMonths:penaltyMonths,

    scheduledInterest:scheduledInterest,
    paidInterest:paidInterest,
    paidPrincipal:paidPrincipal,
    outstandingInterest:outstandingInterest,
    outstandingPrincipal:outstandingPrincipal,

  };
}
function loanDueBaseDate(loan){

function loanDueDate(loanOrDate,months){

function getLoanLateDays(loan,asOfDate){

function loanSecurityCheck(bid,g1,g2,total){
  var b=bid?memberAvailSavings(bid):0,g1s=g1?memberAvailSavings(g1):0,g2s=g2?memberAvailSavings(g2):0;
  var comb=b+g1s+g2s;

function calcLoanLockAllocation(sec,total){
  var required=Math.max(0,Number(total)||0);
  // Borrower savings are locked first; guarantors cover only overflow in near-equal shares.
  var borrowerLock=Math.min(Math.max(0,Number(sec&&sec.bSav)||0),required);
  var guarantorRequired=Math.max(0,required-borrowerLock);
  var g1Avail=Math.max(0,Number(sec&&sec.g1Sav)||0);
  var g2Avail=Math.max(0,Number(sec&&sec.g2Sav)||0);
  var g1Target=Math.ceil(guarantorRequired/2);
  var g2Target=Math.floor(guarantorRequired/2);
  var g1Lock=Math.min(g1Avail,g1Target);
  var g2Lock=Math.min(g2Avail,g2Target);
  var coveredByGuarantors=g1Lock+g2Lock;
  var shortfall=guarantorRequired-coveredByGuarantors;
  if(shortfall>0){
    var g1Extra=Math.min(shortfall,Math.max(0,g1Avail-g1Lock));
    g1Lock+=g1Extra;
    shortfall-=g1Extra;
  }
  if(shortfall>0){
    var g2Extra=Math.min(shortfall,Math.max(0,g2Avail-g2Lock));
    g2Lock+=g2Extra;
    shortfall-=g2Extra;
  }
  return{
    borrower:borrowerLock,
    g1:g1Lock,
    g2:g2Lock,

    var nextG1=alloc.g1;
    var nextG2=alloc.g2;
    if((loan.lockedBorrower||0)!==nextBorrower||(loan.lockedG1||0)!==nextG1||(loan.lockedG2||0)!==nextG2){
      changed=true;
      return Object.assign({},loan,{lockedBorrower:nextBorrower,lockedG1:nextG1,lockedG2:nextG2});
    }
    return loan;
  });
  return changed;
}

// ─── AVAILABLE LOAN FUNDS (Banking Standard) ────────
// Formula (cooperative/SACCO standard):
//   Loanable Pool = Active Members' Savings Pool
//                 + Recovered Principal (repayments on principal portion)
//                 – Active Loans Outstanding (principal)
//                 – Locked Savings (pledged as collateral)
// This is the real-time deployable capital for new loans.
function calcLoanPortfolioTotals(asOfDate){
  var pool=activePoolTotals();
  var savingsPool=pool.available;
  var savingsPoolGross=pool.gross;
  var activeLoans=S.loans.filter(function(l){return l.status==="Active";});
  var closedLoans=S.loans.filter(function(l){return l.status==="Cleared";});
  var pendingLoans=S.loans.filter(function(l){return l.status==="Pending";});
  var nonDeclinedLoans=S.loans.filter(function(l){return l.status!=="Declined";});
  var activeStats=activeLoans.map(function(l){return{loan:l,stat:loanStat(l,asOfDate)};});
  var closedStats=closedLoans.map(function(l){return{loan:l,stat:loanStat(l,asOfDate)};});
  var nonDeclinedStats=nonDeclinedLoans.map(function(l){return{loan:l,stat:loanStat(l,asOfDate)};});
  var deployedPrincipal=activeLoans.reduce(function(t,l){return t+(Number(l.principal)||0);},0);
  var recoveredPrincipal=activeStats.reduce(function(t,x){return t+x.stat.paidPrincipal;},0);
  var outstandingPrincipal=activeStats.reduce(function(t,x){return t+x.stat.outstandingPrincipal;},0);
  var outstandingTotal=activeStats.reduce(function(t,x){return t+x.stat.outstanding;},0);
  var interestReceivable=activeStats.reduce(function(t,x){return t+x.stat.outstandingInterest;},0);
  var interestActive=activeStats.reduce(function(t,x){return t+x.stat.outstandingInterest;},0);
  var interestClosed=closedStats.reduce(function(t,x){return t+x.stat.configuredInterest;},0);
  var interestCollectedAll=nonDeclinedStats.reduce(function(t,x){return t+x.stat.paidInterest;},0);
  var overdueStats=activeStats.filter(function(x){return isOverdue(x.loan);});
  var overdueInterest=overdueStats.reduce(function(t,x){return t+x.stat.outstandingInterest;},0);
  var cashAvailable=savingsPool;
  return{
    savingsPool:savingsPool,
    savingsPoolGross:savingsPoolGross,
    activeLoanCount:activeLoans.length,
    closedLoanCount:closedLoans.length,
    pendingLoanCount:pendingLoans.length,
    deployedPrincipal:deployedPrincipal,
    recoveredPrincipal:recoveredPrincipal,
    outstandingPrincipal:outstandingPrincipal,
    outstandingTotal:outstandingTotal,
    interestReceivable:interestReceivable,
    interestActive:interestActive,
    interestClosed:interestClosed,
    interestCollectedAll:interestCollectedAll,
    overdueInterest:overdueInterest,
    availableCash:Math.max(0,cashAvailable)
  };
}
function calcAvailableLoanFunds(){
  var p=calcLoanPortfolioTotals();
  // Savings locked as collateral for active loans
  var lockedCollateral=S.loans.filter(function(l){return l.status==="Active";})
    .reduce(function(t,l){return t+(l.lockedBorrower||0)+(l.lockedG1||0)+(l.lockedG2||0);},0);
  // Approved but not-yet-paid expenses reduce available pool
  var pendingExpenses=S.expenses.filter(function(e){return e.status==="Pending";})
    .reduce(function(t,e){return t+e.amount;},0);
  return{
    savingsPool:p.savingsPool,
    deployedPrincipal:p.deployedPrincipal,
    recoveredPrincipal:p.recoveredPrincipal,
    outstandingPrincipal:p.outstandingPrincipal,
    outstandingTotal:p.outstandingTotal,
    interestReceivable:p.interestReceivable,
    lockedCollateral:lockedCollateral,
    pendingExpenses:pendingExpenses,
    available:p.availableCash,
    utilizationPct:p.savingsPoolGross>0?Math.round((p.outstandingPrincipal/p.savingsPoolGross)*100):0
  };
}

function loanEligibility(mid){
  var member=S.members.filter(function(x){return x.id===mid;})[0]||{};
  function norm(v){return String(v||"").toUpperCase().replace(/[^A-Z0-9]/g,"");}
  var myNo=norm(member.no);
  var myName=norm(member.fullName);
  function isBorrowerMatch(l){
    if(l.memberId===mid)return true;
    if(l.memberNo&&norm(l.memberNo)===myNo)return true;
    if(!l.memberId){
      var b=norm(l.borrower);
      if(b&&b===myName)return true;
      if(b&&myNo&&b.indexOf(myNo)>=0)return true;
    }
    return false;
  }
  function isGuarantorMatch(l){
    if(l.g1Id===mid||l.g2Id===mid)return true;
    if(!l.g1Id&&norm(l.g1Name)===myName)return true;
    if(!l.g2Id&&norm(l.g2Name)===myName)return true;
    return false;
  }
  var avail=memberAvailSavings(mid);
  var activeBorrowed=S.loans.filter(function(l){return l.status==="Active"&&isBorrowerMatch(l);});
  var activeGuaranteed=S.loans.filter(function(l){return l.status==="Active"&&isGuarantorMatch(l)&&!isBorrowerMatch(l);});
  var lockedAsGuarantor=activeGuaranteed.reduce(function(t,l){
    var isG1=l.g1Id===mid||(!l.g1Id&&norm(l.g1Name)===myName);
    return t+(isG1?(l.lockedG1||0):(l.lockedG2||0));
  },0);
  var hasActive=activeBorrowed.length>0||activeGuaranteed.length>0;
  var maxLoan=avail*2; // can borrow up to 2x available savings (if guarantors cover rest)
  var eligible=avail>0&&!hasActive;
  return{
    avail:avail,
    hasActive:hasActive,
    maxLoan:maxLoan,
    eligible:eligible,
    activeLoans:activeBorrowed,
    activeBorrowed:activeBorrowed,
    activeGuaranteed:activeGuaranteed,
    lockedAsGuarantor:lockedAsGuarantor
  };
}

// Expenses calculations
function totalApprovedExpenses(){
  return S.expenses.filter(function(e){return e.status==="Approved";}).reduce(function(t,e){return t+e.amount;},0);
}

function calcInterestDistribution(year){
  var pool=0;
  S.loans.forEach(function(l){
    // If manually set interest and loan was cleared, use that
    if(l.manualRealizedInterest!=null&&Number(l.manualRealizedInterest)>0&&l.clearedAt){
      if(new Date(l.clearedAt+"T12:00:00").getFullYear()===year){
        pool+=Number(l.manualRealizedInterest)||0;
      }
      return;
    }
    // Only include loans issued in this year
    if(new Date(l.issued+"T12:00:00").getFullYear()!==year)return;
    // Use TOTAL scheduled interest (captures all interest earned on the loan, active or not)
    var c=calcLoan(l.principal,l.rate,l.months);
    pool+=c.interest;
  });
  pool=Math.round(pool);
  var decEnd=new Date(year,11,31);
  var actM=S.members.filter(function(m){return (!isMemberOffboarded(m))||(m.exitDate&&new Date(m.exitDate+"T12:00:00")>decEnd);});
  var arr=actM.map(function(m){
    var sav=S.savings.filter(function(s){return s.memberId===m.id&&!s.voided&&new Date(s.date+"T12:00:00")<=decEnd;}).reduce(function(t,s){return t+s.amount;},0);
    return{memberId:m.id,memberNo:m.no,memberName:m.fullName,savings:sav};
  });
  var totalSav=arr.reduce(function(t,x){return t+x.savings;},0);
  var req=Math.round(totalSav*(SAV_INT/100));
  var actual=Math.min(pool,req);
  var effRate=totalSav>0?(actual/totalSav)*100:0;
  var dists=arr.map(function(ms){return Object.assign({},ms,{interest:Math.round(ms.savings*effRate/100)});});
  return{year:year,interestPool:pool,totalSav:totalSav,required:req,actualPool:actual,effRate:effRate.toFixed(4),distributions:dists,totalDistributed:dists.reduce(function(t,d){return t+d.interest;},0)};
}

// Interest Pool Breakdown (Debug)
function getInterestPoolBreakdown(year){
  var breakdown=[];
  S.loans.forEach(function(l){
    var scheduledInterest=0;
    var loanStatus="";
    
    if(l.manualRealizedInterest!=null&&Number(l.manualRealizedInterest)>0&&l.clearedAt){
      if(new Date(l.clearedAt+"T12:00:00").getFullYear()===year){
        breakdown.push({
          loanNo:l.no,
          borrower:l.borrower,
          principal:l.principal,
          rate:l.rate,
          months:l.months,
          issued:l.issued,
          status:"Cleared",
          source:"Manual",
          scheduledInterest:Number(l.manualRealizedInterest),
          repaidAmount:"—",
          contributedInterest:Number(l.manualRealizedInterest)
        });
      }
      return;
    }
    
    if(new Date(l.issued+"T12:00:00").getFullYear()!==year)return;
    
    var c=calcLoan(l.principal,l.rate,l.months);
    scheduledInterest=c.interest;
    loanStatus=l.status||"Unknown";
    
    breakdown.push({
      loanNo:l.no,
      borrower:l.borrower,
      principal:l.principal,
      rate:l.rate,
      months:l.months,
      issued:l.issued,
      status:loanStatus,
      source:"Calculated",
      scheduledInterest:scheduledInterest,
      repaidAmount:"—",
      contributedInterest:Math.round(scheduledInterest)
    });
  });
  return breakdown;
}

function bindLoginEvents(){
  if(S.loginStep===2){
    var hasTOTP=!!(S.loginUser&&S.loginUser.totpSecret);
    var ids=hasTOTP?["pin1","pin2","pin3","pin4","pin5","pin6"]:["pin1","pin2","pin3","pin4"];
    ids.forEach(function(id,i){
      var el=document.getElementById(id);if(!el)return;
      // Use 'input' not 'keydown' for mobile — don't re-render, just move focus
      el.addEventListener("input",function(){
        // Trim to 1 char (mobile may paste)
        if(el.value.length>1)el.value=el.value.slice(-1);
        if(el.value.length===1&&i<ids.length-1){
          var next=document.getElementById(ids[i+1]);
          if(next){next.focus();}
        }
      });
      el.addEventListener("keydown",function(e){
        if(e.key==="Backspace"&&!el.value&&i>0){
          var prev=document.getElementById(ids[i-1]);
          if(prev){prev.value="";prev.focus();}
          e.preventDefault();
        }
        if(e.key==="Enter")verifyPin();
      });
    });
    var pb=document.getElementById("pin-btn");
    if(pb){
      pb.addEventListener("click",function(e){e.preventDefault();verifyPin();});
    }
    // Focus first digit after brief delay (avoids keyboard flicker on iOS)
    setTimeout(function(){
      var p1=document.getElementById("pin1");
      if(p1){p1.focus();}
    },300);
    return;
  }

  // ── STEP 1: username + password ────────────────────
  // CRITICAL: Use separate DOM elements, NOT render() during input
  function showLoginErr(msg){
    var err=document.getElementById("login-err");
    if(err){err.style.display="";err.textContent=msg;}
  }
  function hideLoginErr(){
    var err=document.getElementById("login-err");
    if(err)err.style.display="none";
  }
  
  async function goStep1(){
    var uEl=document.getElementById("l-user");
    var pEl=document.getElementById("l-pass");
    var u=(uEl&&uEl.value||"").trim();
    var p=pEl&&pEl.value||"";
    if(!u){showLoginErr("Enter your username.");return;}
    if(isLocked(u)){showLoginErr("Account locked. Try again in "+lockMins(u)+" min.");return;}
    hideLoginErr();
    // Disable button to prevent double-submit
    var lb=document.getElementById("l-btn");
    if(lb){lb.disabled=true;lb.textContent="Checking...";}
    
    var hashed = await sha256hex(p);
    var found=S.users.filter(function(x){return x.username===u&&x.password===hashed&&x.active!==false;})[0];
    
    if(found){
      clearLockout(u);
      S.loginUser=found;
      S.loginStep=2;
      render(); // Safe here — moving to PIN step
    } else {
      recordFail(u);
      showLoginErr("Invalid credentials."+(isLocked(u)?" Locked for "+lockMins(u)+" min.":""));
      if(lb){lb.disabled=false;lb.textContent="Continue →";}
      // Clear password field for security
      if(pEl)pEl.value="";
      // Refocus username field
      if(uEl){uEl.focus();}
    }
  }

  var lb=document.getElementById("l-btn");
  if(lb){
    lb.addEventListener("click",function(e){e.preventDefault();goStep1();});
  }
  
  // IMPORTANT: Use 'keypress' instead of 'keyup' for Enter key
  // This prevents the keyboard dismissal issue on Android
  var userInput = document.getElementById("l-user");
  var passInput = document.getElementById("l-pass");
  
  if(userInput){
    userInput.addEventListener("keypress",function(e){
      if(e.key==="Enter"){
        e.preventDefault();
        if(passInput) passInput.focus();
      }
    });
  }
  
  if(passInput){
    passInput.addEventListener("keypress",function(e){
      if(e.key==="Enter"){
        e.preventDefault();
        goStep1();
      }
    });
  }
}

function verifyPin(){
  if(!S.loginUser){
    console.warn("verifyPin called without login user");
    return;
  }
  var hasTOTP=!!(S.loginUser.totpSecret);
  var ids=hasTOTP?["pin1","pin2","pin3","pin4","pin5","pin6"]:["pin1","pin2","pin3","pin4"];
  var input=ids.map(function(id){var el=document.getElementById(id);return el?el.value:"";}).join("");
  var err=document.getElementById("pin-err");
  var pk="pin:"+S.loginUser.username;
  if(isLocked(pk)){if(err){err.style.display="";err.textContent="Locked for "+lockMins(pk)+" min.";}return;}

  function showPinErr(msg){if(err){err.style.display="";err.textContent=msg;}}

  function onSuccess(){
    clearLockout(pk);
    logEvent("LOGIN",S.loginUser.name,"Login · "+S.loginUser.role+(hasTOTP?" (TOTP)":" (PIN)"));
    // Check TOTP setup need for all users (admin + members)
    var needsTOTPSetup=false;
    if(!S.loginUser.totpSecret){
      var skipped=_store.get("gic:totp_skipped")||{};
      var lastSkip=skipped[S.loginUser.id]||0;
      var daysSinceSkip=(Date.now()-lastSkip)/(1000*60*60*24);
      needsTOTPSetup=(lastSkip===0||daysSinceSkip>3);
    }
    S.user=S.loginUser;S.loginUser=null;S.loginStep=1;
    S.page=S.user.access==="member"?"my-savings":"dashboard";
    _sess.save(S.user);
    resetSessionTimer();
    scheduleAbsoluteSessionExpiry();
    attachSessionActivityListeners();
    setupRealtimeListeners();
    if(needsTOTPSetup){
      // Show TOTP setup modal right after login
      render();
      // Small delay so page renders first
      setTimeout(function(){
        S.modal={id:"setup-totp",data:S.user.id,firstLogin:true};render();
      },400);
    } else {
      render();
    }
  }

  function onFail(){
    recordFail(pk);
    logEvent("FAILED_LOGIN",S.loginUser?S.loginUser.username:"?",hasTOTP?"Wrong TOTP code":"Wrong PIN");
    showPinErr(isLocked(pk)?
      "Too many wrong attempts. Locked for "+lockMins(pk)+" min.":
      (hasTOTP?"Incorrect code. Check Google Authenticator.":"Incorrect PIN. Try again."));
    ids.forEach(function(id){var el=document.getElementById(id);if(el)el.value="";});
    setTimeout(function(){var p1=document.getElementById("pin1");if(p1)p1.focus();},100);
  }

  if(hasTOTP){
    verifyTOTP(S.loginUser.totpSecret,input)
      .then(function(ok){if(ok)onSuccess();else onFail();})
      .catch(function(){onFail();});
  } else {
    sha256hex(input).then(function(hashed){
      if(hashed===S.loginUser.pin)onSuccess();else onFail();
    }).catch(function(){onFail();});
  }
}

}

function rMembers(){
  if(S.view==="member-detail")return rMemberDetail();
  if(S.view==="add-member"||S.view==="edit-member")return rMemberForm();
  if(S.view==="minutes")return rMinutesHub(false);
  if(S.view==="exited")return rExitedMembers();
  if(S.view==="annual-fees")return rAnnualFees();
  if(S.view==="fines")return rFines();
  return rMemberList();
}
function rMemberList(){
  var q=(S.memberSearch||"").toLowerCase();
  var sf=S.memberStatusFilter||"Active";
  var filtered=S.members.filter(function(m){
    return(!q||m.fullName.toLowerCase().indexOf(q)>=0||m.no.indexOf(q)>=0||m.phone.indexOf(q)>=0)&&(sf==="All"||m.status===sf);
  });
  var canDeleteMember=CAN(S.user,"manage_members")||CAN(S.user,"full");
  var rows=filtered.map(function(m){
    var sav=memberTotalSavings(m.id),lk=memberLockedSavings(m.id);
    return'<tr onclick="goMemberDetail(\''+m.id+'\')" style="cursor:pointer">'+
      '<td data-label="No." class="mono gold-text" style="font-size:12px;font-weight:700">'+m.no+'</td>'+
      '<td data-label="Name" style="font-weight:600">'+esc(m.fullName)+'</td>'+
      '<td data-label="Phone">'+m.phone+'</td>'+
      '<td data-label="Occupation" style="color:var(--text2);font-size:12px">'+(m.occupation||"—")+'</td>'+
      '<td data-label="Total Savings"><div style="font-weight:600;font-size:12px">'+fmt(sav)+'</div>'+(lk?'<div style="font-size:10px;color:var(--red)">🔒 '+fmt(lk)+'</div>':"")+
      '</td><td data-label="Status"><span class="bdg bdg-'+(m.status==="Active"?"success":m.status==="Exited"?"gray":"danger")+'">'+m.status+'</span></td>'+(canDeleteMember?'<td><button class="btn btn-d btn-sm" style="font-size:10px;padding:3px 8px" onclick="event.stopPropagation();requestMemberDelete(\''+m.id+'\')">🗑️ Delete</button></td>':'')+'</tr>';
  }).join("");
  return'<div class="fadein"><div class="page-hdr">'+
    '<div><h1 class="fd page-title">Members</h1><div class="page-sub">'+S.members.filter(function(m){return m.status==="Active";}).length+' active · '+S.members.filter(function(m){return isMemberOffboarded(m);}).length+' exited</div></div>'+
    '<div class="fl flw">'+
      '<button class="btn btn-g btn-sm" onclick="S.view=\'minutes\';render()">📝 Minutes</button>'+
      '<button class="btn btn-g btn-sm" onclick="S.view=\'annual-fees\';render()">💳 Fees</button>'+
      '<button class="btn btn-g btn-sm" onclick="S.view=\'fines\';render()">⚠️ Fines</button>'+
      '<button class="btn btn-g btn-sm" onclick="S.view=\'exited\';render()">📂 Exited</button>'+
      (CAN(S.user,"manage_members")?'<button class="btn btn-p btn-sm" onclick="clearMemberFormUploadDraft();S.view=\'add-member\';render()">+ New</button>':"")+
    '</div></div>'+
    '<div class="card">'+
      '<div class="fl" style="margin-bottom:12px;flex-wrap:wrap;gap:8px">'+
        '<input class="inp" style="max-width:240px;font-size:14px" placeholder="Search..." value="'+esc(S.memberSearch||"")+'" oninput="S.memberSearch=this.value;render()">'+
        '<select class="inp" style="max-width:130px;font-size:14px" onchange="S.memberStatusFilter=this.value;render()">'+
          ["Active","Inactive","Exited","All"].map(function(s){return'<option'+(S.memberStatusFilter===s?" selected":"")+'>'+s+'</option>';}).join("")+'</select>'+
        '<span style="font-size:12px;color:var(--text3)">'+filtered.length+' member(s)</span>'+
      '</div>'+
      '<div class="mobile-stack"><table class="tbl"><thead><tr><th>No.</th><th>Name</th><th>Phone</th><th>Occupation</th><th>Total Savings</th><th>Status</th>'+(canDeleteMember?'<th></th>':'')+'</tr></thead>'+
      '<tbody>'+(rows||'<tr><td colspan="'+(canDeleteMember?7:6)+'" class="no-data">No members found</td></tr>')+'</tbody></table></div></div></div>';
}

function rMinutesHub(memberPortalMode){
  var canManage=canManageMinutesRecords();
  var allMinutes=(S.minutes||[]).slice().sort(function(a,b){
    var byDate=String(b.meetingDate||"").localeCompare(String(a.meetingDate||""));
    if(byDate!==0)return byDate;
    return String(b.updatedAt||"").localeCompare(String(a.updatedAt||""));
  });
  var q=(S.minutesSearch||"").toLowerCase();
  var qf=S.minutesQuarter||"all";
  var quarterOpts=["all"].concat(allMinutes.map(function(m){return m.quarter||minuteQuarterLabel(m.meetingDate);}).filter(function(v,i,a){return a.indexOf(v)===i;}));
  var minutes=allMinutes.filter(function(min){
    var quarter=min.quarter||minuteQuarterLabel(min.meetingDate);
    if(qf!=="all"&&quarter!==qf)return false;
    if(!q)return true;
    var hay=[min.title,min.summary,min.ref,quarter,min.meetingDate].join(" ").toLowerCase();
    return hay.indexOf(q)>=0;
  });
  var hdr=memberPortalMode
    ?'<div class="page-hdr"><h1 class="fd page-title">Meeting Minutes</h1><div class="page-sub">Read-only access for all members</div></div>'
    :'<div class="page-hdr"><div><h1 class="fd page-title">Meeting Minutes</h1><div class="page-sub">Quarterly records and attachments</div></div><div class="fl flw"><button class="btn btn-g btn-sm" onclick="S.view=\'list\';render()">← Back to Members</button>'+(canManage?'<button class="btn btn-p btn-sm" onclick="S.modal={id:\'add-minute\',size:\'modal-xl\'};render()">+ Upload Minutes</button>':'')+'</div></div>';
  var filters='<div class="card" style="margin-bottom:12px"><div class="fl flw" style="gap:8px"><input class="inp" style="max-width:280px" placeholder="Search title, summary, quarter..." value="'+esc(S.minutesSearch||"")+'" oninput="S.minutesSearch=this.value;render()"><select class="inp" style="max-width:170px" onchange="S.minutesQuarter=this.value;render()">'+quarterOpts.map(function(opt){return'<option value="'+esc(opt)+'"'+(S.minutesQuarter===opt?' selected':'')+'>'+(opt==="all"?'All Quarters':esc(opt))+'</option>';}).join("")+'</select><button class="btn btn-g btn-sm" onclick="S.minutesSearch=\'\';S.minutesQuarter=\'all\';render()">Reset</button><span style="font-size:12px;color:var(--text3)">'+minutes.length+' record(s)</span></div></div>';
  var rows=minutes.map(function(min){
    var files=(min.attachments||[]).map(function(att){
      var at=att||{};
      var typ=at.type||guessMimeFromName(at.name||"");
      return'<span class="minute-file-chip">📎 '+esc(at.name||"Attachment")+'</span>'+
        '<button class="btn btn-g btn-sm" style="font-size:10px;padding:3px 8px" onclick="openAttachmentViewer('+jsqs(at.url)+','+jsqs(at.name||"Attachment")+','+jsqs(typ)+')">View</button>'+
        '<a class="btn btn-p btn-sm" style="font-size:10px;padding:3px 8px" href="'+esc(at.url||"")+'" target="_blank" rel="noopener">Open</a>';
    }).join("");
    var actionBtns='<div class="minute-actions"><button class="btn btn-grn btn-sm" onclick="shareMinuteWhatsApp(\''+min.id+'\')">📱 Share</button>'+(canManage?'<button class="btn btn-g btn-sm" onclick="S.modal={id:\'add-minute\',data:\''+min.id+'\',size:\'modal-xl\'};render()">✏️ Edit</button><button class="btn btn-d btn-sm" onclick="deleteMinuteRecord(\''+min.id+'\')">🗑️ Delete</button>':'')+'</div>';
    return'<article class="minute-card">'+
      '<div class="minute-top"><div><div class="minute-title">'+esc(min.title||"Meeting Minutes")+'</div><div class="minute-meta">'+esc(min.ref||"Minutes")+' · '+fmtD(min.meetingDate)+' · '+esc(min.quarter||minuteQuarterLabel(min.meetingDate))+'</div></div><span class="bdg bdg-info">'+esc(min.quarter||minuteQuarterLabel(min.meetingDate))+'</span></div>'+
      '<div class="minute-summary">'+esc(min.summary||"No summary recorded.")+'</div>'+
      '<div>'+(min.attachments&&min.attachments.length?'<div class="minute-files">'+files+'</div>':'<div class="alert alert-warn" style="margin:0">No file attachment uploaded yet for this minute set.</div>')+'</div>'+
      '<div class="minute-meta">Recorded by '+esc(min.createdBy||"secretary")+' · Updated '+fmtD(min.updatedAt||min.createdAt||min.meetingDate)+'</div>'+actionBtns+
    '</article>';
  }).join("");
  return'<div class="fadein">'+hdr+
    '<div class="alert alert-info" style="font-size:12px">All members can read published meeting minutes here. Upload and edits are restricted to Secretary and IT Admin.</div>'+
    filters+
    '<div class="minutes-wrap">'+(rows||'<div class="card no-data" style="grid-column:1/-1">No minutes posted yet. '+(canManage?'Use + Upload Minutes to publish the first record.':'Please check back after the Secretary posts minutes.')+'</div>')+'</div>'+
  '</div>';
}

function rAnnualFees(){
  // Only 2026 onwards
  var year=2026;
  var activeMembers=S.members.filter(function(m){return m.status==="Active";});
  var canFinanceEdit=canManageFinanceRecords();
  var paid=activeMembers.filter(function(m){return(m.annualFees||[]).some(function(f){return f.year===year&&f.status==="Paid";});});
  var unpaid=activeMembers.filter(function(m){return!(m.annualFees||[]).some(function(f){return f.year===year&&f.status==="Paid";});});
  var totalCollected=paid.reduce(function(t,m){var f=(m.annualFees||[]).filter(function(x){return x.year===year&&x.status==="Paid";})[0];return t+(f?f.amount:0);},0);
  
  // Sort members based on current sort preference
  var sortedMembers=activeMembers.slice().sort(function(a,b){
    var dir=S.feeSortDir==="asc"?1:-1;
    var sortBy=S.feeSortBy||"member";
    var feeA=(a.annualFees||[]).filter(function(f){return f.year===year;})[0];
    var feeB=(b.annualFees||[]).filter(function(f){return f.year===year;})[0];
    
    if(sortBy==="member"){return a.fullName.localeCompare(b.fullName)*dir;}
    if(sortBy==="amount"){
      var amtA=(feeA&&feeA.amount)||REG_FEE;
      var amtB=(feeB&&feeB.amount)||REG_FEE;
      return(amtA-amtB)*dir;
    }
    if(sortBy==="status"){
      var statA=(feeA&&feeA.status)||"Unpaid";
      var statB=(feeB&&feeB.status)||"Unpaid";
      return statA.localeCompare(statB)*dir;
    }
    if(sortBy==="date"){
      var dateA=(feeA&&feeA.date)||"";var dateB=(feeB&&feeB.date)||"";if(!dateA)return dir;if(!dateB)return-dir;return dateA.localeCompare(dateB)*dir;
    }
    return 0;
  });
  
  var rows=sortedMembers.map(function(m){
    var fee=(m.annualFees||[]).filter(function(f){return f.year===year;})[0];
    var actions='';
    if((!fee||fee.status!=="Paid")&&CAN(S.user,"manage_fees"))actions+='<button class="btn btn-grn btn-sm" style="font-size:10px;padding:3px 8px" onclick="markFeePaid(\''+m.id+'\','+year+')">Mark Paid</button>';
    if(canFinanceEdit&&fee)actions+='<button class="btn btn-g btn-sm" style="font-size:10px;padding:3px 8px;margin-left:4px" onclick="editAnnualFeeRecord(\''+m.id+'\','+year+')">✏️ Edit</button><button class="btn btn-d btn-sm" style="font-size:10px;padding:3px 8px;margin-left:4px" onclick="deleteAnnualFeeRecord(\''+m.id+'\','+year+')">🗑️ Delete</button>';
    return'<tr><td><div style="font-weight:500;font-size:12px">'+esc(m.fullName)+'</div><div class="mono" style="font-size:10px;color:var(--text3)">'+m.no+'</div></td>'+
      '<td>'+fmt((fee&&fee.amount)||REG_FEE)+'</td>'+
      '<td><span class="bdg bdg-'+(fee&&fee.status==="Paid"?"success":"warning")+'">'+(fee&&fee.status||"Unpaid")+'</span></td>'+
      '<td style="font-size:11px">'+fmtD(fee&&fee.date)+'</td>'+
      '<td>'+(actions||"<span style='color:var(--text3);font-size:11px'>—</span>")+'</td></tr>';
  }).join("");
  return'<div class="fadein"><div class="fl" style="gap:8px;margin-bottom:16px"><button class="btn btn-g btn-sm" onclick="S.view=\'list\';render()">← Back</button><h1 class="fd page-title" style="font-size:18px;margin-left:8px">Annual Registration Fees — '+year+'</h1></div>'+
    '<div class="grid3" style="margin-bottom:14px">'+
      ['<div class="stat-card"><div class="stat-icon" style="background:#057A551A">💳</div><div><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">Collected ('+year+')</div><div style="font-size:16px;font-weight:700;color:var(--green);margin-top:2px">'+fmt(totalCollected)+'</div></div></div>',
       '<div class="stat-card"><div class="stat-icon" style="background:#C9A84C1A">👥</div><div><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">Paid</div><div style="font-size:16px;font-weight:700;color:var(--navy);margin-top:2px">'+paid.length+' / '+activeMembers.length+'</div></div></div>',
       '<div class="stat-card"><div class="stat-icon" style="background:#C0392B1A">⚠️</div><div><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">Pending</div><div style="font-size:16px;font-weight:700;color:var(--red);margin-top:2px">'+unpaid.length+' members</div></div></div>'].join("")+
    '</div>'+
    '<div class="card">'+
      '<div class="alert alert-info" style="font-size:12px;margin-bottom:12px">Annual fees of UGX '+REG_FEE.toLocaleString()+'/member/year cover operational costs and are tracked <strong>separately</strong> from the savings pool. Due by <strong>'+annualFeeDeadline(year)+'</strong>.</div>'+
      '<table class="tbl"><thead><tr>'+
        '<th style="cursor:pointer;user-select:none" onclick="S.feeSortBy=\'member\';S.feeSortDir=S.feeSortDir===\'asc\'?\'desc\':\'asc\';render()">Member '+(S.feeSortBy==="member"?'<span style="font-size:12px;color:var(--gold)">'+(S.feeSortDir==="asc"?"↑":"↓")+'</span>':'')+' </th>'+
        '<th style="cursor:pointer;user-select:none" onclick="S.feeSortBy=\'amount\';S.feeSortDir=S.feeSortDir===\'asc\'?\'desc\':\'asc\';render()">Amount '+(S.feeSortBy==="amount"?'<span style="font-size:12px;color:var(--gold)">'+(S.feeSortDir==="asc"?"↑":"↓")+'</span>':'')+' </th>'+
        '<th style="cursor:pointer;user-select:none" onclick="S.feeSortBy=\'status\';S.feeSortDir=S.feeSortDir===\'asc\'?\'desc\':\'asc\';render()">Status '+(S.feeSortBy==="status"?'<span style="font-size:12px;color:var(--gold)">'+(S.feeSortDir==="asc"?"↑":"↓")+'</span>':'')+' </th>'+
        '<th style="cursor:pointer;user-select:none" onclick="S.feeSortBy=\'date\';S.feeSortDir=S.feeSortDir===\'asc\'?\'desc\':\'asc\';render()">Date Paid '+(S.feeSortBy==="date"?'<span style="font-size:12px;color:var(--gold)">'+(S.feeSortDir==="asc"?"↑":"↓")+'</span>':'')+' </th>'+
        '<th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table>'+
      '<div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--gray2);font-size:13px">'+
        '<span style="color:var(--text3)">Total Annual Fees Collected ('+year+')</span>'+
        '<span style="font-weight:700;color:var(--green)">'+fmt(totalCollected)+'</span></div>'+
    '</div></div>';
}

function rSavings(){

      '<td class="green-text">'+fmt(overviewTotalSav)+'</td>'+
      '<td class="red-text">'+(overviewTotalLk?fmt(overviewTotalLk):"—")+'</td>'+
      '<td class="navy-text">'+fmt(overviewTotalAv)+'</td>'+
      '<td>'+overviewTotalMo+'</td><td></td></tr>';

    uniqueYears.forEach(function(yr) {
