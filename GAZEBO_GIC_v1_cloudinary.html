function enhanceSavingsLedger(){
  if(S.page!="savings"||S.savTab!="ledger")return;
  if(!S.user)return;
  var canDelete=(S.user.access==="treasurer"||S.user.access==="full"||S.user.access==="secretary");
  if(!canDelete)return;
  var table=document.querySelector('.page-content .tbl');
  if(!table)return;
  var header=table.querySelector('thead tr');
  if(!header||header.innerHTML.indexOf('Delete')>=0)return;
  header.insertAdjacentHTML('beforeend','<th>Delete</th>');
  var rows=table.querySelectorAll('tbody tr');
  rows.forEach(function(row){
    var refCell=row.querySelector('td[data-label="Ref"]');
    if(!refCell){row.insertAdjacentHTML('beforeend','<td>—</td>');return;}
    var ref=refCell.textContent.trim();
    var entry=S.savings.filter(function(s){return s.ref===ref;})[0];
    if(!entry){row.insertAdjacentHTML('beforeend','<td>—</td>');return;}
    var hasPending=S.amendments.some(function(a){return a.savingsId===entry.id&&a.status==="Pending";});
    if(entry.voided||hasPending){row.insertAdjacentHTML('beforeend','<td>—</td>');return;}
    row.insertAdjacentHTML('beforeend','<td><button class="btn btn-d btn-sm" style="font-size:10px;padding:3px 8px" onclick="requestSavingsDelete(\''+entry.id+'\')">🗑️</button></td>');
  });
}

// ─── 20. LOANS ─────────────────────────────────────
function rLoans(){if(S.view==="loan-detail")return rLoanDetail();return rLoanList();}
function rLoanList(){
  var tab=S.loanTab||"active";
  var metric=S.loanMetricFilter||"all";
  var tabMap={active:"Active",pending:"Pending",cleared:"Cleared",declined:"Declined"};
  var tabFiltered=tab==="all"?S.loans:S.loans.filter(function(l){return l.status===tabMap[tab];});
  var filtered=tabFiltered;
  filtered=filtered.filter(function(l){
    var st=loanStat(l);
    if(metric==="overdue")return l.status==="Active"&&isOverdue(l);
    if(metric==="outstanding")return st.outstanding>0;
    if(metric==="interest-pending")return st.outstandingInterest>0;
    if(metric==="interest-cleared")return l.status==="Cleared"&&st.totalInterestDue>0&&st.outstandingInterest<=0;
    if(metric==="interest-collected")return st.paidInterest>0;
    if(metric==="principal-pending")return st.outstandingPrincipal>0;
    if(metric==="principal-cleared")return st.outstandingPrincipal<=0;
    return true;
  });
  var filtersHidingData=S.loans.length>0&&filtered.length===0;
  var showActions=filtered.some(function(loan){return canUserApproveLoan(loan,S.user)||hasUserApprovedLoan(loan,S.user&&S.user.id)||canManageLoanRecords(S.user)&&(loan.status==="Pending"||loan.isHistorical);});

  var loanStats=S.loans.map(function(l){return{loan:l,st:loanStat(l)};});
  var pendingOrActiveStats=loanStats.filter(function(x){return x.loan.status==="Pending"||x.loan.status==="Active";});
  var clearedStats=loanStats.filter(function(x){return x.loan.status==="Cleared";});
  var interestPending=pendingOrActiveStats.reduce(function(t,x){return t+x.st.outstandingInterest;},0);
  var interestCleared=clearedStats.reduce(function(t,x){return t+x.st.paidInterest;},0);
  var principalPending=pendingOrActiveStats.reduce(function(t,x){return t+x.st.outstandingPrincipal;},0);
  var principalCleared=clearedStats.reduce(function(t,x){return t+x.st.paidPrincipal;},0);

  var statusRank={"Pending":1,"Active":2,"Cleared":3,"Declined":4};
  function sortVal(loan,key){
    var st=loanStat(loan);
    if(key==="no")return String(loan.no||"");
    if(key==="borrower")return String(loan.borrower||"");
    if(key==="principal")return Number(loan.principal||0);
    if(key==="interest")return Number(st.totalInterestDue||0);
    if(key==="rate")return Number(loan.rate||0);
    if(key==="due")return String(loanDueDate(loan,loan.months)||"");
    if(key==="outstanding")return Number(st.outstanding||0);
    if(key==="status")return Number(statusRank[loan.status]||99);
    return String(loan.no||"");
  }
  function cmp(a,b,key){
    var av=sortVal(a,key),bv=sortVal(b,key);
    if(typeof av==="number"&&typeof bv==="number")return av-bv;
    return String(av).localeCompare(String(bv));
  }
  var sortedFiltered=filtered.slice();
  if(S.loanSortBy){
    sortedFiltered.sort(function(a,b){
      var base=cmp(a,b,S.loanSortBy);
      if(base===0)base=cmp(a,b,"no");
      return (S.loanSortDir||"asc")==="desc"?-base:base;
    });
  }
  var rows=sortedFiltered.map(function(loan){
    var st=loanStat(loan),over=isOverdue(loan);
    var interestDone=loan.status==="Active"&&st.totalInterestDue>0&&st.outstandingInterest<=0;
    return'<tr onclick="goLoanDetail(\''+loan.id+'\')" style="cursor:pointer">'+
      '<td data-label="No." class="mono gold-text" style="font-size:11px;font-weight:700">'+loan.no+'</td>'+
      '<td data-label="Borrower"><div style="font-weight:600">'+esc(loan.borrower)+'</div><span class="bdg bdg-'+(loan.isMember?"info":"gold")+'" style="font-size:10px">'+(loan.isMember?"Member":"Non-Member")+'</span></td>'+
      '<td data-label="Principal" style="font-weight:700">'+fmt(loan.principal)+'</td>'+

// ─── RENDER MEMBER NOTIFICATIONS ────────────────────
function rMemberNotifications(memberId){
  var notifs=getMemberNotifications(memberId);
  if(!notifs.length)return"";

  var recent=notifs.slice(-2).reverse();
  return recent.map(function(n){
    var smartDetails=n.smartDetails||{};
    var fullMonths=[];
    var partialMonths=[];
    var seenFull={};
    var seenPartial={};

    if(smartDetails.fullyCoveredMonths&&smartDetails.fullyCoveredMonths.length){
      smartDetails.fullyCoveredMonths.forEach(function(m){
        var key=m.yr+"-"+m.mo;
        if(!seenFull[key]){seenFull[key]=1;fullMonths.push({yr:m.yr,mo:m.mo});}
      });
    }
    if(smartDetails.partiallyCoveredMonth){
      var pm=smartDetails.partiallyCoveredMonth;
      var pkey=pm.yr+"-"+pm.mo;
      if(!seenPartial[pkey]){seenPartial[pkey]=1;partialMonths.push({yr:pm.yr,mo:pm.mo});}
    }
    var inferredAllocByMonth={};
    if(n.months&&n.months.length&&typeof n.amount==="number"){
      var orderedMonths=n.months.slice().sort(function(a,b){return a.yr!==b.yr?a.yr-b.yr:a.mo-b.mo;});
      var rem=n.amount;
      orderedMonths.forEach(function(m){
        if(rem<=0)return;
        var inf=Math.min(MC,rem);
        inferredAllocByMonth[m.yr+"-"+m.mo]=inf;
        rem-=inf;
      });
    }

    if(n.months&&n.months.length){
      n.months.forEach(function(m){
        var key=m.yr+"-"+m.mo;
        var amt=(typeof m.amount==="number")?m.amount:inferredAllocByMonth[key];
        if(typeof amt==="number"&&amt<MC){
          if(!seenPartial[key]){seenPartial[key]=1;partialMonths.push({yr:m.yr,mo:m.mo});}
        }else if(!seenFull[key]&&!seenPartial[key]){
          seenFull[key]=1;fullMonths.push({yr:m.yr,mo:m.mo});
        }
      });
    }
    fullMonths.sort(function(a,b){return a.yr!==b.yr?a.yr-b.yr:a.mo-b.mo;});
    partialMonths.sort(function(a,b){return a.yr!==b.yr?a.yr-b.yr:a.mo-b.mo;});

    var fullText=fullMonths.length?fullMonths.map(function(m){return MS[m.mo]+" "+m.yr;}).join(", "):"";
    var partialText=partialMonths.length?partialMonths.map(function(m){return MS[m.mo]+" "+m.yr;}).join(", "):"";
    var fallbackText=!fullText&&!partialText?(n.details?esc(n.details):"This contribution cycle"):"";

    var fullBlock=(fullText||fallbackText)
      ?'<div style="margin-bottom:6px;padding:8px;background:rgba(5,122,85,.08);border-left:3px solid var(--green);border-radius:4px;font-size:12px"><strong style="color:var(--green)">✓ Applied To (Full):</strong> '+(fullText||fallbackText)+'</div>'
      :'';
    var partialBlock=partialText
      ?'<div style="margin-bottom:6px;padding:8px;background:rgba(245,158,11,.12);border-left:3px solid #F59E0B;border-radius:4px;font-size:12px"><strong style="color:#B45309">● Applied To (Partial):</strong> '+partialText+'</div>'
      :'';

    return'<div class="card" style="border-left:4px solid var(--gold);background:rgba(201,168,76,.05);margin-bottom:12px;overflow:hidden">'+
      '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px">'+
        '<div><div style="font-weight:700;color:var(--gold);font-size:14px">💰 Savings Credit Received</div><div style="font-size:11px;color:var(--text3);margin-top:2px">Deposit of '+fmt(n.amount)+'</div></div>'+
        '<button onclick="dismissNotification(\''+n.id+'\')" style="background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:18px;padding:0;margin:-4px 0 0 0">✕</button>'+
      '</div>'+
      fullBlock+
      partialBlock+
      '<button onclick="dismissAllNotificationsForMember(\''+memberId+'\')" style="width:100%;padding:8px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:4px;cursor:pointer;font-size:12px;color:var(--navy);font-weight:500;margin-top:4px">Dismiss</button>'+
    '</div>';
  }).join("");
}

function rMyLoans(){
  var m=getMyMember();if(!m)return'<div class="card no-data">No member profile linked.</div>';
  function normPerson(v){return String(v||"").toUpperCase().replace(/[^A-Z0-9]/g,"");}
  var myNo=normPerson(m.no);
  var myName=normPerson(m.fullName);
  function isBorrowerMatch(l){
    if(l.memberId===m.id)return true;
    if(l.memberNo&&normPerson(l.memberNo)===myNo)return true;
    if(!l.memberId){
      var b=normPerson(l.borrower);
      if(b&&b===myName)return true;
      if(b&&myNo&&b.indexOf(myNo)>=0)return true;
    }
    return false;
  }
  function isGuarantorMatch(l){
    if(l.g1Id===m.id||l.g2Id===m.id)return true;
    if(!l.g1Id&&normPerson(l.g1Name)===myName)return true;
    if(!l.g2Id&&normPerson(l.g2Name)===myName)return true;
    return false;
  }
  var myLoans=S.loans.filter(function(l){return isBorrowerMatch(l)||isGuarantorMatch(l);});
  var borrowedLoans=myLoans.filter(function(l){return isBorrowerMatch(l);});
  return'<div class="fadein">'+
    renderUserAttentionAlerts(S.user)+
    '<div class="page-hdr"><h1 class="fd page-title">My Loans</h1></div>'+
    (borrowedLoans.length?borrowedLoans.map(function(loan){
      var c=calcLoan(loan.principal,loan.rate,loan.months),st=loanStat(loan);
      var over=isOverdue(loan);
      var interestDone=loan.status==="Active"&&st.totalInterestDue>0&&st.outstandingInterest<=0;
      var approvals=getLoanApprovals(loan).map(function(a){return a.name;}).join(", ")||"—";
      var progressPct=loan.status==="Pending"?Math.round((getLoanApprovalCount(loan)/(loan.requiredApprovals||loanApprovalThreshold()))*100):st.pct;
      return'<div class="card" style="margin-bottom:12px;border-left:4px solid '+(over?"var(--red)":st.pct>=100?"var(--green)":"var(--gold)")+'">'+
        '<div class="fl" style="justify-content:space-between;margin-bottom:10px">'+
          '<div><div style="font-weight:700;font-size:14px">'+esc(loan.no)+'</div><div style="font-size:12px;color:var(--text3)">'+fmtD(loan.issued)+' · Due: '+fmtD(loanDueDate(loan,loan.months))+'</div></div>'+

  // ── Walk EVERY savings record ──

  var activeRecs=allRecs.filter(function(s){return!s.voided;});
  // Future = record date is after current month end
  var futureRecs=activeRecs.filter(function(s){return s.yr>curYr||(s.yr===curYr&&s.mo>curMo);});
  var currentRecs=activeRecs.filter(function(s){return s.yr<curYr||(s.yr===curYr&&s.mo<=curMo);});
  // Orphans = savings where memberId doesn't exist in members list
  var memberIds=S.members.map(function(m){return m.id;});
  var orphanRecs=activeRecs.filter(function(s){return memberIds.indexOf(s.memberId)<0;});
  // ── Per-member breakdown ──
  var perMember=[];
  S.members.forEach(function(m){
    var mRecs=activeRecs.filter(function(s){return s.memberId===m.id;});
    var mCurrent=currentRecs.filter(function(s){return s.memberId===m.id;});
    var mFuture=futureRecs.filter(function(s){return s.memberId===m.id;});
    var total=mRecs.reduce(function(t,s){return t+s.amount;},0);
    var currentTotal=mCurrent.reduce(function(t,s){return t+s.amount;},0);
    var futureTotal=mFuture.reduce(function(t,s){return t+s.amount;},0);
    var fnTotal=memberTotalSavings(m.id);
    var mismatch=total!==fnTotal;
    perMember.push({id:m.id,no:m.no,name:m.fullName,status:m.status,
      records:mRecs.length,currentRecords:mCurrent.length,futureRecords:mFuture.length,
      total:total,currentTotal:currentTotal,futureTotal:futureTotal,
      fnTotal:fnTotal,mismatch:mismatch});
  });
  var activeMembers=perMember.filter(function(p){return p.status==="Active";});
  var exitedMembers=perMember.filter(function(p){return p.status==="Exited";});
  // ── Compute totals ──
  var grandTotalAll=activeRecs.reduce(function(t,s){return t+s.amount;},0);
  var grandTotalCurrent=currentRecs.reduce(function(t,s){return t+s.amount;},0);
  var grandTotalFuture=futureRecs.reduce(function(t,s){return t+s.amount;},0);
  var activeMemberTotal=activeMembers.reduce(function(t,p){return t+p.total;},0);
  var activeMemberCurrentTotal=activeMembers.reduce(function(t,p){return t+p.currentTotal;},0);
  var activeLockedTotal=activeMembers.reduce(function(t,p){return t+memberLockedSavings(p.id);},0);
  var activeAvailableTotal=Math.max(0,activeMemberTotal-activeLockedTotal);
  var exitedMemberTotal=exitedMembers.reduce(function(t,p){return t+p.total;},0);
  var voidedTotal=voidedRecs.reduce(function(t,s){return t+s.amount;},0);
  var orphanTotal=orphanRecs.reduce(function(t,s){return t+s.amount;},0);
  var fnGrandTotal=activePoolSavings();
  // ── Issues ──
  var issues=[];
  if(exitedMemberTotal>0) issues.push({icon:"🚪",msg:"Exited member savings of "+fmt(exitedMemberTotal)+" are included in the pool total but not shown in the active members table.",sev:"info"});
  if(orphanRecs.length) issues.push({icon:"⚠️",msg:orphanRecs.length+" orphan record(s) ("+fmt(orphanTotal)+") belong to member IDs that no longer exist.",sev:"err"});
  var mismatches=perMember.filter(function(p){return p.mismatch;});
  if(mismatches.length) issues.push({icon:"🔢",msg:mismatches.length+" member(s) have a mismatch between record sum and function total. This should not happen.",sev:"err"});
  // ── Render ──
  var memberRows=perMember.filter(function(p){return p.status==="Active";}).sort(function(a,b){return b.total-a.total;}).map(function(p){
    var hasF=p.futureRecords>0;
    return'<tr style="'+(hasF?"background:#FEF9EC":"")+'">'+
      '<td class="mono gold-text" style="font-size:11px">'+p.no+'</td>'+
      '<td style="font-weight:600;font-size:12px">'+esc(p.name)+'</td>'+
      '<td style="text-align:center">'+p.currentRecords+(hasF?' <span style="color:var(--gold);font-size:10px">+'+p.futureRecords+'f</span>':"")+'</td>'+
      '<td class="green-text" style="font-weight:700;text-align:right">'+fmt(p.currentTotal)+'</td>'+
      (hasF?'<td class="gold-text" style="font-weight:600;text-align:right;font-size:12px">'+fmt(p.futureTotal)+'</td>':'<td style="text-align:right;color:var(--text3)">—</td>')+
      '<td style="font-weight:700;text-align:right;color:var(--navy)">'+fmt(p.total)+'</td>'+
      '<td>'+(p.mismatch?'<span class="bdg bdg-danger">❌ Mismatch</span>':'<span class="bdg bdg-success">✓</span>')+'</td></tr>';
  }).join("");
  var exitedRows=exitedMembers.map(function(p){
    return'<tr style="background:#F5F5F5;color:var(--text3)">'+
      '<td class="mono" style="font-size:11px">'+p.no+'</td>'+
      '<td style="font-size:12px">'+esc(p.name)+' <span class="bdg bdg-gray">Exited</span></td>'+
      '<td style="text-align:center">'+p.records+'</td>'+
      '<td style="text-align:right">'+fmt(p.currentTotal)+'</td>'+
      '<td style="text-align:right">—</td>'+
      '<td style="font-weight:600;text-align:right">'+fmt(p.total)+'</td>'+
      '<td><span class="bdg bdg-gray">Exited</span></td></tr>';
  }).join("");
  var alertCls={warn:"alert-warn",err:"alert-err",info:"alert-info"};
  var issueHtml=issues.map(function(i){return'<div class="alert '+alertCls[i.sev]+'" style="font-size:12px;margin-bottom:6px">'+i.icon+' '+i.msg+'</div>';}).join("");
  if(!issues.length)issueHtml='<div class="alert alert-ok" style="font-size:12px">✅ No issues found — all savings records are consistent and correctly computed.</div>';

  return mhdr("🔍 Savings Reconciliation Audit")+
    '<div class="mbody">'+
      '<div class="alert alert-info" style="font-size:12px;margin-bottom:12px">This audit walks through <strong>every</strong> savings record, computes per-member totals from scratch, and flags discrepancies.</div>'+
      // ── Summary cards ──
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">'+
        '<div style="background:var(--bg);border-radius:8px;padding:12px;text-align:center">'+
          '<div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">Active Members</div>'+
          '<div style="font-size:18px;font-weight:700;color:var(--green);margin-top:4px">'+fmt(activeMemberTotal)+'</div>'+
          '<div style="font-size:10px;color:var(--text3)">'+activeMembers.length+' members · all months incl. future</div></div>'+
        '<div style="background:var(--bg);border-radius:8px;padding:12px;text-align:center">'+
          '<div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">Current Months</div>'+
          '<div style="font-size:18px;font-weight:700;color:var(--navy);margin-top:4px">'+fmt(activeMemberCurrentTotal)+'</div>'+
          '<div style="font-size:10px;color:var(--text3)">Up to '+MS[curMo]+' '+curYr+'</div></div>'+
        '<div style="background:var(--bg);border-radius:8px;padding:12px;text-align:center">'+
          '<div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">+ Exited Members</div>'+
          '<div style="font-size:18px;font-weight:700;color:var(--text3);margin-top:4px">'+(exitedMemberTotal>0?"+"+fmt(exitedMemberTotal):"—")+'</div>'+
          '<div style="font-size:10px;color:var(--text3)">'+exitedMembers.length+' exited</div></div>'+
      '</div>'+
      // ── Grand total math ──
      '<div style="background:var(--navy);border-radius:10px;padding:14px;color:white;margin-bottom:14px">'+
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gold);margin-bottom:8px">RECONCILIATION MATH</div>'+
        '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #1E3350"><span>Active members gross (all months)</span><span style="font-weight:700">'+fmt(activeMemberTotal)+'</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #1E3350;color:#9CA3AF"><span>− Active loan locks</span><span style="font-weight:700">− '+fmt(activeLockedTotal)+'</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:15px;font-weight:700;border-top:2px solid var(--gold);margin-top:4px"><span>= Active pool (net)</span><span>'+fmt(activeAvailableTotal)+'</span></div>'+
        (exitedMemberTotal>0?'<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #1E3350;color:#9CA3AF"><span>+ Exited member savings</span><span style="font-weight:700">+ '+fmt(exitedMemberTotal)+'</span></div>':"")+
        '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:#7F8C9A"><span>Dashboard shows (net pool)</span><span>'+fmt(fnGrandTotal)+'</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:'+(activeAvailableTotal===fnGrandTotal?"#6EE7B7":"#F87171")+'"><span>Match?</span><span>'+(activeAvailableTotal===fnGrandTotal?"✅ Yes — totals match":"❌ MISMATCH of "+fmt(Math.abs(activeAvailableTotal-fnGrandTotal)))+'</span></div>'+
        (voidedTotal>0?'<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;color:#6B7280"><span>Voided records excluded</span><span>'+fmt(voidedTotal)+' ('+voidedRecs.length+' records)</span></div>':"")+

function mMemberDataAudit(){
  var memberById={};
  (S.members||[]).forEach(function(m){memberById[m.id]=m;});
  var activeLoans=(S.loans||[]).filter(function(l){return l.status==="Active";});
  var orphanSavings=(S.savings||[]).filter(function(s){return !s.voided&&!memberById[s.memberId];});
  var orphanRepayments=(S.repayments||[]).filter(function(r){return !S.loans.some(function(l){return l.id===r.loanId;});});
  var orphanBorrowerLoans=(S.loans||[]).filter(function(l){return l.isMember!==false&&!memberById[l.memberId];});
  var orphanGuarantorLinks=(S.loans||[]).filter(function(l){return (l.g1Id&&!memberById[l.g1Id])||(l.g2Id&&!memberById[l.g2Id]);});
  var rows=(S.members||[]).slice().sort(function(a,b){return String(a.no||"").localeCompare(String(b.no||""));}).map(function(m){
    var savingsTotal=memberTotalSavings(m.id);
    var locked=memberLockedSavings(m.id);
    var available=Math.max(0,savingsTotal-locked);
    var borrowedLoans=activeLoans.filter(function(l){return l.memberId===m.id;});
    var guaranteedLoans=activeLoans.filter(function(l){return l.g1Id===m.id||l.g2Id===m.id;});
    var outstandingBorrowed=borrowedLoans.reduce(function(t,l){return t+loanStat(l).outstanding;},0);
    var issues=[];
    if(locked>savingsTotal)issues.push("Overlocked");
    if(borrowedLoans.length&&m.status!=="Active")issues.push("Borrower inactive");
    if(guaranteedLoans.length&&m.status!=="Active")issues.push("Guarantor inactive");
    return{no:m.no||"—",name:m.fullName||"—",status:m.status||"—",savingsTotal:savingsTotal,locked:locked,available:available,borrowedCount:borrowedLoans.length,guaranteedCount:guaranteedLoans.length,outstandingBorrowed:outstandingBorrowed,issues:issues};
  });
  var totals={
    members:(S.members||[]).length,
    activeMembers:(S.members||[]).filter(function(m){return m.status==="Active";}).length,
    totalSavings:rows.reduce(function(t,r){return t+r.savingsTotal;},0),
    totalLocked:rows.reduce(function(t,r){return t+r.locked;},0),
    activeLoanOutstanding:activeLoans.reduce(function(t,l){return t+loanStat(l).outstanding;},0),
    overdueLoans:activeLoans.filter(function(l){return isOverdue(l);}).length
  };
  var alerts=[];
  if(orphanSavings.length)alerts.push({cls:"alert-err",msg:"Savings records without a valid member: "+orphanSavings.length});
  if(orphanRepayments.length)alerts.push({cls:"alert-err",msg:"Repayment records without a valid loan: "+orphanRepayments.length});
  if(orphanBorrowerLoans.length)alerts.push({cls:"alert-err",msg:"Member loans without a valid borrower link: "+orphanBorrowerLoans.length});
  if(orphanGuarantorLinks.length)alerts.push({cls:"alert-warn",msg:"Loans with missing guarantor links: "+orphanGuarantorLinks.length});
  if(rows.some(function(r){return r.issues.length;}))alerts.push({cls:"alert-warn",msg:"Members with tally/status issues: "+rows.filter(function(r){return r.issues.length;}).length});
  if(!alerts.length)alerts.push({cls:"alert-ok",msg:"No member savings/loans integrity issues found in the current dataset."});
  return mhdr("🧮 Member Savings & Loans Audit")+
    '<div class="mbody">'+
      '<div class="alert alert-info" style="font-size:12px;margin-bottom:12px">This audit checks member-linked savings totals, locked savings, borrower/guarantor exposure, and orphaned savings, loans, and repayment links in the current dataset.</div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">'+
        '<div style="background:var(--bg);border-radius:8px;padding:12px;text-align:center"><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">Members</div><div style="font-size:18px;font-weight:700;color:var(--navy);margin-top:4px">'+totals.members+'</div><div style="font-size:10px;color:var(--text3)">'+totals.activeMembers+' active</div></div>'+
        '<div style="background:var(--bg);border-radius:8px;padding:12px;text-align:center"><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">Savings Tallied</div><div style="font-size:18px;font-weight:700;color:var(--green);margin-top:4px">'+fmt(totals.totalSavings)+'</div><div style="font-size:10px;color:var(--text3)">Locked '+fmt(totals.totalLocked)+'</div></div>'+
        '<div style="background:var(--bg);border-radius:8px;padding:12px;text-align:center"><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">Active Loan Exposure</div><div style="font-size:18px;font-weight:700;color:var(--red);margin-top:4px">'+fmt(totals.activeLoanOutstanding)+'</div><div style="font-size:10px;color:var(--text3)">'+totals.overdueLoans+' overdue</div></div>'+
      '</div>'+
      alerts.map(function(a){return '<div class="alert '+a.cls+'" style="font-size:12px;margin-bottom:6px">'+a.msg+'</div>';}).join('')+
      '<div class="sec-hdr" style="margin-top:14px">Per-Member Financial Tally</div>'+
      '<div style="overflow-x:auto"><table class="tbl tbl-sm"><thead><tr><th>No.</th><th>Member</th><th>Status</th><th style="text-align:right">Savings</th><th style="text-align:right">Locked</th><th style="text-align:right">Available</th><th style="text-align:center">Borrowing</th><th style="text-align:center">Guarantees</th><th style="text-align:right">Outstanding</th><th>Check</th></tr></thead><tbody>'+
        rows.map(function(r){return '<tr'+(r.issues.length?' style="background:#FEF2F2"':'')+'><td class="mono gold-text" style="font-size:11px">'+r.no+'</td><td style="font-weight:600;font-size:12px">'+esc(r.name)+'</td><td>'+esc(r.status)+'</td><td style="text-align:right" class="green-text">'+fmt(r.savingsTotal)+'</td><td style="text-align:right" class="red-text">'+fmt(r.locked)+'</td><td style="text-align:right">'+fmt(r.available)+'</td><td style="text-align:center">'+r.borrowedCount+'</td><td style="text-align:center">'+r.guaranteedCount+'</td><td style="text-align:right">'+fmt(r.outstandingBorrowed)+'</td><td>'+(r.issues.length?'<span class="bdg bdg-danger">'+esc(r.issues.join(", "))+'</span>':'<span class="bdg bdg-success">OK</span>')+'</td></tr>';}).join('')+
      '</tbody></table></div>'+
      '<div style="font-size:10px;color:var(--text3);margin-top:8px">Audit run: '+now().toLocaleString("en-UG")+' · Savings: '+(S.savings||[]).length+' · Loans: '+(S.loans||[]).length+' · Repayments: '+(S.repayments||[]).length+'</div>'+
    '</div>'+
    mfoot('<button class="btn btn-g" onclick="closeModal()">Close</button>','<button class="btn btn-s btn-sm" onclick="exportToExcel()">⬇️ Export Excel</button>');
}

async function removeFutureSavings(){
  var n=now();var curYr=n.getFullYear();var curMo=n.getMonth();
  var before=S.savings.length;
  S.savings=S.savings.filter(function(s){
    if(s.voided)return true; // keep voided records
    if(s.yr>curYr||(s.yr===curYr&&s.mo>curMo))return false; // remove future
    return true;
  });
  var removed=before-S.savings.length;
  await DB.set(K.savings,S.savings);
  logEvent("SAVINGS",S.user.name,"Reconciliation: Removed "+removed+" future-dated savings entries");
  closeModal();showToast(removed+" future-dated entries removed","ok");render();
}

function parseBackupNumber(v){
  if(v==null||v==="")return 0;
  if(typeof v==="number")return Number.isFinite(v)?v:0;
  var n=Number(String(v).replace(/[^\d.-]/g,""));
  return Number.isFinite(n)?n:0;
}
function parseBackupRate(v){
  if(v==null||v==="")return MEM_RATE;
  if(typeof v==="number")return Number.isFinite(v)?v:MEM_RATE;
  var s=String(v);
  var m=s.match(/-?\d+(?:\.\d+)?/);
  return m?Number(m[0]):MEM_RATE;
}
function parseBackupDate(v){
  if(!v)return"";
  if(typeof v==="number"&&typeof XLSX!=="undefined"&&XLSX.SSF&&XLSX.SSF.parse_date_code){
    var dc=XLSX.SSF.parse_date_code(v);
    if(dc&&dc.y&&dc.m&&dc.d)return dc.y+"-"+String(dc.m).padStart(2,"0")+"-"+String(dc.d).padStart(2,"0");
  }
  var d=v instanceof Date?v:new Date(v);
  if(isNaN(d.getTime()))return"";
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
async function restoreLoansFromBackup(){
  var fileEl=document.getElementById("restore-loans-file");
  if(!fileEl||!fileEl.files||!fileEl.files[0]){showToast("Choose an Excel backup file","err");return;}
  if(typeof XLSX==="undefined"){showToast("SheetJS not loaded","err");return;}
  try{
    var file=fileEl.files[0];
    var arr=await file.arrayBuffer();
    var wb=XLSX.read(arr,{type:"array"});
    var wsLoans=wb.Sheets["Loans"];
    var wsReps=wb.Sheets["Repayments"];
    if(!wsLoans){showToast("Loans sheet not found in backup","err");return;}
    var loansRaw=XLSX.utils.sheet_to_json(wsLoans,{defval:""});
    var repsRaw=wsReps?XLSX.utils.sheet_to_json(wsReps,{defval:""}):[];
    if(!loansRaw.length){showToast("Backup has no loan rows","err");return;}

    var replace=!!(document.getElementById("restore-loans-replace")||{checked:true}).checked;
    var restoredLoans=loansRaw.map(function(r,idx){
      var no=String(r["No."]||r["Loan"]||("GIC-L-REST-"+(idx+1))).trim();
      var borrower=String(r["Borrower"]||"Unknown Borrower").trim();
      var principal=parseBackupNumber(r["Principal"]);
      var rate=parseBackupRate(r["Rate"]);
      var months=Math.max(1,Math.round(parseBackupNumber(r["Months"])||6));
      var issued=parseBackupDate(r["Taken Date"])||todayStr();
      var approvedAt=parseBackupDate(r["Approved Date"]);
      var disbursedAt=parseBackupDate(r["Disbursed Date"]);
      var clearedAt=parseBackupDate(r["Paid Off Date"]);
      var status=String(r["Status"]||"Active").trim()||"Active";
      var paidTotal=parseBackupNumber(r["Paid"]);
      var realizedInterest=parseBackupNumber(r["Interest"]);
      return {
        id:gid(),no:no,memberId:null,borrower:borrower,isMember:true,
        principal:principal,rate:rate,months:months,purpose:"Restored from backup",issued:issued,
        g1Id:"",g1Name:"",g2Id:"",g2Name:"",collateralDesc:"",collateralValue:0,
        lockedBorrower:0,lockedG1:0,lockedG2:0,
        approvals:[],requiredApprovals:loanApprovalThreshold(),approvedBy:String(r["Approved By"]||"Backup Restore"),
        status:status,declineReason:"",submittedBy:S.user?S.user.username:"system",submittedAt:todayStr(),
        isHistorical:true,manualRealizedInterest:realizedInterest,manualPaidTotal:paidTotal,
        approvedAt:approvedAt||issued,disbursedAt:disbursedAt||approvedAt||issued,
        clearedAt:(status==="Cleared"?(clearedAt||todayStr()):"")
      };
    });

    var loanIdByNo={};
    restoredLoans.forEach(function(l){loanIdByNo[l.no]=l.id;});
    var restoredRepayments=repsRaw.map(function(r,idx){
      var loanNo=String(r["Loan"]||"").trim();
      var amount=parseBackupNumber(r["Amount"]);
      var date=parseBackupDate(r["Date"])||todayStr();
      var loanId=loanIdByNo[loanNo]||"";
      if(!loanId||amount<=0)return null;
      return {id:gid(),loanId:loanId,amount:amount,date:date,notes:"Restored from backup",ref:String(r["Ref"]||("RPY-REST-"+String(idx+1).padStart(3,"0"))),by:S.user?S.user.username:"system",paymentMode:"installment"};
    }).filter(function(x){return !!x;});

    restoredLoans=restoredLoans.map(function(loan){return hydrateLoanMemberLinks(loan);});
    if(replace){
      S.loans=restoredLoans;
      S.repayments=restoredRepayments;
    }else{
      S.loans=S.loans.concat(restoredLoans);
      S.repayments=S.repayments.concat(restoredRepayments);
    }
    if(normalizeLoanGuarantorLocks()){
      // Ensure borrower-first and equal-overflow locking is applied immediately after restore.
    }
    await DB.set(K.loans,S.loans);
    await DB.set(K.repayments,S.repayments);
    logEvent("CONFIG",S.user?S.user.name:"System","Loans restored from backup: "+restoredLoans.length+" loans, "+restoredRepayments.length+" repayments");
    S.page="loans";S.view="list";S.loanTab="all";S.loanMetricFilter="all";
    closeModal();showToast("Loans restored: "+restoredLoans.length+" loans, "+restoredRepayments.length+" repayments","ok");render();
  }catch(e){
    console.error("Restore failed",e);
    showToast("Restore failed: "+(e.message||"unknown error"),"err");
  }
}

function parseAuditCurrency(text){
  var n=Number(String(text||"").replace(/[^\d.-]/g,""));
  return Number.isFinite(n)?n:0;
}
async function restoreLoansFromAuditLog(){
  if(!confirm("Rebuild loans and repayments from audit log? This will replace current loan and repayment records with best-effort recovered data."))return;
  try{
    var logs=await DB.get("gic:auditlog");
    if(!Array.isArray(logs)||!logs.length)logs=_store.get("gic:auditlog")||[];
    if(!logs.length){showToast("No audit logs available for recovery","err");return;}
    var ordered=logs.slice().sort(function(a,b){return String(a.ts||"").localeCompare(String(b.ts||""));});
    var loansByNo={};
    var repayments=[];

    ordered.forEach(function(e){
      var detail=String(e&&e.detail||"");
      var type=String(e&&e.type||"");
      var evtDate=(e&&e.ts)?String(e.ts).split("T")[0]:todayStr();

      if(type==="LOAN"){
        var sub=detail.match(/(?:Historical\s+loan|Loan)\s+([A-Z0-9-]+)\s+submitted\s+for\s+(.+?)\s+—\s+(.+?)\s+×\s*(\d+)mo\.\s*Status:\s*([A-Za-z]+)/i);
        if(sub){
          var no=sub[1],borrower=sub[2],principal=parseAuditCurrency(sub[3]),months=Math.max(1,Number(sub[4])||6),status=sub[5]||"Active";
          if(!loansByNo[no]){
            loansByNo[no]={
              id:gid(),no:no,memberId:null,borrower:borrower,isMember:true,
              principal:principal,rate:MEM_RATE,months:months,purpose:"Recovered from audit log",issued:evtDate,
              g1Id:"",g1Name:"",g2Id:"",g2Name:"",collateralDesc:"",collateralValue:0,
              lockedBorrower:0,lockedG1:0,lockedG2:0,approvals:[],requiredApprovals:loanApprovalThreshold(),approvedBy:"Audit Recovery",
              status:status,declineReason:"",submittedBy:"system",submittedAt:evtDate,isHistorical:true,
              manualRealizedInterest:null,manualPaidTotal:0,approvedAt:evtDate,disbursedAt:evtDate,clearedAt:""
            };
          }
          loansByNo[no].status=status;
          return;
        }
        var decl=detail.match(/Loan\s+([A-Z0-9-]+)\s+DECLINED/i);
        if(decl&&loansByNo[decl[1]])loansByNo[decl[1]].status="Declined";
      }

      if(type==="REPAYMENT"){
        var rep=detail.match(/Repayment\s+(.+?)\s+posted\s+on\s+([A-Z0-9-]+)\s+as\s+([a-z-]+)/i);
        if(rep){
          var amount=parseAuditCurrency(rep[1]);
          var loanNo=rep[2];
          var mode=rep[3]||"installment";
          var iMatch=detail.match(/interest\s+(.+?),/i);
          var pMatch=detail.match(/principal\s+(.+?),/i);
          var intComp=iMatch?parseAuditCurrency(iMatch[1]):0;
          var priComp=pMatch?parseAuditCurrency(pMatch[1]):Math.max(0,amount-intComp);
          if(!loansByNo[loanNo]){
            loansByNo[loanNo]={id:gid(),no:loanNo,memberId:null,borrower:"Recovered Borrower",isMember:true,principal:Math.max(priComp,100000),rate:MEM_RATE,months:6,purpose:"Recovered from audit log",issued:evtDate,g1Id:"",g1Name:"",g2Id:"",g2Name:"",collateralDesc:"",collateralValue:0,lockedBorrower:0,lockedG1:0,lockedG2:0,approvals:[],requiredApprovals:loanApprovalThreshold(),approvedBy:"Audit Recovery",status:"Active",declineReason:"",submittedBy:"system",submittedAt:evtDate,isHistorical:true,manualRealizedInterest:null,manualPaidTotal:0,approvedAt:evtDate,disbursedAt:evtDate,clearedAt:""};
          }
          repayments.push({id:gid(),loanNo:loanNo,amount:amount,date:evtDate,notes:"Recovered from audit log",ref:"RPY-REC-"+String(repayments.length+1).padStart(3,"0"),by:"system",paymentMode:mode,interestComponent:intComp,principalComponent:priComp});
          return;
        }
        var clr=detail.match(/Loan\s+([A-Z0-9-]+)\s+fully\s+cleared\s+via\s+([a-z-]+)\s+payment\.\s+Principal\s+recovered:\s+(.+?),\s+interest\s+received:\s+(.+?)(?:,|$)/i);
        if(clr){
          var cNo=clr[1],cMode=clr[2]||"installment",cPri=parseAuditCurrency(clr[3]),cInt=parseAuditCurrency(clr[4]),cAmt=cPri+cInt;
          if(!loansByNo[cNo]){
            loansByNo[cNo]={id:gid(),no:cNo,memberId:null,borrower:"Recovered Borrower",isMember:true,principal:Math.max(cPri,100000),rate:MEM_RATE,months:6,purpose:"Recovered from audit log",issued:evtDate,g1Id:"",g1Name:"",g2Id:"",g2Name:"",collateralDesc:"",collateralValue:0,lockedBorrower:0,lockedG1:0,lockedG2:0,approvals:[],requiredApprovals:loanApprovalThreshold(),approvedBy:"Audit Recovery",status:"Active",declineReason:"",submittedBy:"system",submittedAt:evtDate,isHistorical:true,manualRealizedInterest:null,manualPaidTotal:0,approvedAt:evtDate,disbursedAt:evtDate,clearedAt:""};
          }
          loansByNo[cNo].status="Cleared";
          loansByNo[cNo].clearedAt=evtDate;
          repayments.push({id:gid(),loanNo:cNo,amount:cAmt,date:evtDate,notes:"Recovered from audit log",ref:"RPY-REC-"+String(repayments.length+1).padStart(3,"0"),by:"system",paymentMode:cMode,interestComponent:cInt,principalComponent:cPri});
        }
      }
    });

    var recoveredLoans=Object.keys(loansByNo).map(function(no){return hydrateLoanMemberLinks(loansByNo[no]);});
    if(!recoveredLoans.length){showToast("No recoverable loan entries found in audit log","err");return;}
    var loanIdByNo={};recoveredLoans.forEach(function(l){loanIdByNo[l.no]=l.id;});
    var recoveredRepayments=repayments.map(function(r){return Object.assign({},r,{loanId:loanIdByNo[r.loanNo]||""});}).filter(function(r){return !!r.loanId;}).map(function(r){delete r.loanNo;return r;});

    S.loans=recoveredLoans;
    S.repayments=recoveredRepayments;
    if(normalizeLoanGuarantorLocks()){
      // Ensure borrower-first and equal-overflow locking is applied immediately after restore.
    }
    await DB.set(K.loans,S.loans);
    await DB.set(K.repayments,S.repayments);
    logEvent("CONFIG",S.user?S.user.name:"System","Loans recovered from audit log: "+recoveredLoans.length+" loans, "+recoveredRepayments.length+" repayments");
    S.page="loans";S.view="list";S.loanTab="all";S.loanMetricFilter="all";
    closeModal();showToast("Recovered from audit: "+recoveredLoans.length+" loans, "+recoveredRepayments.length+" repayments","ok");render();
  }catch(e){
    console.error("Audit recovery failed",e);
    showToast("Audit recovery failed: "+(e.message||"unknown error"),"err");
  }
}

async function selfResetPassword(){
  if(!S.user||!S.user.totpSecret){showToast("Self-service password reset unavailable. Contact IT Administrator.","err");return;}
  var token=(v("spr-otp")||"").trim();
  var pwd=v("spr-new")||"";
  var confirm=v("spr-confirm")||"";
  if(!/^\d{6}$/.test(token)){showToast("Enter a valid 6-digit Authenticator code","err");return;}
  if(pwd.length<8){showToast("New password must be at least 8 characters","err");return;}
  if(pwd!==confirm){showToast("Password confirmation does not match","err");return;}
  var ok=await verifyTOTP(S.user.totpSecret,token);
  if(!ok){showToast("Authenticator verification failed. Use a current code.","err");return;}
  var hashed=await sha256hex(pwd);
  S.users=S.users.map(function(u){return u.id===S.user.id?Object.assign({},u,{password:hashed}):u;});
  S.user=Object.assign({},S.user,{password:hashed});
  await DB.set(K.users,S.users);
  _sess.save(S.user);
  logEvent("USER",S.user.name,"Self password reset completed (OTP verified)");
  closeModal();showToast("Password reset successful. Use the new password at next login.","ok");
}

function saveSavings(){
  var mid=v("sf-member");var m=S.members.filter(function(x){return x.id===mid;})[0];
  if(!m){showToast("Select a member","err");return;}
  var amount=Number(v("sf-amount")||MC);var date=v("sf-date")||todayStr();
  var d=new Date(date+"T12:00:00");
  var periodLabel=MS[d.getMonth()]+" "+d.getFullYear();
  var notes=v("sf-notes")||"Monthly contribution for "+periodLabel;

  // Intelligent allocation: if amount >= MC, spread across months (backlog first)
  if(amount>=MC){
    var result=allocateAdvancePayment(mid,amount,date,m.no,m.fullName,S.user.username);
    // Add all allocated entries
    S.savings=S.savings.concat(result.savingsToCreate);
    DB.set(K.savings,S.savings);
    
    // Calculate smart notification details
    var smartDetails = calculateNotificationDetails(m.id, result.allocation, result.totalAllocated);
    var monthsList=result.allocation.map(function(a){return MS[a.mo]+" "+a.yr;}).join(", ");
    
    // Build smart notification message
    var notificationMessage = "";
    if (smartDetails.fullyCoveredMonths.length > 0) {
      var coveredMos = smartDetails.fullyCoveredMonths.map(function(m) { return MS[m.mo] + " " + m.yr; }).join(", ");
      notificationMessage = "Cleared: " + coveredMos;
    }
    if (smartDetails.partiallyCoveredMonth) {
      notificationMessage += (notificationMessage ? " | " : "") + "Partial: " + MS[smartDetails.partiallyCoveredMonth.mo] + " " + smartDetails.partiallyCoveredMonth.yr + " (" + fmt(smartDetails.partiallyCoveredMonth.shortfall) + " remaining)";
    }
    
    var notif = createSavingsNotification(m.id,{
      amount:result.totalAllocated,
      monthsCovered:result.monthsCovered,
      months:result.allocation,
      nextDueDate:getNextSavingsDueDate(),
      details:monthsList,
      smartDetails: smartDetails
    });
    logEvent("SAVINGS",S.user.name,"Recorded advance payment "+fmt(amount)+" for "+m.fullName+" allocated to "+result.monthsCovered+" month(s)");
    closeModal();showToast(fmt(amount)+" recorded and spread to "+result.monthsCovered+" month(s)"+(result.unallocated>0?" ("+fmt(result.unallocated)+" unallocated)":""));
  } else {
    // Small partial or exact monthly payment
    var ref="SAV-"+d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+"-"+m.no;
    var noteTxt = amount===MC?"Monthly contribution for "+periodLabel:"Partial contribution for "+periodLabel;
    S.savings=S.savings.concat([{id:gid(),memberId:m.id,memberNo:m.no,memberName:m.fullName,
      amount:amount,date:date,yr:d.getFullYear(),mo:d.getMonth(),ref:ref,notes:noteTxt,by:S.user.username,voided:false,
      isAdvance:false}]);
    DB.set(K.savings,S.savings);
    
    // Create notification for single month payment with smart details
    var singleSmartDetails = {
      fullyCoveredMonths: amount >= MC ? [{yr:d.getFullYear(),mo:d.getMonth()}] : [],
      partiallyCoveredMonth: amount < MC ? {yr:d.getFullYear(),mo:d.getMonth(),amount:amount,shortfall:MC-amount} : null,
      nextPaymentDueMonths: [],
      nextPaymentStr: "",
      depositAmount: amount
    };
    
    // Calculate next due month
    if (amount >= MC) {
      var nextMo = d.getMonth() + 1;
      var nextYr = d.getFullYear();
      if (nextMo > 11) {
        nextMo = 0;
        nextYr++;
      }
      singleSmartDetails.nextPaymentDueMonths.push({yr:nextYr,mo:nextMo});
      singleSmartDetails.nextPaymentStr = MS[nextMo] + " " + nextYr;
    } else {
      var nextMo = d.getMonth() + 1;
      var nextYr = d.getFullYear();
      if (nextMo > 11) {
        nextMo = 0;
        nextYr++;
      }
      singleSmartDetails.nextPaymentStr = "Balance on " + periodLabel + " (" + fmt(MC - amount) + ") + " + MS[nextMo] + " " + nextYr;
    }
    
    var notif = createSavingsNotification(m.id,{
      amount:amount,
      monthsCovered:1,
      months:[{yr:d.getFullYear(),mo:d.getMonth()}],
      nextDueDate:getNextSavingsDueDate(),
      details:"Payment for "+periodLabel,
      smartDetails: singleSmartDetails
    });
    logEvent("SAVINGS",S.user.name,"Recorded "+fmt(amount)+" for "+m.fullName);
    closeModal();showToast(fmt(amount)+" recorded for "+m.fullName);
  }
  S.savTab="ledger";S.savMemberId=m.id;render();
}

function normalizeSavingsNotes(){

    if(!goodPrefix){

    }
  });

    DB.set(K.savings,S.savings);

  }
}

// ─── MEMBER NOTIFICATIONS FOR SAVINGS ───────────────────
// ─── SMART NOTIFICATION HELPER ──────────────────────
function calculateNotificationDetails(memberId, allocation, totalAmount) {
  // Determine which months are FULLY covered, partially covered, and next due
  var fullyCoveredMonths = [];
  var partiallyCoveredMonth = null;
  var nextPaymentDueMonths = [];
  
  allocation.forEach(function(a) {
    if (a.amount >= MC) {
      fullyCoveredMonths.push({yr: a.yr, mo: a.mo});
    } else if (a.amount > 0) {
      // Partial payment (not full MC)
      partiallyCoveredMonth = {yr: a.yr, mo: a.mo, amount: a.amount, shortfall: MC - a.amount};
    }
  });
  
  // Calculate next payment due date (month after last fully covered)
  if (fullyCoveredMonths.length > 0) {
    var lastFull = fullyCoveredMonths[fullyCoveredMonths.length - 1];
    var nextMo = lastFull.mo + 1;
    var nextYr = lastFull.yr;
    if (nextMo > 11) {
      nextMo = 0;
      nextYr++;
    }
    nextPaymentDueMonths.push({yr: nextYr, mo: nextMo});
  }
  
  // If there's a partial month, that's part of next payment due
  if (partiallyCoveredMonth && fullyCoveredMonths.length === allocation.length - 1) {
    // Partial is the last in allocation, so next payment starts from next month
    var nextMo = partiallyCoveredMonth.mo + 1;
    var nextYr = partiallyCoveredMonth.yr;
    if (nextMo > 11) {
      nextMo = 0;
      nextYr++;
    }
    if (!nextPaymentDueMonths.some(function(m) { return m.yr === nextYr && m.mo === nextMo; })) {
      nextPaymentDueMonths.push({yr: nextYr, mo: nextMo});
    }
  }
  
  // Build next payment due string
  var nextPaymentStr = "";
  if (nextPaymentDueMonths.length > 0) {
    var nextMonth = nextPaymentDueMonths[0];
    nextPaymentStr = MS[nextMonth.mo] + " " + nextMonth.yr;
    if (partiallyCoveredMonth) {
      nextPaymentStr = "Balance on " + MS[partiallyCoveredMonth.mo] + " " + partiallyCoveredMonth.yr + " (" + fmt(partiallyCoveredMonth.shortfall) + ") + " + nextPaymentStr;
    }
  }
  
  return {
    fullyCoveredMonths: fullyCoveredMonths,
    partiallyCoveredMonth: partiallyCoveredMonth,
    nextPaymentDueMonths: nextPaymentDueMonths,
    nextPaymentStr: nextPaymentStr,
    depositAmount: totalAmount
  };
}

async function saveMinuteRecord(){
  if(!canManageMinutesRecords()){showToast("Only Secretary or IT Admin can manage minutes","err");return;}
  var mid=S.modal&&S.modal.data;
  var title=(v("min-title")||"").trim();
  var meetingDate=v("min-date")||todayStr();
  var quarter=v("min-quarter")||minuteQuarterLabel(meetingDate);
  var summary=(v("min-summary")||"").trim();
  if(!title){showToast("Enter minutes title","err");return;}
  var fileEl=document.getElementById("min-files");
  var files=(fileEl&&fileEl.files)?Array.prototype.slice.call(fileEl.files):[];
  var uploaded=[];
  try{
    for(var i=0;i<files.length;i++){
      var f=files[i];
      if(f.size>20*1024*1024){showToast("File too large: "+f.name+" (max 20MB)","err");return;}
      var up=await uploadAttachmentToStorage(f,"minutes/files");
      uploaded.push({id:gid(),name:up.name,url:normalizeCloudinaryAssetUrl(up.url,up.type||f.type||f.name),type:up.type||f.type||guessMimeFromName(f.name),size:f.size,uploadedAt:todayStr(),uploadedBy:S.user.name});

      S.minutes=(S.minutes||[]).map(function(m){
        if(m.id!==mid)return m;
        return Object.assign({},m,{title:title,meetingDate:meetingDate,quarter:quarter,summary:summary,attachments:(m.attachments||[]).concat(uploaded),updatedAt:todayStr(),updatedBy:S.user.name});
      });
      logEvent("CONFIG",S.user.name,"Minutes updated: "+title);
    }else{
      S.minutes=(S.minutes||[]).concat([{
        id:gid(),ref:nextMinuteRef(),title:title,meetingDate:meetingDate,quarter:quarter,summary:summary,
        attachments:uploaded,createdBy:S.user.name,createdAt:todayStr(),updatedAt:todayStr(),updatedBy:S.user.name
      }]);
      logEvent("CONFIG",S.user.name,"Minutes published: "+title);
    }
    await DB.set(K.minutes,S.minutes);
    closeModal();
    showToast(mid?"Minutes updated":"Minutes published","ok");
    render();
  }catch(err){
    console.error("Minutes upload failed:",err);

}

function updateLoanCalc(){
  var p=Number((document.getElementById("lf-principal")||{value:0}).value||0);
  var r=Number((document.getElementById("lf-rate")||{value:MEM_RATE}).value||MEM_RATE);
  var issued=(document.getElementById("lf-issued")||{value:todayStr()}).value||todayStr();
  toggleHistoricalLoanFields();
  var isMember=(document.querySelector('input[name="loan-type"]:checked')||{value:"member"}).value==="member";
  var bid=isMember?(document.getElementById("lf-memberId")||{value:""}).value:"";
  var g1Sel=document.getElementById("lf-g1");
  var g2Sel=document.getElementById("lf-g2");
  var g1Cur=g1Sel?g1Sel.value:"";
  var g2Cur=g2Sel?g2Sel.value:"";
  var eligible=S.members.filter(function(m){return m.status==="Active"&&(!bid||m.id!==bid);});
  if(g1Sel){
    var g1Opts=eligible.filter(function(m){return !g2Cur||m.id!==g2Cur;}).map(function(m){return'<option value="'+m.id+'">'+m.no+' — '+esc(m.fullName)+' (Avail: '+fmt(memberAvailSavings(m.id))+')</option>';}).join("");
    g1Sel.innerHTML='<option value="">— G1 —</option>'+g1Opts;
    if(g1Cur&&eligible.some(function(m){return m.id===g1Cur&&(!g2Cur||m.id!==g2Cur);})){g1Sel.value=g1Cur;}else{g1Sel.value="";}
  }
  g1Cur=g1Sel?g1Sel.value:"";
  if(g2Sel){
    var g2Opts=eligible.filter(function(m){return !g1Cur||m.id!==g1Cur;}).map(function(m){return'<option value="'+m.id+'">'+m.no+' — '+esc(m.fullName)+' (Avail: '+fmt(memberAvailSavings(m.id))+')</option>';}).join("");
    g2Sel.innerHTML='<option value="">— G2 —</option>'+g2Opts;
    if(g2Cur&&eligible.some(function(m){return m.id===g2Cur&&(!g1Cur||m.id!==g1Cur);})){g2Sel.value=g2Cur;}else{g2Sel.value="";}
  }
  var maxMo=maxLoanMonths(issued);
  var moSel=document.getElementById("lf-months");
  var curMo=Number(moSel&&moSel.value||6);
  if(moSel)moSel.innerHTML=[1,2,3,4,5,6].filter(function(i){return i<=maxMo;}).map(function(i){return'<option value="'+i+'"'+(i===Math.min(curMo,maxMo)?" selected":"")+'>'+i+' mo.</option>';}).join("");
  var mo=Number((document.getElementById("lf-months")||{value:6}).value||6);
  var maxEl=document.getElementById("max-mo-lbl");if(maxEl)maxEl.textContent=maxMo;
  var el=document.getElementById("loan-calc");var inn=document.getElementById("loan-calc-inner");
  if(!p||!el||!inn)return;
  var c=calcLoan(p,r,mo);el.style.display="";
  inn.innerHTML=[["Principal",fmt(p)],["Interest ("+r+"%×"+mo+"mo.)",fmt(c.interest)],["Total",fmt(c.total)],["Monthly",fmt(c.monthly)]].map(function(pair){return'<div><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">'+pair[0]+'</div><div style="font-size:13px;font-weight:700;color:var(--navy)">'+pair[1]+'</div></div>';}).join("");
  var g1=(document.getElementById("lf-g1")||{value:""}).value;var g2=(document.getElementById("lf-g2")||{value:""}).value;
  var collV=Number((document.getElementById("lf-collValue")||{value:0}).value||0);
  var secEl=document.getElementById("loan-sec-check");
  if(secEl&&(bid||g1||g2)){
    var secRequired=loanSecurityRequiredAmount(p);
    var sec=loanSecurityCheck(bid,g1,g2,secRequired);var eff=sec.combined+(isMember?0:collV);
    var alloc=calcLoanLockAllocation(sec,secRequired);
    var cov=secRequired>0?Math.round((eff/secRequired)*100):0;
    secEl.style.display="";secEl.className="alert alert-"+(eff>=secRequired?"ok":"err");
    secEl.innerHTML="Security: B="+fmt(sec.bSav)+" + G1="+fmt(sec.g1Sav)+" + G2="+fmt(sec.g2Sav)+((!isMember)?" + Coll="+fmt(collV):"")+
      " = <strong>"+fmt(eff)+"</strong> vs <strong>"+fmt(secRequired)+"</strong> → "+cov+"% "+(eff>=secRequired?"✅ OK":"❌ Insufficient")+
      '<br><span style="font-size:11px;color:var(--text3)">Planned lock: Borrower '+fmt(alloc.borrower)+' · G1 '+fmt(alloc.g1)+' · G2 '+fmt(alloc.g2)+'</span>';
      var borrowerAvail=memberAvailSavings(bid);
      var guarantorReqAmt=secRequired>borrowerAvail?Math.ceil((secRequired-borrowerAvail)/2):0;
      var warnEl=document.getElementById("g2-qualify-warn");
      if(warnEl){
        if(g1Cur&&(document.getElementById("lf-g2")||{value:""}).value){
          var g2Id=(document.getElementById("lf-g2")||{value:""}).value;
          var g1Avail=memberAvailSavings(g1Cur);
          var g2Avail=memberAvailSavings(g2Id);
          if(g1Avail<guarantorReqAmt||g2Avail<guarantorReqAmt){
            warnEl.innerHTML="⚠️ "+(g1Avail<guarantorReqAmt?"G1 has only "+fmt(g1Avail)+" available (needs "+fmt(guarantorReqAmt)+" share)"+(g2Avail<guarantorReqAmt?" · ":""):"")+(g2Avail<guarantorReqAmt?"G2 has only "+fmt(g2Avail)+" available (needs "+fmt(guarantorReqAmt)+" share)":"");
            warnEl.style.display="block";
          }else{
            warnEl.style.display="none";
          }
        }else{warnEl.style.display="none";}
      }
  }
}

  try{

    S.loans=S.loans.map(function(l){
      if(l.id!==loanId)return l;
      return Object.assign({},l,{loanDoc:loanDocUrl,loanDocName:up.name,loanDocType:up.type,loanDocPath:up.path,loanDocUploadedAt:todayStr(),loanDocUploadedBy:S.user.name});
    });

    showToast(storageErrorHint(err),"err");

    var reader=new FileReader();

        if(l.id!==loanId)return l;
        return Object.assign({},l,{loanDoc:dataUrl,loanDocName:file.name,loanDocType:file.type||guessMimeFromName(file.name),loanDocUploadedAt:todayStr(),loanDocUploadedBy:S.user.name});
      });

async function saveRepayment(){
  var loan=S.loans.filter(function(l){return l.id===S.selId;})[0];if(!loan)return;
  if(loan.status!=="Active"){showToast("Only active loans can receive repayments","err");return;}
  var amount=Number(v("rf-amount")||0);var date=v("rf-date")||todayStr();
  var mode=v("rf-mode")||"installment";
  if(!amount||amount<=0){showToast("Enter payment amount","err");return;}
  var before=loanStat(loan,date);
  if(before.outstanding<=0){showToast("This loan is already fully paid and closed","warn");return;}
  if(amount>before.outstanding){showToast("Payment exceeds outstanding balance of "+fmt(before.outstanding),"err");return;}
  if(mode==="interest-only"&&amount>before.outstandingInterest){
    showToast("Interest-only payment cannot exceed outstanding interest of "+fmt(before.outstandingInterest),"err");
    return;
  }
  var n2=S.repayments.filter(function(r){return r.loanId===loan.id;}).length+1;
  var interestComponent=Math.min(before.outstandingInterest,amount);
  var principalComponent=mode==="interest-only"?0:Math.min(before.outstandingPrincipal,Math.max(0,amount-interestComponent));
  var postedAmount=interestComponent+principalComponent;
  var balanceAfter=Math.max(0,before.outstanding-amount);
  var installmentsCovered=Math.floor((before.applied+amount)/Math.max(1,Math.round(before.total/Math.max(1,loan.months))));
  S.repayments=S.repayments.concat([{id:gid(),loanId:loan.id,amount:postedAmount,date:date,notes:v("rf-notes")||"",ref:"RPY-"+loan.no+"-"+String(n2).padStart(3,"0"),by:S.user.username,paymentMode:mode,interestComponent:interestComponent,principalComponent:principalComponent,balanceAfter:balanceAfter,installmentsPaidAfter:Math.min(loan.months,installmentsCovered)}]);
  if(balanceAfter<=0){
    S.loans=S.loans.map(function(l){return l.id===loan.id?Object.assign({},l,{status:"Cleared",clearedAt:date,lockedBorrower:0,lockedG1:0,lockedG2:0}):l;});
    logEvent("REPAYMENT",S.user.name,"Loan "+loan.no+" fully cleared via "+mode+" payment. Principal recovered: "+fmt(principalComponent)+", interest received: "+fmt(interestComponent)+(before.penaltyInterest>0?", overdue penalty interest included: "+fmt(before.penaltyInterest):""));showToast("Loan fully cleared and closed","ok");
  } else {
    logEvent("REPAYMENT",S.user.name,"Repayment "+fmt(postedAmount)+" posted on "+loan.no+" as "+mode+" (interest "+fmt(interestComponent)+", principal "+fmt(principalComponent)+", balance "+fmt(balanceAfter)+(before.penaltyInterest>0?", overdue penalty active":"")+")");showToast("Repayment recorded. New balance: "+fmt(balanceAfter),"ok");
  }
  await DB.set(K.repayments,S.repayments);await DB.set(K.loans,S.loans);closeModal();render();
}

  Promise.all([sha256hex(password),sha256hex(pin)]).then(async function(hashes){

      password:hashes[0],pin:hashes[1],role:roleTitle||roles[access]||access,access:access,active:true,notifyEnabled:notifyEnabled};
    if(access==="member"||access==="committee"){
      // Try link from dropdown first, then fallback to matching by username
      var linkEl=document.getElementById("uf-member-link");
      var linkedId=linkEl?linkEl.value:"";
      if(linkedId){
        newUser.memberId=linkedId;
      } else {
        var mem=S.members.filter(function(m){return m.no===username;})[0];
        if(mem)newUser.memberId=mem.id;
      }
    }
    S.users=S.users.concat([newUser]);
    var saved=await DB.set(K.users,S.users);
    if(!saved){S.users=S.users.filter(function(u){return u.id!==newUser.id;});render();return;}
    closeModal();
    logEvent("USER",S.user.name,"User created: "+username);
    showToast("User created");
    // Generate WhatsApp message
    var msg="GAZEBO GIC Login Credentials\nUsername: "+username+"\nPassword: "+password+"\nPIN: "+pin+"\nRole: "+(roles[access]||access)+"\nPlease change your password after first login.";
    var waUrl="https://wa.me/?text="+encodeURIComponent(msg);
    window.open(waUrl,"_blank");
    render();
  });
}
async function updateUser(uid){
  var name=v("eu-name"),role=v("eu-role"),password=v("eu-password"),pin=v("eu-pin");
  var access=v("eu-access")||"committee";
  var memberLink=v("eu-member-link")||"";
  var active=v("eu-active")==="1";
  var notifyEl=document.getElementById("eu-notify");
  var notifyEnabled=!notifyEl||notifyEl.checked;
  if(pin&&!/^\d{4}$/.test(pin)){showToast("PIN must be 4 digits","err");return;}
  if(access==="member"&&!memberLink){showToast("Member Portal users must be linked to a member","err");return;}
  var keepMemberLink=(access==="member"||access==="committee");
  // Hash new values only if provided
  var pwdPromise=password?sha256hex(password):Promise.resolve(null);
  var pinPromise=pin?sha256hex(pin):Promise.resolve(null);
  Promise.all([pwdPromise,pinPromise]).then(async function(hashes){
    S.users=S.users.map(function(u){
      if(u.id!==uid)return u;
      var nextMemberId=keepMemberLink?(memberLink||u.memberId||""):"";
      return Object.assign({},u,{
        name:name||u.name,
        role:role||u.role,
        access:access||u.access,
        memberId:nextMemberId,
        password:hashes[0]||u.password,
        pin:hashes[1]||u.pin,
        active:active,
        notifyEnabled:notifyEnabled
      });
    });
    await DB.set(K.users,S.users);closeModal();
    logEvent("USER",S.user.name,"User updated: "+uid);
    showToast("User updated");render();
  });
}
async function deleteUser(uid){
  var u=S.users.filter(function(x){return x.id===uid;})[0];
  if(!u)return;
  if(!confirm("Are you sure you want to delete user "+u.name+" ("+u.username+")? This action cannot be undone."))return;
  S.users=S.users.filter(function(x){return x.id!==uid;});
  await DB.set(K.users,S.users);logEvent("USER",S.user.name,"User deleted: "+u.username);showToast("User deleted","warn");render();
}
async function unlockUser(uid){
  var u=S.users.filter(function(x){return x.id===uid;})[0];
  if(!u){showToast("User not found","err");return;}
  clearLockout(u.username);
  clearLockout("pin:"+u.username);
  await DB.set(K.lockouts,S.lockouts);
  logEvent("USER",S.user.name,"User unlocked: "+u.username);
  showToast(u.name+" unlocked","ok");
  render();
}

function setupRealtimeListeners(){
  if(!db || S.realtimeListenersActive) return; // if Firebase not available or already started
  S.realtimeListenersActive = true;
  db.collection('data').doc(K.members).onSnapshot((doc) => {
    if (doc.exists && S.user) {
      S.members = doc.data().value;
      render();
    }
  });
  db.collection('data').doc(K.savings).onSnapshot((doc) => {
    if (doc.exists && S.user) {
      S.savings = doc.data().value;
      render();
    }
  });
  db.collection('data').doc(K.loans).onSnapshot((doc) => {
    if (doc.exists && S.user) {
      S.loans = doc.data().value;
      render();
    }
  });
  db.collection('data').doc(K.repayments).onSnapshot((doc) => {
    if (doc.exists && S.user) {
      S.repayments = doc.data().value;
      render();
    }
  });
  db.collection('data').doc(K.amendments).onSnapshot((doc) => {
    if (doc.exists && S.user) {
      S.amendments = doc.data().value;
      render();
    }
  });
  db.collection('data').doc(K.expenses).onSnapshot((doc) => {
    if (doc.exists && S.user) {
      S.expenses = doc.data().value;
      render();
    }
  });
  db.collection('data').doc(K.operationalIncome).onSnapshot((doc) => {
    if (doc.exists && S.user) {
      S.operationalIncome = doc.data().value||[];
      render();
    }
  });
  db.collection('data').doc(K.minutes).onSnapshot((doc) => {
    if (doc.exists && S.user) {
      S.minutes = doc.data().value||[];
      render();
    }
  });
  db.collection('data').doc(K.lockouts).onSnapshot((doc) => {
    if (doc.exists && S.user) {
      S.lockouts = doc.data().value||{};
      render();
    }
  });
  db.collection('data').doc(K.users).onSnapshot((doc) => {
    if (doc.exists && S.user) {
      S.users = doc.data().value;
      // Update current user if changed
      var updatedU = S.users.filter(function(u){return u.id === S.user.id;})[0];
      if(updatedU) S.user = updatedU;
      render();
    }
  });
  db.collection('data').doc(K.interest).onSnapshot((doc) => {
    if (doc.exists && S.user) {
      S.interest = doc.data().value;
      render();
    }
  });
}

async function init(){
  await initFirebaseAuth();
  if(typeof location!=="undefined"&&location.protocol==="file:"){
    console.warn("App opened from file://. Cloud uploads and attachment migration are disabled in this mode. Use the local HTTP server instead.");
  }
  // gic:seeded6 = hashed-credential build. If only gic:seeded5 exists (old plaintext build),
  // force a fresh seed so hashed passwords/PINs are loaded from SEED_USERS.
  var seeded=await DB.get(K.seeded);
  var oldSeeded=_store.get("gic:seeded5");
  if(!seeded){
    var sv=buildSavings();
    await DB.set(K.users,SEED_USERS);await DB.set(K.members,SEED_MEMBERS);await DB.set(K.savings,sv);
    await DB.set(K.loans,[]);await DB.set(K.repayments,[]);await DB.set(K.interest,[]);await DB.set(K.amendments,[]);await DB.set(K.expenses,[]);await DB.set(K.operationalIncome,[]);await DB.set(K.minutes,seedQuarterlyMinutes());
    await DB.set(K.lockouts,{});await DB.set(K.notifications,[]);
    await DB.set(K.seeded,true);
    S.users=SEED_USERS;S.members=SEED_MEMBERS;S.savings=sv;S.loans=[];S.repayments=[];S.interest=[];S.amendments=[];S.expenses=[];S.operationalIncome=[];S.minutes=seedQuarterlyMinutes();S.lockouts={};S.notifications=[];
  } else {
    // Load stored data and merge with seed users so seeded role/access updates and new
    // committee accounts land safely without wiping custom passwords, PIN changes, or TOTP.
    var storedUsers=await DB.get(K.users)||[];
    var seedIds=SEED_USERS.map(function(u){return u.id;});
    var customUsers=storedUsers.filter(function(u){return seedIds.indexOf(u.id)<0;});
    var mergedUsers=SEED_USERS.map(function(su){
      var existing=storedUsers.filter(function(u){return u.id===su.id;})[0];
      if(!existing)return su;
      return Object.assign({},su,{
        password:existing.password||su.password,
        pin:existing.pin||su.pin,
        totpSecret:existing.totpSecret,
        active:existing.active!==undefined?existing.active:su.active,
        notifyEnabled:existing.notifyEnabled!==undefined?existing.notifyEnabled:su.notifyEnabled
      });
    }).concat(customUsers);
    var hasPlaintext=storedUsers.some(function(u){return u.password&&u.password.length<60;});
    var needsUserSync=hasPlaintext||storedUsers.length!==mergedUsers.length||mergedUsers.some(function(mu){
      var old=storedUsers.filter(function(u){return u.id===mu.id;})[0];
      return !old||old.access!==mu.access||old.role!==mu.role||old.memberId!==mu.memberId||old.username!==mu.username||old.name!==mu.name;
    });
    if(needsUserSync){
      await DB.set(K.users,mergedUsers);
    }
    S.users=mergedUsers;
    S.members=await DB.get(K.members)||_store.get(K.membersBackupLatest)||SEED_MEMBERS;
    S.savings=await DB.get(K.savings)||[];S.loans=await DB.get(K.loans)||[];
    S.repayments=await DB.get(K.repayments)||[];S.interest=await DB.get(K.interest)||[];
    S.amendments=await DB.get(K.amendments)||[];S.expenses=await DB.get(K.expenses)||[];S.operationalIncome=await DB.get(K.operationalIncome)||[];
    S.minutes=await DB.get(K.minutes)||[];
    if(!S.minutes.length){
      S.minutes=seedQuarterlyMinutes();
      await DB.set(K.minutes,S.minutes);
    }
    S.lockouts=await DB.get(K.lockouts)||{};S.notifications=await DB.get(K.notifications)||[];
  }
  try{
    if(await migrateInlineMemberAttachments()){
      logEvent("SYSTEM","init","Migrated inline member attachments to Cloudinary URLs");
    }
  }catch(migErr){
    console.warn("Inline member attachment migration skipped:",migErr);
  }
  S.loans=S.loans.map(function(loan){return hydrateLoanMemberLinks(loan);});
  if(normalizeLoanGuarantorLocks()){
    await DB.set(K.loans,S.loans);
  }
    if(forceRebalanceLoanGuarantors()){
      logEvent("SYSTEM","init","Force rebalanced imbalanced guarantor locks on existing loans");
    }
  // Restore session from sessionStorage (survives page refresh)
  var sess=_sess.load();
  if(sess&&sess.uid){
    if(_sess.isExpired(sess)){
      _sess.clear();
    } else {
      var u=S.users.filter(function(x){return x.id===sess.uid&&x.active!==false;})[0];
      if(u){
        S.user=u;S.page=u.access==="member"?"my-savings":"dashboard";
        resetSessionTimer();
        scheduleAbsoluteSessionExpiry();
        attachSessionActivityListeners();
        setupRealtimeListeners();
      }
    }
  }
  S.loading=false;render();
  if(typeof location!=="undefined"&&location.protocol==="file:"&&typeof showToast==="function"){
    showToast("Open the app via http://127.0.0.1:8080/final/GAZEBO_GIC_v1_cloudinary.html for uploads and Cloudinary.","warn");
  }

  // Avoid Android/iOS soft keyboard repaint blur by not rerendering login
  // on viewport resize events caused by keyboard open/close.
  var resizeTimeout;
  window.addEventListener("resize",function(){
    if(!S.user) return; // only rerender after login when app layout should adapt
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(function(){ render(); }, 120);
  }, { passive: true });
}

(async () => { await init(); })();
</script>
