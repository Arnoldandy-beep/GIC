<style>

/* ─── MOBILE (≤ 768px) ─── */

  .bn-item{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#7F8C9A;font-size:9px;font-weight:500;padding:6px 4px;transition:color .2s;text-decoration:none;border:none;background:none;touch-action:manipulation}

  .grid2,.grid3,.grid4{grid-template-columns:1fr!important}

  .full{grid-column:1/-1}
  .modal{border-radius:16px 16px 0 0;max-height:92vh;margin:0;position:fixed;bottom:0;left:0;right:0;max-width:100%!important}
  .overlay{align-items:flex-end;padding:0}
  .tbl{font-size:12px}.tbl th,.tbl td{padding:7px 9px}
  .page-hdr{gap:8px}.page-title{font-size:20px}
  .stat-card{padding:12px}
  .tab-btn{padding:7px 10px;font-size:12px}
  .mhdr{padding:14px 16px}.mbody{padding:16px}.mfoot{padding:12px 16px}
  .btn{padding:10px 14px;font-size:13px}

  /* Mobile table → stacked cards for complex tables */

  .fg3{grid-template-columns:1fr!important}

<script>
// ══════════════════════════════════════════════════════
//  GAZEBO INVESTMENT CLUB v5.0
//  Responsive · Member Portal · Expenses · Secure
// ══════════════════════════════════════════════════════

// ─── 1. STORAGE ────────────────────────────────────
var _store={
  get:function(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}},
  set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
};
var _sess={
  save:function(u){try{sessionStorage.setItem("gic:sess",JSON.stringify({uid:u.id,ts:Date.now()}));}catch(e){}},
  load:function(){try{var d=sessionStorage.getItem("gic:sess");return d?JSON.parse(d):null;}catch(e){return null;}},
  clear:function(){try{sessionStorage.removeItem("gic:sess");}catch(e){}}
};

// ─── TOTP / Google Authenticator ──────────────────
var _b32chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
function genTOTPSecret(){var s="";for(var i=0;i<16;i++)s+=_b32chars[Math.floor(Math.random()*32)];return s;}
function b32decode(s){
  s=s.toUpperCase().replace(/=+$/,"");
  var bits="";for(var i=0;i<s.length;i++){var v=_b32chars.indexOf(s[i]);if(v<0)continue;bits+=v.toString(2).padStart(5,"0");}
  var bytes=[];for(var i=0;i+8<=bits.length;i+=8)bytes.push(parseInt(bits.slice(i,i+8),2));
  return bytes;
}
function intToBytes(n){var b=new Array(8).fill(0);for(var i=7;i>=0;i--){b[i]=n&0xff;n=Math.floor(n/256);}return b;}
async function calcTOTP(secret,window){
  var kBytes=b32decode(secret);
  var dBytes=intToBytes(window==null?Math.floor(Date.now()/1000/30):window);
  var key=await crypto.subtle.importKey("raw",new Uint8Array(kBytes),{name:"HMAC",hash:"SHA-1"},false,["sign"]);
  var sig=new Uint8Array(await crypto.subtle.sign("HMAC",key,new Uint8Array(dBytes)));
  var off=sig[19]&0xf;
  var code=((sig[off]&0x7f)<<24)|((sig[off+1]&0xff)<<16)|((sig[off+2]&0xff)<<8)|(sig[off+3]&0xff);
  return String(code%1000000).padStart(6,"0");
}
async function verifyTOTP(secret,token){
  token=String(token||"").trim();
  if(!secret||token.length!==6)return false;
  var w=Math.floor(Date.now()/1000/30);
  for(var i=-2;i<=2;i++){if(await calcTOTP(secret,w+i)===token)return true;}
  return false;
}
function totpQRUrl(secret,username){
  var issuer=encodeURIComponent("GAZEBO GIC");
  var acct=encodeURIComponent("GAZEBO GIC:"+username);
  var uri="otpauth://totp/"+acct+"?secret="+secret+"&issuer="+issuer+"&algorithm=SHA1&digits=6&period=30";
  return"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(uri);
}

// ─── PENALTY ENGINE ────────────────────────────────
var PENALTY_NOTICE_DATE=new Date("2026-06-30T23:59:59");
var PENALTY_START_DATE=new Date("2026-07-31T23:59:59");
var DAILY_PENALTY_RATE=0.01; // 1% of MC per day

function getMemberMonthStatus(mid,yr,mo){
  var paid=S.savings.filter(function(s){return s.memberId===mid&&!s.voided&&s.yr===yr&&s.mo===mo;});
  var amt=paid.reduce(function(t,s){return t+s.amount;},0);
  var today=now();
  var monthEnd=new Date(yr,mo+1,0,23,59,59); // last day of month
  if(amt>=MC)return{paid:true,amt:amt,penalty:0,penaltyDays:0,totalOwed:0};
  var remaining=MC-amt;
  var isPenaltyActive=today>PENALTY_START_DATE&&monthEnd<today;
  if(!isPenaltyActive)return{paid:false,amt:amt,penalty:0,penaltyDays:0,totalOwed:remaining};
  // Days since month end (or penalty start date, whichever is later)
  var from=new Date(Math.max(PENALTY_START_DATE.getTime(),monthEnd.getTime()));
  var days=Math.max(0,Math.floor((today-from)/(1000*60*60*24)));
  var penalty=Math.round(days*MC*DAILY_PENALTY_RATE);
  return{paid:false,amt:amt,penalty:penalty,penaltyDays:days,totalOwed:remaining+penalty};
}

function getMemberTotalArrears(mid){
  var m=S.members.filter(function(x){return x.id===mid;})[0];
  if(!m||m.status!=="Active")return{totalOwed:0,months:[]};
  var joined=new Date(m.joined+"T12:00:00");
  var today=now();
  var months=[];var totalOwed=0;
  MGRID.forEach(function(mg){
    var mDate=new Date(mg.yr,mg.mo,1);
    var mEnd=new Date(mg.yr,mg.mo+1,0);
    if(mDate<joined||mEnd>today)return;
    var st=getMemberMonthStatus(mid,mg.yr,mg.mo);
    if(!st.paid&&st.totalOwed>0){
      months.push(Object.assign({},st,{label:mg.l,yr:mg.yr,mo:mg.mo}));
      totalOwed+=st.totalOwed;
    }
  });
  return{totalOwed:totalOwed,months:months};
}

function memberCaughtUpByJune(mid){
  // Check if member has paid all months up to June 2026
  var m=S.members.filter(function(x){return x.id===mid;})[0];
  if(!m)return true;
  var joined=new Date(m.joined+"T12:00:00");
  var june30=new Date("2026-06-30T23:59:59");
  var monthsOwed=0;
  MGRID.forEach(function(mg){
    if(mg.yr===2026&&mg.mo>5)return; // only up to June
    var mDate=new Date(mg.yr,mg.mo,1);
    if(mDate<joined)return;
    var paid=S.savings.filter(function(s){return s.memberId===mid&&!s.voided&&s.yr===mg.yr&&s.mo===mg.mo;});
    if(paid.reduce(function(t,s){return t+s.amount;},0)<MC)monthsOwed++;
  });
  return monthsOwed===0;
}

// ─── 2. SECURITY ───────────────────────────────────
var _sessionTimer=null;
var SESSION_MS=5*60*1000; // 5 minutes
var LOCKOUT_MAX=3, LOCKOUT_MS=15*60*1000;

// Pre-configured Telegram (can be overridden in System Users)
var DEFAULT_TG_TOKEN="8593681488:AAGTzmP24QaWWyhFD9bNdnuZ6gVJKE0xbrU";
var DEFAULT_TG_CHAT="-1003548609165";

// ─── PASSWORD HASHING (SHA-256 via Web Crypto) ─────
async function sha256hex(str){
  var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
}

function getCfg(){
  var saved=_store.get("gic:config");
  if(!saved){return{telegramToken:DEFAULT_TG_TOKEN,telegramChatId:DEFAULT_TG_CHAT,discordWebhook:""};}
  return{telegramToken:saved.telegramToken||DEFAULT_TG_TOKEN,telegramChatId:saved.telegramChatId||DEFAULT_TG_CHAT,discordWebhook:saved.discordWebhook||""};
}
function saveCfg(cfg){_store.set("gic:config",cfg);}

function logEvent(type,actor,detail){
  var logs=_store.get("gic:auditlog")||[];
  logs.unshift({id:Math.random().toString(36).slice(2,9),type:type,actor:actor,detail:detail,ts:new Date().toISOString(),ua:navigator.userAgent.slice(0,80)});
  _store.set("gic:auditlog",logs.slice(0,1000));
  var cfg=getCfg();
  if(cfg.telegramToken&&cfg.telegramChatId){
    var icons={LOGIN:"🔐",LOGOUT:"🚪",FAILED_LOGIN:"🚨",SAVINGS:"💰",LOAN:"📋",REPAYMENT:"✅",AMENDMENT:"✏️",MEMBER:"👤",INTEREST:"🏦",EXPORT:"📊",USER:"🔑",CONFIG:"⚙️",EXPENSE:"💸"};
    var msg=(icons[type]||"ℹ️")+" *GAZEBO GIC*\n*"+type+"*\n"+actor+"\n"+detail+"\n_"+new Date().toLocaleString("en-UG")+"_";
    fetch("https://api.telegram.org/bot"+cfg.telegramToken+"/sendMessage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:cfg.telegramChatId,text:msg,parse_mode:"Markdown"})}).catch(function(){});
  }
  if(cfg.discordWebhook){fetch(cfg.discordWebhook,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content:"**["+type+"]** "+actor+" — "+detail,username:"GAZEBO GIC"})}).catch(function(){});}
}

function getLockout(u){return _store.get("gic:lock:"+u)||{count:0,until:0};}

// ─── 8. BUSINESS LOGIC ─────────────────────────────
function calcLoan(p,rate,months){
  var interest=Math.round(p*(rate/100)*months);
  return{interest:interest,total:p+interest,monthly:Math.round((p+interest)/months)};
}
function maxLoanMonths(issued){
  var d=new Date((issued||todayStr())+"T12:00:00");
  var dec30=new Date(d.getFullYear(),11,30);
  var diff=(dec30.getFullYear()-d.getFullYear())*12+(dec30.getMonth()-d.getMonth());
  return Math.min(MAX_MO,Math.max(1,diff));
}
function memberTotalSavings(mid){
  return S.savings.filter(function(s){return s.memberId===mid&&!s.voided;}).reduce(function(t,s){return t+s.amount;},0);
}
function memberLockedSavings(mid){
  var locked=0;
  S.loans.filter(function(l){return l.status==="Active";}).forEach(function(l){
    if(l.memberId===mid)locked+=(l.lockedBorrower||0);
    if(l.g1Id===mid)locked+=(l.lockedG1||0);
    if(l.g2Id===mid)locked+=(l.lockedG2||0);
  });
  return locked;
}
function memberAvailSavings(mid,excLoan){
  excLoan=excLoan||"";
  var locked=0;
  S.loans.filter(function(l){return l.status==="Active"&&l.id!==excLoan;}).forEach(function(l){
    if(l.memberId===mid)locked+=(l.lockedBorrower||0);
    if(l.g1Id===mid)locked+=(l.lockedG1||0);
    if(l.g2Id===mid)locked+=(l.lockedG2||0);
  });
  return Math.max(0,memberTotalSavings(mid)-locked);
}
function loanStat(loan){
  var c=calcLoan(loan.principal,loan.rate,loan.months);
  var paid=S.repayments.filter(function(r){return r.loanId===loan.id;}).reduce(function(t,r){return t+r.amount;},0);
  var outstanding=Math.max(0,c.total-paid);
  return{total:c.total,paid:paid,outstanding:outstanding,pct:c.total>0?Math.min(100,Math.round((paid/c.total)*100)):0};
}
function loanDueDate(issued,months){
  var d=new Date(issued+"T12:00:00");d.setMonth(d.getMonth()+months);return d.toISOString().split("T")[0];
}
function isOverdue(loan){return loan.status==="Active"&&new Date(loanDueDate(loan.issued,loan.months)+"T12:00:00")<now();}
function loanSecurityCheck(bid,g1,g2,total){
  var b=bid?memberAvailSavings(bid):0,g1s=g1?memberAvailSavings(g1):0,g2s=g2?memberAvailSavings(g2):0;
  var comb=b+g1s+g2s;
  return{bSav:b,g1Sav:g1s,g2Sav:g2s,combined:comb,coverage:total>0?Math.round((comb/total)*100):0,sufficient:comb>=total};
}

// Loan eligibility for a member
function loanEligibility(mid){
  var avail=memberAvailSavings(mid);
  var activeL=S.loans.filter(function(l){return l.memberId===mid&&l.status==="Active";});
  var hasActive=activeL.length>0;
  var maxLoan=avail*2; // can borrow up to 2x available savings (if guarantors cover rest)
  var eligible=avail>0&&!hasActive;
  return{avail:avail,hasActive:hasActive,maxLoan:maxLoan,eligible:eligible,activeLoans:activeL};
}

// Expenses calculations
function totalApprovedExpenses(){
  return S.expenses.filter(function(e){return e.status==="Approved";}).reduce(function(t,e){return t+e.amount;},0);
}

function calcInterestDistribution(year){
  var pool=0;
  S.loans.forEach(function(l){
    if(new Date(l.issued+"T12:00:00").getFullYear()!==year)return;
    var c=calcLoan(l.principal,l.rate,l.months);
    var paid=S.repayments.filter(function(r){return r.loanId===l.id&&new Date(r.date+"T12:00:00").getFullYear()===year;}).reduce(function(t,r){return t+r.amount;},0);
    pool+=Math.min(paid*(c.total>0?c.interest/c.total:0),c.interest);
  });
  pool=Math.round(pool);
  var decEnd=new Date(year,11,31);
  var actM=S.members.filter(function(m){return m.status==="Active"||(m.status==="Exited"&&new Date(m.exitDate+"T12:00:00")>decEnd);});
  var arr=actM.map(function(m){
    var sav=S.savings.filter(function(s){return s.memberId===m.id&&!s.voided&&new Date(s.date+"T12:00:00")<=decEnd;}).reduce(function(t,s){return t+s.amount;},0);
    return{memberId:m.id,memberNo:m.no,memberName:m.fullName,savings:sav};
  });
  var totalSav=arr.reduce(function(t,x){return t+x.savings;},0);
  var req=Math.round(totalSav*(SAV_INT/100));
  var actual=Math.min(pool,req);
  var effRate=totalSav>0?(actual/totalSav)*100:0;
  var dists=arr.map(function(ms){return Object.assign({},ms,{interest:Math.round(ms.savings*effRate/100)});});
  return{year:year,interestPool:pool,totalSav:totalSav,required:req,actualPool:actual,effRate:effRate.toFixed(4),distributions:dists,totalDistributed:dists.reduce(function(t,d){return t+d.interest;},0)};

function bindLoginEvents(){
  if(S.loginStep===2){
    var hasTOTP=!!(S.loginUser&&S.loginUser.totpSecret);
    var ids=hasTOTP?["pin1","pin2","pin3","pin4","pin5","pin6"]:["pin1","pin2","pin3","pin4"];
    ids.forEach(function(id,i){
      var el=document.getElementById(id);if(!el)return;
      el.addEventListener("input",function(){if(el.value.length===1&&i<ids.length-1)document.getElementById(ids[i+1]).focus();});
      el.addEventListener("keydown",function(e){if(e.key==="Backspace"&&!el.value&&i>0)document.getElementById(ids[i-1]).focus();});
    });
    var pb=document.getElementById("pin-btn");if(pb)pb.addEventListener("click",verifyPin);
    var last=document.getElementById(ids[ids.length-1]);if(last)last.addEventListener("keydown",function(e){if(e.key==="Enter")verifyPin();});
    setTimeout(function(){var p1=document.getElementById("pin1");if(p1)p1.focus();},150);
    return;
  }
  function goStep1(){
    var u=(document.getElementById("l-user")||{value:""}).value.trim();
    var p=(document.getElementById("l-pass")||{value:""}).value;
    var err=document.getElementById("login-err");
    if(!u){if(err){err.style.display="";err.textContent="Enter your username.";}return;}
    if(isLocked(u)){if(err){err.style.display="";err.textContent="Account locked. Try again in "+lockMins(u)+" min.";}return;}
    sha256hex(p).then(function(hashed){
      var found=S.users.filter(function(x){return x.username===u&&x.password===hashed&&x.active!==false;})[0];
      if(found){clearLockout(u);S.loginUser=found;S.loginStep=2;render();}
      else{recordFail(u);if(err){err.style.display="";err.textContent="Invalid credentials."+(isLocked(u)?" Locked for "+lockMins(u)+" min.":"");}}
    });
  var lb=document.getElementById("l-btn");if(lb)lb.addEventListener("click",goStep1);
  ["l-user","l-pass"].forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener("keydown",function(e){if(e.key==="Enter")goStep1();});});
}

function verifyPin(){
  var hasTOTP=!!(S.loginUser&&S.loginUser.totpSecret);
  var ids=hasTOTP?["pin1","pin2","pin3","pin4","pin5","pin6"]:["pin1","pin2","pin3","pin4"];
  var input=ids.map(function(id){var el=document.getElementById(id);return el?el.value:"";}).join("");
  var err=document.getElementById("pin-err");
  var pk="pin:"+S.loginUser.username;
  if(isLocked(pk)){if(err){err.style.display="";err.textContent="Locked for "+lockMins(pk)+" min.";}return;}

  function onSuccess(){
    clearLockout(pk);logEvent("LOGIN",S.loginUser.name,"Login · "+S.loginUser.role+(hasTOTP?" (TOTP)":" (PIN)"));
    S.user=S.loginUser;S.loginUser=null;S.loginStep=1;
    S.page=S.user.access==="member"?"my-savings":"dashboard";
    _sess.save(S.user);
    resetSessionTimer();
    ["click","keydown","touchstart","scroll"].forEach(function(e){document.addEventListener(e,resetSessionTimer,{passive:true});});
    render();
  }
  function onFail(){
    recordFail(pk);logEvent("FAILED_LOGIN",S.loginUser?S.loginUser.username:"?",hasTOTP?"Wrong TOTP code":"Wrong PIN");
    if(err){err.style.display="";err.textContent=isLocked(pk)?"Too many wrong attempts. Locked for "+lockMins(pk)+" min.":(hasTOTP?"Incorrect code. Check Google Authenticator.":"Incorrect PIN. Try again.");}
    ids.forEach(function(id){var el=document.getElementById(id);if(el)el.value="";});
    var p1=document.getElementById("pin1");if(p1)p1.focus();
  }

  if(hasTOTP){
    verifyTOTP(S.loginUser.totpSecret,input).then(function(ok){if(ok)onSuccess();else onFail();}).catch(function(){onFail();});
  } else {
    sha256hex(input).then(function(hashed){
      if(hashed===S.loginUser.pin)onSuccess();else onFail();
    });
  }

function logout(){
  if(S.user)logEvent("LOGOUT",S.user.name,"Signed out");
  clearTimeout(_sessionTimer);_sess.clear();
  S.user=null;S.loginStep=1;S.loginUser=null;S.page="dashboard";_navHistory=[];render();
}

function rDashboard(){
  var n=now();
  var totalSav=S.savings.filter(function(s){return!s.voided;}).reduce(function(t,s){return t+s.amount;},0);
  var totalAnnualFees=S.members.reduce(function(t,m){return t+(m.annualFees||[]).filter(function(f){return f.status==="Paid";}).reduce(function(a,f){return a+f.amount;},0);},0);
  var totalExpenses=totalApprovedExpenses();
  var activeLoans=S.loans.filter(function(l){return l.status==="Active";});
  var totalOut=activeLoans.reduce(function(t,l){return loanStat(l).outstanding+t;},0);
  var pend=S.loans.filter(function(l){return l.status==="Pending";});
  var over=S.loans.filter(function(l){return isOverdue(l);});
  var pA=S.amendments.filter(function(a){return a.status==="Pending";});
  var pE=S.expenses.filter(function(e){return e.status==="Pending";});
  var def=S.members.filter(function(m){return m.status==="Active"&&!S.savings.some(function(s){return s.memberId===m.id&&!s.voided&&s.yr===n.getFullYear()&&s.mo===n.getMonth();});});
  var monthSav=S.savings.filter(function(s){return!s.voided&&s.yr===n.getFullYear()&&s.mo===n.getMonth();}).reduce(function(t,s){return t+s.amount;},0);

  // Penalty / deadline checks
  var inNotice=n>=PENALTY_NOTICE_DATE;
  var inPenalty=n>PENALTY_START_DATE;
  var notCaughtUp=S.members.filter(function(m){return m.status==="Active"&&!memberCaughtUpByJune(m.id);});
  var membersWithPenalty=inPenalty?S.members.filter(function(m){return m.status==="Active"&&getMemberTotalArrears(m.id).totalOwed>0;}):[];

  var alerts="";
  if(pA.length)alerts+='<div class="alert alert-warn">✏️ '+pA.length+' savings amendment(s) pending.</div>';
  if(pE.length)alerts+='<div class="alert alert-warn">💸 '+pE.length+' expense(s) pending approval.</div>';
  if(pend.length)alerts+='<div class="alert alert-warn">⚠️ '+pend.length+' loan application(s) pending.</div>';
  if(over.length)alerts+='<div class="alert alert-err">🔴 '+over.length+' loan(s) overdue.</div>';
  if(def.length)alerts+='<div class="alert alert-warn">💰 '+def.length+' member(s) haven\'t paid '+MS[n.getMonth()]+'.</div>';
  if(inPenalty&&membersWithPenalty.length)alerts+='<div class="alert alert-err">🚨 <strong>DAILY PENALTY ACTIVE</strong>: '+membersWithPenalty.length+' member(s) are accruing UGX '+Math.round(MC*DAILY_PENALTY_RATE).toLocaleString()+'/day penalty on unpaid savings.</div>';
  else if(inNotice&&notCaughtUp.length)alerts+='<div class="alert alert-warn">📅 <strong>JUNE 30 DEADLINE</strong>: '+notCaughtUp.length+' member(s) have not caught up with savings. Members not current by 30 June 2026 are liable to offboarding and daily penalties from 1 August 2026.</div>';

  var trend=[];for(var ti=0;ti<6;ti++){var td=new Date(n.getFullYear(),n.getMonth()-5+ti,1);trend.push({l:MS[td.getMonth()],yr:td.getFullYear(),mo:td.getMonth()});}
  var maxT=1;trend.forEach(function(t){t.v=S.savings.filter(function(s){return!s.voided&&s.yr===t.yr&&s.mo===t.mo;}).reduce(function(a,s){return a+s.amount;},0);if(t.v>maxT)maxT=t.v;});
  var bars=trend.map(function(t){return'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:9px;color:var(--text3)">'+(t.v?fmt(t.v).replace("UGX ","").replace(",000","k"):"")+
    '</div><div style="width:100%;background:var(--gold);border-radius:3px 3px 0 0;height:'+Math.max(4,Math.round((t.v/maxT)*90))+'px"></div><div style="font-size:9px;color:var(--text3)">'+t.l+'</div></div>';}).join("");

  // Enhanced defaulter table with penalty + notice button
  var defRows=def.map(function(m){
    var arrears=getMemberTotalArrears(m.id);
    var notCaught=!memberCaughtUpByJune(m.id);
    return'<tr><td onclick="goMemberDetail(\''+m.id+'\')" style="cursor:pointer" class="mono gold-text">'+m.no+'</td>'+
      '<td onclick="goMemberDetail(\''+m.id+'\')" style="cursor:pointer;font-weight:600">'+esc(m.fullName)+'</td>'+
      '<td>'+m.phone+'</td>'+
      '<td>'+(arrears.totalOwed>0?'<span class="red-text" style="font-weight:700">'+fmt(arrears.totalOwed)+'</span>':"—")+'</td>'+
      '<td>'+(notCaught?'<span class="bdg bdg-danger">⚠️ Behind</span>':'<span class="bdg bdg-success">On Track</span>')+'</td>'+
      '<td><button class="btn btn-d btn-sm" style="font-size:10px;padding:3px 8px" onclick="openDefaulterNotice(\''+m.id+'\')">📢 Notice</button></td>'+
    '</tr>';
  }).join("");

  // Members with accruing penalties
  var penaltyRows=membersWithPenalty.map(function(m){
    var arr=getMemberTotalArrears(m.id);
    return'<tr><td class="mono gold-text">'+m.no+'</td><td style="font-weight:600">'+esc(m.fullName)+'</td>'+
      '<td class="red-text" style="font-weight:700">'+fmt(arr.totalOwed)+'</td>'+
      '<td>'+arr.months.length+' month(s)</td>'+
      '<td><button class="btn btn-d btn-sm" style="font-size:10px;padding:3px 8px" onclick="openDefaulterNotice(\''+m.id+'\')">📢 Notice</button></td></tr>';
  }).join("");

  return'<div class="fadein">'+alerts+
    '<div class="page-hdr"><div><h1 class="fd page-title">Dashboard</h1><div class="page-sub">'+n.toLocaleDateString("en-UG",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+'</div></div>'+
    '<button class="btn btn-p btn-sm" onclick="exportToExcel()">⬇️ Export Excel</button></div>'+
    '<div class="grid4" style="margin-bottom:14px">'+
      [["Active Members",S.members.filter(function(m){return m.status==="Active";}).length,"👥"],
       ["Savings Pool",fmt(totalSav),"💰"],["Active Loans",activeLoans.length,"📋"],["Outstanding",fmt(totalOut),"⚠️"]].map(function(s){
        return'<div class="stat-card"><div class="stat-icon" style="background:#C9A84C1A">'+s[2]+'</div><div style="min-width:0"><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">'+s[0]+'</div><div style="font-size:14px;font-weight:700;color:var(--navy);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+s[1]+'</div></div></div>';}).join("")+'</div>'+
    '<div class="grid3" style="margin-bottom:14px">'+
      '<div class="stat-card"><div class="stat-icon" style="background:#05a55533">💳</div><div style="min-width:0"><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">Annual Fees (2026)</div><div style="font-size:14px;font-weight:700;color:var(--green);margin-top:2px">'+fmt(totalAnnualFees)+'</div><div style="font-size:10px;color:var(--text3)">Tracked separately</div></div></div>'+
      '<div class="stat-card"><div class="stat-icon" style="background:#C0392B1A">💸</div><div style="min-width:0"><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">Approved Expenses</div><div style="font-size:14px;font-weight:700;color:var(--red);margin-top:2px">'+fmt(totalExpenses)+'</div><div style="font-size:10px;color:var(--text3)">Operational costs</div></div></div>'+
      '<div class="stat-card"><div class="stat-icon" style="background:#C9A84C1A">📅</div><div style="min-width:0"><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">This Month</div><div style="font-size:14px;font-weight:700;color:var(--navy);margin-top:2px">'+fmt(monthSav)+'</div><div style="font-size:10px;color:var(--text3)">'+MS[n.getMonth()]+" "+n.getFullYear()+'</div></div></div>'+
    '</div>'+
    '<div class="grid2" style="margin-bottom:14px">'+
      '<div class="card"><div class="fl" style="justify-content:space-between;margin-bottom:10px"><h3 style="font-size:13px;font-weight:600;color:var(--navy)">6-Month Savings Trend</h3><button class="btn btn-g btn-sm" onclick="goPage(\'savings\')">View →</button></div>'+
        '<div style="display:flex;align-items:flex-end;gap:6px;height:100px">'+bars+'</div></div>'+
      '<div class="card"><div class="fl" style="justify-content:space-between;margin-bottom:10px"><h3 style="font-size:13px;font-weight:600;color:var(--navy)">Defaulters This Month ('+def.length+')</h3></div>'+
        (def.length?'<table class="tbl tbl-sm"><thead><tr><th>No.</th><th>Member</th><th>Phone</th><th>Arrears</th><th>Status</th><th></th></tr></thead><tbody>'+defRows+'</tbody></table>':
          '<div class="no-data" style="color:var(--green)">🎉 All members paid this month!</div>')+
      '</div></div>'+
    (membersWithPenalty.length?
      '<div class="card" style="margin-bottom:14px;border:2px solid var(--red)">'+
        '<div class="fl" style="justify-content:space-between;margin-bottom:10px"><h3 style="font-size:13px;font-weight:700;color:var(--red)">🚨 Penalty Accruing Members ('+membersWithPenalty.length+')</h3>'+
        '<span style="font-size:11px;color:var(--red)">'+fmt(Math.round(MC*DAILY_PENALTY_RATE))+'/day/member</span></div>'+
        '<table class="tbl tbl-sm"><thead><tr><th>No.</th><th>Member</th><th>Total Owed</th><th>Months Behind</th><th></th></tr></thead><tbody>'+penaltyRows+'</tbody></table>'+
      '</div>':'')+(inNotice&&!inPenalty&&notCaughtUp.length?
      '<div class="card" style="margin-bottom:14px;border:2px solid var(--gold)">'+
        '<div class="fl" style="justify-content:space-between;margin-bottom:8px"><h3 style="font-size:13px;font-weight:700;color:#B7780F">📅 June 30 Deadline — '+notCaughtUp.length+' member(s) behind</h3></div>'+
        '<div class="alert alert-warn" style="font-size:12px;margin-bottom:8px">Not current by 30 June 2026 = liable to offboarding + 1% daily penalty from 1 Aug 2026.</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:6px">'+
          notCaughtUp.map(function(m){return'<div style="background:var(--bg);border-radius:6px;padding:5px 10px;font-size:12px;display:flex;align-items:center;gap:6px">'+
            '<span class="mono gold-text">'+m.no+'</span><span>'+esc(m.fullName)+'</span>'+
            '<button class="btn btn-d btn-sm" style="font-size:10px;padding:2px 7px" onclick="openDefaulterNotice(\''+m.id+'\')">📢</button></div>';}).join("")+
        '</div></div>':"")+'<div class="grid2">'+
      '<div class="card"><h3 style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:10px">Active Loans</h3>'+
        activeLoans.slice(0,5).map(function(ln){var st=loanStat(ln);return'<div style="padding:6px 0;border-bottom:1px solid var(--gray2);cursor:pointer" onclick="goLoanDetail(\''+ln.id+'\')"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:600">'+esc(ln.borrower)+'</span><span style="font-size:11px;color:var(--text3)">'+fmt(st.outstanding)+'</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+st.pct+'%;background:'+(st.pct>=100?"var(--green)":st.pct>=60?"var(--gold)":"var(--red)")+'"></div></div></div>';}).join("")||'<div class="no-data">No active loans</div>'+
      '</div>'+
      '<div class="card"><h3 style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:10px">Club Summary</h3>'+
        [["Savings Pool",fmt(totalSav)],["Annual Fees Tracked",fmt(totalAnnualFees)],["Approved Expenses",fmt(totalExpenses)],
         ["Net Available",fmt(totalSav-totalOut)],["Loans Portfolio",fmt(S.loans.reduce(function(t,l){return t+l.principal;},0))],
         ["Exited Members",S.members.filter(function(m){return m.status==="Exited";}).length]].map(function(p){return'<div class="kv-row"><span class="kv-label">'+p[0]+'</span><span class="kv-value">'+p[1]+'</span></div>';}).join("")+
      '</div></div></div>';
}

// ─── 18. MEMBERS ───────────────────────────────────
function rMembers(){
  if(S.view==="member-detail")return rMemberDetail();
  if(S.view==="add-member"||S.view==="edit-member")return rMemberForm();
  if(S.view==="exited")return rExitedMembers();
  if(S.view==="annual-fees")return rAnnualFees();
  return rMemberList();
}
function rMemberList(){
  var q=(S.memberSearch||"").toLowerCase();
  var sf=S.memberStatusFilter||"Active";
  var filtered=S.members.filter(function(m){
    return(!q||m.fullName.toLowerCase().indexOf(q)>=0||m.no.indexOf(q)>=0||m.phone.indexOf(q)>=0)&&(sf==="All"||m.status===sf);
  });
  var rows=filtered.map(function(m){
    var sav=memberTotalSavings(m.id),lk=memberLockedSavings(m.id);
    return'<tr onclick="goMemberDetail(\''+m.id+'\')" style="cursor:pointer">'+
      '<td data-label="No." class="mono gold-text" style="font-size:12px;font-weight:700">'+m.no+'</td>'+
      '<td data-label="Name" style="font-weight:600">'+esc(m.fullName)+'</td>'+
      '<td data-label="Phone">'+m.phone+'</td>'+
      '<td data-label="Occupation" style="color:var(--text2);font-size:12px">'+(m.occupation||"—")+'</td>'+
      '<td data-label="Total Savings"><div style="font-weight:600;font-size:12px">'+fmt(sav)+'</div>'+(lk?'<div style="font-size:10px;color:var(--red)">🔒 '+fmt(lk)+'</div>':"")+
      '</td><td data-label="Status"><span class="bdg bdg-'+(m.status==="Active"?"success":m.status==="Exited"?"gray":"danger")+'">'+m.status+'</span></td></tr>';
  }).join("");
  return'<div class="fadein"><div class="page-hdr">'+
    '<div><h1 class="fd page-title">Members</h1><div class="page-sub">'+S.members.filter(function(m){return m.status==="Active";}).length+' active · '+S.members.filter(function(m){return m.status==="Exited";}).length+' exited</div></div>'+
    '<div class="fl flw">'+
      '<button class="btn btn-g btn-sm" onclick="S.view=\'annual-fees\';render()">💳 Fees</button>'+
      '<button class="btn btn-g btn-sm" onclick="S.view=\'exited\';render()">📂 Exited</button>'+
      (CAN(S.user,"manage_members")?'<button class="btn btn-p btn-sm" onclick="S.view=\'add-member\';render()">+ New</button>':"")+
    '</div></div>'+
    '<div class="card">'+
      '<div class="fl" style="margin-bottom:12px;flex-wrap:wrap;gap:8px">'+
        '<input class="inp" style="max-width:240px;font-size:14px" placeholder="Search..." value="'+esc(S.memberSearch||"")+'" oninput="S.memberSearch=this.value;render()">'+
        '<select class="inp" style="max-width:130px;font-size:14px" onchange="S.memberStatusFilter=this.value;render()">'+
          ["Active","Inactive","Exited","All"].map(function(s){return'<option'+(S.memberStatusFilter===s?" selected":"")+'>'+s+'</option>';}).join("")+'</select>'+
        '<span style="font-size:12px;color:var(--text3)">'+filtered.length+' member(s)</span>'+
      '</div>'+
      '<div class="mobile-stack"><table class="tbl"><thead><tr><th>No.</th><th>Name</th><th>Phone</th><th>Occupation</th><th>Total Savings</th><th>Status</th></tr></thead>'+
      '<tbody>'+(rows||'<tr><td colspan="6" class="no-data">No members found</td></tr>')+'</tbody></table></div></div></div>';
}

function rMemberDetail(){
  var m=S.members.filter(function(x){return x.id===S.selId;})[0];
  if(!m){S.view="list";return rMemberList();}
  var sav=memberTotalSavings(m.id),lk=memberLockedSavings(m.id),av=Math.max(0,sav-lk);
  var mLoans=S.loans.filter(function(l){return l.memberId===m.id||l.g1Id===m.id||l.g2Id===m.id;});
  var mSav=S.savings.filter(function(s){return s.memberId===m.id&&!s.voided;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  var thisFee=(m.annualFees||[]).filter(function(f){return f.year===2026;})[0];
  function kv(pairs){return pairs.map(function(p){return'<div class="kv-row"><span class="kv-label">'+p[0]+'</span><span class="kv-value">'+(p[1]||"—")+'</span></div>';}).join("");}
  return'<div class="fadein">'+
    '<div class="fl" style="gap:8px;margin-bottom:16px;flex-wrap:wrap">'+
      '<button class="btn btn-g btn-sm" onclick="S.view=\'list\';render()">← Back</button>'+
      '<div style="flex:1"><h1 class="fd page-title" style="font-size:20px">'+esc(m.fullName)+'</h1>'+
      '<div style="color:var(--gold);font-size:12px;font-weight:700">'+m.no+' · <span class="bdg bdg-'+(m.status==="Active"?"success":m.status==="Exited"?"gray":"danger")+'">'+m.status+'</span></div></div>'+
      (CAN(S.user,"manage_members")?'<button class="btn btn-g btn-sm" onclick="editMember(\''+m.id+'\')">✏️ Edit</button>'+
      (m.status==="Active"?'<button class="btn btn-d btn-sm" onclick="S.modal={id:\'offboard\',data:\''+m.id+'\'};render()">🚪 Offboard</button>':""): "")+
    '</div>'+
    '<div class="grid2" style="margin-bottom:12px">'+
      '<div class="card" style="display:flex;gap:14px;align-items:flex-start">'+
        (m.passportPhoto?'<img src="'+m.passportPhoto+'" style="width:70px;height:90px;border-radius:8px;object-fit:cover;flex-shrink:0">'
          :'<div style="width:70px;height:90px;border:2px dashed var(--gray3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">👤</div>')+
        '<div style="flex:1"><div class="sec-hdr" style="margin-top:0">Personal</div>'+
        kv([["Surname",m.surname],["First Name",m.firstName],["Gender",m.gender],["D.O.B",fmtD(m.dob)],["NID",m.nid],["Phone",m.phone]])+
        '</div></div>'+
      '<div class="card"><div class="sec-hdr" style="margin-top:0">Financials</div>'+
        kv([["Total Savings",'<strong class="green-text">'+fmt(sav)+'</strong>'],
          ["Locked",'<strong class="red-text">'+fmt(lk)+'</strong>'],
          ["Available",'<strong class="navy-text">'+fmt(av)+'</strong>'],
          ["Active Loans",mLoans.filter(function(l){return l.status==="Active";}).length],
          ["2026 Annual Fee",thisFee?'<span class="bdg bdg-'+(thisFee.status==="Paid"?"success":"warning")+'">'+thisFee.status+'</span>':'<span class="bdg bdg-warning">Unpaid</span>']])+
      '</div></div>'+
    '<div class="grid2">'+
      '<div class="card"><div class="fl" style="justify-content:space-between;margin-bottom:10px">'+
        '<div class="sec-hdr" style="margin-top:0;margin-bottom:0">Recent Savings</div>'+
        '<button class="btn btn-g btn-sm" onclick="S.savMemberId=\''+m.id+'\';S.savTab=\'ledger\';goPage(\'savings\')">Full →</button></div>'+
        '<table class="tbl tbl-sm"><thead><tr><th>Date</th><th>Period</th><th>Amount</th></tr></thead><tbody>'+
        mSav.slice(0,5).map(function(s){return'<tr><td>'+fmtD(s.date)+'</td><td>'+MS[s.mo]+' '+s.yr+'</td><td class="green-text" style="font-weight:600">'+fmt(s.amount)+'</td></tr>';}).join("")||'<tr><td colspan="3" class="no-data">None</td></tr>'+
        '</tbody></table></div>'+
      '<div class="card"><div class="sec-hdr" style="margin-top:0">Loan History</div>'+
        (mLoans.length?'<table class="tbl tbl-sm"><thead><tr><th>Loan</th><th>Amount</th><th>Role</th><th>Status</th></tr></thead><tbody>'+
          mLoans.map(function(l){return'<tr onclick="goLoanDetail(\''+l.id+'\')" style="cursor:pointer"><td class="mono" style="font-size:11px;color:var(--gold)">'+l.no+'</td><td style="font-size:12px">'+fmt(l.principal)+'</td><td><span class="bdg bdg-info" style="font-size:10px">'+(l.memberId===m.id?"Borrow":l.g1Id===m.id?"G1":"G2")+'</span></td><td><span class="bdg bdg-'+(l.status==="Active"?"warning":l.status==="Cleared"?"success":"gray")+'" style="font-size:10px">'+l.status+'</span></td></tr>';}).join("")+
          '</tbody></table>':'<div class="no-data">No loans</div>')+
      '</div></div>'+
    (m.status==="Exited"?'<div class="card" style="margin-top:12px;border:2px solid var(--red)"><div class="sec-hdr" style="margin-top:0;color:var(--red)">Exit Record</div>'+
      kv([["Exit Date",fmtD(m.exitDate)],["Exit Fee (5%)",fmt(m.exitFee)],["Net Payable",fmt(sav+(m.exitFee||0))],["Reason",m.exitReason],["Notes",m.exitNotes]])+
      '</div>':"")+
  '</div>';
}

        '<td data-label="Locked">'+(lk?'<span class="red-text">'+fmt(lk)+'</span>':"—")+'</td>'+
        '<td data-label="Available" class="'+(av>0?"green-text":"red-text")+'" style="font-weight:600">'+fmt(av)+'</td>'+

    var canAmend=CAN(S.user,"amend_savings")||CAN(S.user,"full");
    var mOpts=S.members.filter(function(m){return m.status==="Active";}).map(function(m){return'<option value="'+m.id+'"'+(m.id===selId?" selected":"")+'>'+m.no+' — '+esc(m.fullName)+'</option>';}).join("");
    content='<div class="fl" style="gap:8px;margin-bottom:12px;flex-wrap:wrap">'+
      '<select class="inp" onchange="S.savMemberId=this.value;render()" style="max-width:300px;font-size:14px"><option value="">— Select Member —</option>'+mOpts+'</select>'+
      (selM?'<div class="fl" style="gap:8px;font-size:12px;flex-wrap:wrap"><span style="color:var(--text3)">Total:</span><strong class="green-text">'+fmt(stotal)+'</strong><span style="color:var(--text3)">Avail:</span><strong class="navy-text">'+fmt(memberAvailSavings(selId))+'</strong></div>':"")+
      '</div>';
    if(selId){
      var sRows=selS.map(function(s){
        var pend=S.amendments.filter(function(a){return a.savingsId===s.id&&a.status==="Pending";})[0];
        return'<tr style="'+(pend?"background:#FEF9EC":"")+'">'+
          '<td data-label="Ref" class="mono" style="font-size:10px;color:var(--text3)">'+s.ref+'</td>'+
          '<td data-label="Date">'+fmtD(s.date)+'</td><td data-label="Period">'+MS[s.mo]+' '+s.yr+'</td>'+
          '<td data-label="Amount"><span class="'+(s.voided?"red-text":"green-text")+'" style="font-weight:700'+(s.voided?";text-decoration:line-through":"")+'">'+fmt(s.amount)+'</span></td>'+
          '<td data-label="Status">'+(s.voided?'<span class="bdg bdg-danger">Voided</span>':pend?'<span class="bdg bdg-amber">⏳ Pending</span>':'<span class="bdg bdg-success">Active</span>')+'</td>'+

          '</tr>';
      }).join("")||'<tr><td colspan="'+(canAmend?6:5)+'" class="no-data">No records</td></tr>';
      content+='<div class="mobile-stack"><table class="tbl"><thead><tr><th>Ref</th><th>Date</th><th>Period</th><th>Amount</th><th>Status</th>'+(canAmend?'<th></th>':'')+' </tr></thead><tbody>'+sRows+'</tbody></table></div>';
    } else {content+='<div class="no-data">Select a member to view their ledger</div>';}

        var mDate=new Date(mg.yr,mg.mo,1);

        if(isFuture&&!amt)return'<td style="color:#CCC">…</td>';
        return'<td>'+(amt>=200000?"✅✅":amt>=100000?"✅":amt>0?'<span style="color:var(--gold)">½</span>':"❌")+'</td>';
      }).join("");
      return'<tr><td style="white-space:nowrap;font-weight:600;font-size:11px">'+esc(m.fullName)+'<br><span class="mono" style="font-size:9px;color:var(--gold)">'+m.no+'</span></td>'+cells+'</tr>';

  } else {
    content=rAmendmentsList();

  return'<div class="fadein"><div class="page-hdr">'+
    '<div><h1 class="fd page-title">Savings</h1><div class="page-sub">Total pool: '+fmt(totalSav)+'</div></div>'+
    '<div class="fl">'+(CAN(S.user,"record_savings")?'<button class="btn btn-p btn-sm" onclick="S.modal={id:\'add-savings\'};render()">+ Record</button>':"")+
    '</div></div><div class="card">'+tabs+content+'</div></div>';
}

  }).join("");
  return'<div class="fadein"><div class="page-hdr">'+
    '<div><h1 class="fd page-title">Loans</h1><div class="page-sub">'+MEM_RATE+'%/mo (members) · '+NM_RATE+'%/mo (non-members) · Max '+MAX_MO+' months</div></div>'+

    '<div class="mobile-stack"><table class="tbl"><thead><tr><th>No.</th><th>Borrower</th><th>Principal</th><th>Rate</th><th>Due Date</th><th>Outstanding</th><th>Status</th></tr></thead>'+

function rLoanDetail(){
  var loan=S.loans.filter(function(l){return l.id===S.selId;})[0];
  if(!loan){S.view="list";return rLoanList();}
  var c=calcLoan(loan.principal,loan.rate,loan.months),st=loanStat(loan),over=isOverdue(loan);
  var lReps=S.repayments.filter(function(r){return r.loanId===loan.id;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  var g1M=loan.g1Id?S.members.filter(function(m){return m.id===loan.g1Id;})[0]:null;
  var g2M=loan.g2Id?S.members.filter(function(m){return m.id===loan.g2Id;})[0]:null;
  var sched=[];
  for(var si=0;si<loan.months;si++){
    var sd=new Date(loan.issued+"T12:00:00");sd.setMonth(sd.getMonth()+si+1);
    var dueStr=sd.toISOString().split("T")[0];
    var isPast=sd<now();var isRep=si<lReps.length;
    var stat2=isRep?"Paid":isPast?"Overdue":"Upcoming";
    sched.push('<tr><td>'+(si+1)+'</td><td>'+fmtD(dueStr)+'</td><td>'+fmt(c.monthly)+'</td><td><span class="bdg bdg-'+(stat2==="Paid"?"success":stat2==="Overdue"?"danger":"info")+'">'+stat2+'</span></td><td>'+(isRep?fmt(lReps[si].amount):"—")+'</td></tr>');
  }
  function kv(pairs){return pairs.map(function(p){return'<div class="kv-row"><span class="kv-label">'+p[0]+'</span><span class="kv-value">'+p[1]+'</span></div>';}).join("");}

// ─── 21. EXPENSES MODULE ───────────────────────────
function rExpenses(){
  var tab=S.expTab||"list";
  var all=S.expenses.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var approved=all.filter(function(e){return e.status==="Approved";});
  var pending=all.filter(function(e){return e.status==="Pending";});
  var totalApproved=approved.reduce(function(t,e){return t+e.amount;},0);
  var totalPending=pending.reduce(function(t,e){return t+e.amount;},0);
  var canRecord=CAN(S.user,"record_expense");
  var canApprove=CAN(S.user,"approve_expense")||CAN(S.user,"full");
  var tabs='<div class="tab-bar">'+[["list","📋 All Expenses"],["pending","⏳ Pending"+(pending.length?" ("+pending.length+")" :"")],["summary","📊 Summary"]].map(function(t){return'<button class="tab-btn'+(tab===t[0]?" active":"")+'" onclick="S.expTab=\''+t[0]+'\';render()">'+t[1]+'</button>';}).join("")+'</div>';
  var content="";
  if(tab==="list"||tab==="pending"){
    var filtered=tab==="pending"?pending:all;
    var rows=filtered.map(function(e){
      return'<tr>'+
        '<td data-label="Ref" class="mono" style="font-size:10px;color:var(--gold)">'+e.ref+'</td>'+
        '<td data-label="Date">'+fmtD(e.date)+'</td>'+
        '<td data-label="Amount" style="font-weight:700;color:var(--red)">'+fmt(e.amount)+'</td>'+
        '<td data-label="Purpose" style="font-size:12px">'+esc(e.purpose)+'</td>'+
        '<td data-label="Category"><span class="bdg bdg-gray">'+esc(e.category||"Other")+'</span></td>'+
        '<td data-label="Recorded By" style="font-size:11px">'+esc(e.recordedBy)+'</td>'+
        '<td data-label="Approver" style="font-size:11px">'+(e.requestedApprover||"—")+'</td>'+
        '<td data-label="Status"><span class="bdg bdg-'+(e.status==="Approved"?"success":e.status==="Rejected"?"danger":"warning")+'">'+e.status+'</span></td>'+
        (canApprove&&e.status==="Pending"?'<td><div class="fl"><button class="btn btn-grn btn-sm" style="padding:3px 8px" onclick="approveExpense(\''+e.id+'\')">✅</button><button class="btn btn-d btn-sm" style="padding:3px 8px;margin-left:4px" onclick="rejectExpense(\''+e.id+'\')">❌</button></div></td>':'<td></td>')+
        '</tr>';
    }).join("");
    content='<div class="mobile-stack"><table class="tbl"><thead><tr><th>Ref</th><th>Date</th><th>Amount</th><th>Purpose</th><th>Category</th><th>By</th><th>Approver</th><th>Status</th><th></th></tr></thead><tbody>'+
      (rows||'<tr><td colspan="9" class="no-data">No expenses '+(tab==="pending"?"pending":"recorded")+'.</td></tr>')+'</tbody></table></div>';
  } else {
    var catTotals={};
    approved.forEach(function(e){var c=e.category||"Other";catTotals[c]=(catTotals[c]||0)+e.amount;});
    var catRows=Object.keys(catTotals).map(function(c){return'<div class="kv-row"><span class="kv-label">'+esc(c)+'</span><span class="kv-value red-text">'+fmt(catTotals[c])+'</span></div>';}).join("");
    content='<div class="grid2">'+
      '<div class="card"><h3 style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:12px">Expense Breakdown by Category</h3>'+catRows+'<hr class="divider"><div class="kv-row"><span style="font-weight:700">Total Approved</span><span class="kv-value red-text">'+fmt(totalApproved)+'</span></div></div>'+
      '<div class="card"><h3 style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:12px">Fund Summary</h3>'+
        [["Total Savings Pool",fmt(S.savings.filter(function(s){return!s.voided;}).reduce(function(t,s){return t+s.amount;},0))],
         ["Annual Fees Collected",fmt(S.members.reduce(function(t,m){return t+(m.annualFees||[]).filter(function(f){return f.status==="Paid";}).reduce(function(a,f){return a+f.amount;},0);},0))],
         ["Approved Expenses",fmt(totalApproved)],
         ["Pending Expenses",fmt(totalPending)],
         ["Active Loans Outstanding",fmt(S.loans.filter(function(l){return l.status==="Active";}).reduce(function(t,l){return loanStat(l).outstanding+t;},0))]].map(function(p){return'<div class="kv-row"><span class="kv-label">'+p[0]+'</span><span class="kv-value">'+p[1]+'</span></div>';}).join("")+
      '</div></div>';
  }
  return'<div class="fadein"><div class="page-hdr">'+
    '<div><h1 class="fd page-title">Expenses</h1><div class="page-sub">Operational costs · Approved: '+fmt(totalApproved)+'</div></div>'+
    (canRecord?'<button class="btn btn-p btn-sm" onclick="S.modal={id:\'add-expense\'};render()">+ Record Expense</button>':"")+
    '</div><div class="card">'+tabs+content+'</div></div>';
}

function confirmTOTPSetup(uid){
  var token=v("totp-verify");var secret=S.modal&&S.modal.totpSecret;
  if(!secret||!token){showToast("Enter the 6-digit code","err");return;}
  verifyTOTP(secret,token).then(function(ok){
    if(ok){
      S.users=S.users.map(function(u){return u.id===uid?Object.assign({},u,{totpSecret:secret}):u;});
      DB.set(K.users,S.users);logEvent("USER",S.user.name,"TOTP setup completed for user "+uid);
      closeModal();showToast("Google Authenticator setup complete! ✅","ok");
    } else {
      var err=document.getElementById("totp-setup-err");if(err)err.style.display="";
    }
  }).catch(function(){showToast("Verification error. Try again.","err");});
}
function disableTOTP(uid){
  S.users=S.users.map(function(u){if(u.id!==uid)return u;var c=Object.assign({},u);delete c.totpSecret;return c;});
  DB.set(K.users,S.users);logEvent("USER",S.user.name,"TOTP removed for user "+uid);closeModal();showToast("TOTP removed — user will use PIN","warn");render();
}

function updateLoanCalc(){
  var p=Number((document.getElementById("lf-principal")||{value:0}).value||0);
  var r=Number((document.getElementById("lf-rate")||{value:MEM_RATE}).value||MEM_RATE);
  var issued=(document.getElementById("lf-issued")||{value:todayStr()}).value||todayStr();
  var maxMo=maxLoanMonths(issued);
  var moSel=document.getElementById("lf-months");
  var curMo=Number(moSel&&moSel.value||6);
  if(moSel)moSel.innerHTML=[1,2,3,4,5,6].filter(function(i){return i<=maxMo;}).map(function(i){return'<option value="'+i+'"'+(i===Math.min(curMo,maxMo)?" selected":"")+'>'+i+' mo.</option>';}).join("");
  var mo=Number((document.getElementById("lf-months")||{value:6}).value||6);
  var maxEl=document.getElementById("max-mo-lbl");if(maxEl)maxEl.textContent=maxMo;
  var el=document.getElementById("loan-calc");var inn=document.getElementById("loan-calc-inner");
  if(!p||!el||!inn)return;
  var c=calcLoan(p,r,mo);el.style.display="";
  inn.innerHTML=[["Principal",fmt(p)],["Interest ("+r+"%×"+mo+"mo.)",fmt(c.interest)],["Total",fmt(c.total)],["Monthly",fmt(c.monthly)]].map(function(pair){return'<div><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase">'+pair[0]+'</div><div style="font-size:13px;font-weight:700;color:var(--navy)">'+pair[1]+'</div></div>';}).join("");
  var isMember=(document.querySelector('input[name="loan-type"]:checked')||{value:"member"}).value==="member";
  var bid=isMember?(document.getElementById("lf-memberId")||{value:""}).value:"";
  var g1=(document.getElementById("lf-g1")||{value:""}).value;var g2=(document.getElementById("lf-g2")||{value:""}).value;
  var collV=Number((document.getElementById("lf-collValue")||{value:0}).value||0);
  var secEl=document.getElementById("loan-sec-check");
  if(secEl&&(bid||g1||g2)){
    var sec=loanSecurityCheck(bid,g1,g2,c.total);var eff=sec.combined+(isMember?0:collV);
    var cov=c.total>0?Math.round((eff/c.total)*100):0;
    secEl.style.display="";secEl.className="alert alert-"+(eff>=c.total?"ok":"err");
    secEl.innerHTML="Security: B="+fmt(sec.bSav)+" + G1="+fmt(sec.g1Sav)+" + G2="+fmt(sec.g2Sav)+((!isMember)?" + Coll="+fmt(collV):"")+
      " = <strong>"+fmt(eff)+"</strong> vs <strong>"+fmt(c.total)+"</strong> → "+cov+"% "+(eff>=c.total?"✅ OK":"❌ Insufficient");
  }
}
function submitLoan(){
  var isMember=(document.querySelector('input[name="loan-type"]:checked')||{value:"member"}).value==="member";
  var memberId=isMember?v("lf-memberId"):"";var borrower=v("lf-borrower");
  var principal=Number(v("lf-principal")||0);var rate=Number(v("lf-rate")||MEM_RATE);
  var months=Number(v("lf-months")||6);var purpose=v("lf-purpose");var issued=v("lf-issued")||todayStr();
  var g1Id=v("lf-g1");var g2Id=v("lf-g2");var collDesc=v("lf-collDesc");var collValue=Number(v("lf-collValue")||0);
  if(!borrower){showToast("Enter borrower name","err");return;}
  if(!principal||principal<=0){showToast("Enter loan amount","err");return;}
  if(!g1Id||!g2Id){showToast("Two guarantors required","err");return;}
  if(g1Id===g2Id){showToast("Guarantors must be different","err");return;}
  var maxMo=maxLoanMonths(issued);if(months>maxMo){showToast("Max "+maxMo+" months for this date","err");return;}
  var c=calcLoan(principal,rate,months);
  var sec=loanSecurityCheck(memberId,g1Id,g2Id,c.total);
  var effectiveSec=sec.combined+(isMember?0:collValue);var sufficient=effectiveSec>=c.total;
  var g1M=S.members.filter(function(m){return m.id===g1Id;})[0]||{};var g2M=S.members.filter(function(m){return m.id===g2Id;})[0]||{};
  var lb=0,lg1=0,lg2=0;
  if(sufficient){lb=Math.min(sec.bSav,c.total);var rem=c.total-lb;if(rem>0){lg1=Math.min(sec.g1Sav,rem);rem-=lg1;}if(rem>0)lg2=Math.min(sec.g2Sav,rem);}
  var no="GIC-L-"+String(S.loans.length+1).padStart(3,"0");
  var loan={id:gid(),no:no,memberId:memberId||null,borrower:borrower,isMember:isMember,principal:principal,rate:rate,months:months,purpose:purpose,issued:issued,
    g1Id:g1Id,g1Name:g1M.fullName||"",g2Id:g2Id,g2Name:g2M.fullName||"",
    collateralDesc:collDesc,collateralValue:collValue,
    lockedBorrower:sufficient?lb:0,lockedG1:sufficient?lg1:0,lockedG2:sufficient?lg2:0,
    approvedBy:"",status:sufficient?"Pending":"Declined",
    declineReason:sufficient?"":"Insufficient savings/collateral to secure loan",
    submittedBy:S.user.username,submittedAt:todayStr()};
  S.loans=S.loans.concat([loan]);DB.set(K.loans,S.loans);
  logEvent("LOAN",S.user.name,"Loan "+no+" submitted for "+borrower+" — "+fmt(principal)+" × "+months+"mo. Status: "+loan.status);
  closeModal();
  if(!sufficient){showToast("Auto-declined: Insufficient security ("+fmt(effectiveSec)+" < "+fmt(c.total)+")","err");}
  else{showToast("Loan "+no+" submitted — pending approval","info");}
  S.loanTab=sufficient?"pending":"declined";render();
}

function init(){
  var seeded=DB.get(K.seeded);
  if(!seeded){
    var sv=buildSavings();
    DB.set(K.users,SEED_USERS);DB.set(K.members,SEED_MEMBERS);DB.set(K.savings,sv);
    DB.set(K.loans,[]);DB.set(K.repayments,[]);DB.set(K.interest,[]);DB.set(K.amendments,[]);DB.set(K.expenses,[]);
    DB.set(K.seeded,true);
    S.users=SEED_USERS;S.members=SEED_MEMBERS;S.savings=sv;S.loans=[];S.repayments=[];S.interest=[];S.amendments=[];S.expenses=[];
  } else {
    S.users=DB.get(K.users)||SEED_USERS;S.members=DB.get(K.members)||SEED_MEMBERS;
    S.savings=DB.get(K.savings)||[];S.loans=DB.get(K.loans)||[];
    S.repayments=DB.get(K.repayments)||[];S.interest=DB.get(K.interest)||[];
    S.amendments=DB.get(K.amendments)||[];S.expenses=DB.get(K.expenses)||[];
  }
  // Restore session from sessionStorage (survives page refresh)
  var sess=_sess.load();
  if(sess&&sess.uid){
    var u=S.users.filter(function(x){return x.id===sess.uid&&x.active!==false;})[0];
    if(u){
      S.user=u;S.page=u.access==="member"?"my-savings":"dashboard";
      resetSessionTimer();
      ["click","keydown","touchstart","scroll"].forEach(function(e){document.addEventListener(e,resetSessionTimer,{passive:true});});
    }
  }
  S.loading=false;render();
